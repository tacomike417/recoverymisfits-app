<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Misfits — Tools</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="./icon-192.png">

  <!-- Your stylesheet -->
  <link rel="stylesheet" href="./css/tool-styles.css">
</head>

<body>

  <header>Tools</header>

  <main>
    <section class="panel">
      <h1 class="h1">Tools</h1>
      <p class="p">Simple stuff we can actually use. Tap a tool to open it.</p>

      <div class="toolGrid">

        <!-- Burn Pad -->
        <a class="toolCard" href="./burnpad.html" aria-label="Open Burn Pad">
          <div class="pin"></div>
          <div class="toolTop">
            <div class="toolEmoji">📝</div>
            <h2 class="toolTitle">Burn Pad</h2>
          </div>
          <p class="toolSub">Get it out. Let it go.</p>
        </a>

        <!-- Gratitude -->
        <a class="toolCard" href="./gratitude.html" aria-label="Open Gratitude">
          <div class="pin pin2"></div>
          <div class="toolTop">
            <div class="toolEmoji">🙏</div>
            <h2 class="toolTitle">Gratitude</h2>
          </div>
          <p class="toolSub">Find one thing that didn’t suck today.</p>
        </a>

      </div>
    </section>
  </main>

  <!-- Sobriety Bar -->
  <div class="sobrietyBar" id="sobrietyBar" role="button" tabindex="0">
    <div class="sobDays" id="sobrietyDays">Set your sobriety date</div>
    <div class="sobSince" id="sobrietySince">Tap here to enter</div>
  </div>

  <!-- Bottom Navigation -->
  <nav id="bottomBar" aria-label="Bottom Navigation">

    <!-- Home -->
    <a class="navItem" href="./index2.html">
      <svg class="navIcon" viewBox="0 0 24 24">
        <path d="M3 10.5L12 3l9 7.5"></path>
        <path d="M5 10v11h14V10"></path>
      </svg>
      Home
    </a>

    <!-- Tools -->
    <a class="navItem active" href="./tools.html">
      <svg class="navIcon" viewBox="0 0 24 24">
        <path d="M14.7 6.3a5 5 0 0 0-6.4 6.4L3 18l3 3 5.3-5.3a5 5 0 0 0 6.4-6.4l-2.3 2.3-2.8-2.8 2.1-2.5z"></path>
      </svg>
      Tools
    </a>

    <!-- Readings -->
    <a class="navItem" href="./readings.html">
      <svg class="navIcon" viewBox="0 0 24 24">
        <path d="M4 19.5c2-1.2 4-1.2 6 0V5.5c-2-1.2-4-1.2-6 0v14z"></path>
        <path d="M20 19.5c-2-1.2-4-1.2-6 0V5.5c2-1.2 4-1.2 6 0v14z"></path>
      </svg>
      Readings
    </a>

    <!-- Audio -->
    <a class="navItem" href="./audio.html">
      <svg class="navIcon" viewBox="0 0 24 24">
        <path d="M4 12V8a6 6 0 0 1 12 0v4"></path>
        <path d="M18 13v4a2 2 0 0 1-2 2h-1"></path>
        <path d="M6 13v4a2 2 0 0 0 2 2h1"></path>
      </svg>
      Audio
    </a>

    <!-- Fun -->
    <a class="navItem" href="./fun.html">
      <svg class="navIcon" viewBox="0 0 24 24">
        <path d="M7 10h10"></path>
        <path d="M9 8v4"></path>
        <path d="M16.5 10.5h.01"></path>
        <path d="M18.5 9.5h.01"></path>
        <path d="M7 14h10a4 4 0 0 0 0-8H7a4 4 0 0 0 0 8z"></path>
      </svg>
      Fun
    </a>

  </nav>

  <script>
    const bar = document.getElementById("sobrietyBar");
    const daysEl = document.getElementById("sobrietyDays");
    const sinceEl = document.getElementById("sobrietySince");

    function daysBetween(startDate){
      const start = new Date(startDate + "T00:00:00");
      const now = new Date();
      const diff = now - start;
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function prettyDate(iso){
      const d = new Date(iso + "T00:00:00");
      return d.toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" });
    }

    function renderSobriety(){
      const saved = localStorage.getItem("sobrietyDate");
      if(!saved){
        daysEl.textContent = "Set your sobriety date";
        sinceEl.textContent = "Tap here to enter";
        return;
      }
      const days = daysBetween(saved);
      daysEl.textContent = days.toLocaleString() + " days sober";
      sinceEl.textContent = "Since " + prettyDate(saved);
    }

    function setDate(){
      const input = prompt("Enter sobriety date (YYYY-MM-DD):");
      if(!input) return;
      localStorage.setItem("sobrietyDate", input.trim());
      renderSobriety();
    }

    bar.addEventListener("click", setDate);
    bar.addEventListener("keydown", (e) => {
      if(e.key === "Enter" || e.key === " "){
        e.preventDefault();
        setDate();
      }
    });

    renderSobriety();
  </script>

</body>
</html>
