<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Misfits — Tools</title>

  <style>
    :root{
      --bg:#ffffff;
      --text:#111;
      --muted:rgba(0,0,0,.65);
      --border:rgba(0,0,0,.18);
      --shadow:rgba(0,0,0,.18);
      --paper:#fbfaf6;
      --paper2:#f7f2e6;
    }

    body{
      margin:0;
      font-family: Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      position:sticky;
      top:0;
      z-index:20;
      background:#fff;
      border-bottom:1px solid rgba(0,0,0,.10);
      padding:12px 14px;
      text-align:center;
    }
    .brand{
      font-weight:900;
      font-size:16px;
      letter-spacing:.2px;
    }
    .sub{
      margin-top:4px;
      font-size:12.5px;
      color:var(--muted);
    }

    main{
      max-width:820px;
      margin:0 auto;
      padding:18px 14px 90px;
    }

    .panel{
      border:1px solid rgba(0,0,0,.10);
      border-radius:18px;
      padding:16px;
      background:#fff;
      box-shadow:0 6px 18px rgba(0,0,0,.05);
    }

    h1{
      font-size:18px;
      margin:0 0 4px 0;
    }
    .hint{
      margin:0 0 14px 0;
      color:var(--muted);
      font-size:13px;
    }

    .tools-buttons{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }

    @media (min-width: 720px){
      .tools-buttons{
        grid-template-columns: 1fr 1fr;
      }
      .tools-buttons .rm-btn:nth-child(3){
        grid-column: 1 / -1;
      }
    }

    .rm-btn{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 14px;
      border-radius:16px;
      text-decoration:none;
      background:var(--paper);
      color:var(--text);
      border:1px solid var(--border);
      box-shadow:0 2px 0 var(--shadow);
      transition: transform .08s ease, box-shadow .08s ease, background .12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .rm-btn:hover{
      background:#fffdf7;
      transform: translateY(-1px);
      box-shadow:0 3px 0 var(--shadow);
    }
    .rm-btn:active{
      transform: translateY(1px);
      box-shadow:0 1px 0 var(--shadow);
    }

    .rm-btn-emoji{
      width:42px;
      height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:14px;
      background: rgba(0,0,0,.06);
      font-size:20px;
      flex: 0 0 42px;
    }

    .rm-btn-text{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
      flex:1;
    }

    .rm-btn-title{
      font-weight:900;
      font-size:15px;
      line-height:1.1;
    }

    .rm-btn-sub{
      font-size:12.5px;
      color:var(--muted);
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .rm-btn-arrow{
      font-size:22px;
      opacity:.35;
      line-height:1;
      margin-left:4px;
    }

    .rm-btn-accent{
      background:var(--paper2);
    }
    .rm-btn-accent:hover{
      background:#fbf5ea;
    }

    /* Optional: simple bottom nav placeholder spacing (if your app has a bottom bar elsewhere) */
    .spacer{
      height:18px;
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">Recovery Misfits</div>
    <div class="sub">Tools</div>
  </header>

  <main>
    <section class="panel">
      <h1>Tools</h1>
      <p class="hint">Simple stuff we can actually use.</p>

      <div class="tools-buttons">
        <a class="rm-btn" href="./burnpad.html" aria-label="Open Burn Pad">
          <span class="rm-btn-emoji">📝</span>
          <span class="rm-btn-text">
            <span class="rm-btn-title">Burn Pad</span>
            <span class="rm-btn-sub">Get it out. Let it go.</span>
          </span>
          <span class="rm-btn-arrow">›</span>
        </a>

        <a class="rm-btn" href="./gratitude.html" aria-label="Open Gratitude">
          <span class="rm-btn-emoji">🙏</span>
          <span class="rm-btn-text">
            <span class="rm-btn-title">Gratitude</span>
            <span class="rm-btn-sub">Find one thing that didn’t suck today.</span>
          </span>
          <span class="rm-btn-arrow">›</span>
        </a>

        <a class="rm-btn rm-btn-accent"
           href="https://www.aa.org/meeting-guide-app"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="Open AA Meeting Guide App info in a new tab">
          <span class="rm-btn-emoji">📍</span>
          <span class="rm-btn-text">
            <span class="rm-btn-title">Meeting Guide App</span>
            <span class="rm-btn-sub">Official AA meeting finder (opens AA.org)</span>
          </span>
          <span class="rm-btn-arrow">›</span>
        </a>
      </div>

      <div class="spacer"></div>
    </section>
  </main>
</body>
</html>
