<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Misfits — Tools</title>

  <link rel="stylesheet" href="./css/tool-styles.css">
</head>

<body>

<header>Tools</header>

<main>
  <section class="panel">
    <h2>Tools</h2>
    <p>Simple stuff we can actually use.</p>

    <div class="toolGrid">

      <a class="toolCard" href="./burnpad.html">
        <div class="pin"></div>
        <div class="toolTop">
          <div class="toolEmoji">📝</div>
          <h3 class="toolTitle">Burn Pad</h3>
        </div>
        <p class="toolSub">Get it out. Let it go.</p>
      </a>

      <a class="toolCard" href="./gratitude.html">
        <div class="pin pin2"></div>
        <div class="toolTop">
          <div class="toolEmoji">🙏</div>
          <h3 class="toolTitle">Gratitude</h3>
        </div>
        <p class="toolSub">Find one thing that didn’t suck today.</p>
      </a>

    </div>
  </section>
</main>

<!-- Sobriety Bar -->
<div class="sobrietyBar" id="sobrietyBar">
  <div class="sobDays" id="sobDays">Set your sobriety date</div>
  <div class="sobSince" id="sobSince">Tap to enter</div>
</div>

<!-- Bottom Nav -->
<nav id="bottomBar">
  <a class="navItem" href="./index2.html">
    <svg class="navIcon" viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5"></path><path d="M5 10v11h14V10"></path></svg>
    Home
  </a>

  <a class="navItem active" href="./tools.html">
    <svg class="navIcon" viewBox="0 0 24 24"><path d="M14.7 6.3a5 5 0 0 0-6.4 6.4L3 18l3 3 5.3-5.3a5 5 0 0 0 6.4-6.4l-2.3 2.3-2.8-2.8 2.1-2.5z"></path></svg>
    Tools

  <a class="navItem" href="./readings.html">
    <svg class="navIcon" viewBox="0 0 24 24"><path d="M4 19.5c2-1.2 4-1.2 6 0V5.5c-2-1.2-4-1.2-6 0v14z"></path><path d="M20 19.5c-2-1.2-4-1.2-6 0V5.5c2-1.2 4-1.2 6 0v14z"></path></svg>
    Readings

  <a class="navItem" href="./audio.html">

<script>
const bar = document.getElementById("sobrietyBar");
const daysEl = document.getElementById("sobDays");
const sinceEl = document.getElementById("sobSince");

function daysBetween(date){
  const start = new Date(date);
  const now = new Date();
  return Math.floor((now - start)/(1000*60*60*24));
}

function render(){
  const saved = localStorage.getItem("sobrietyDate");
  if(!saved){
    daysEl.textContent = "Set your sobriety date";
    sinceEl.textContent = "Tap to enter";
    return;
  }
  daysEl.textContent = daysBetween(saved) + " days sober";
  sinceEl.textContent = "Since " + new Date(saved).toLocaleDateString();
}

bar.onclick = () => {
  const d = prompt("Enter sobriety date YYYY-MM-DD");
  if(d) localStorage.setItem("sobrietyDate", d);
  render();
};

render();
</script>

</body>
</html>
