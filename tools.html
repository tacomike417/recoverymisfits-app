<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Misfits — Tools</title>

  <style>
    body{
      margin:0;
      font-family:Roboto, Arial, sans-serif;
      background:#ffffff;
      color:#111;
    }

    header{
      position:sticky;
      top:0;
      background:#fff;
      border-bottom:1px solid rgba(0,0,0,.1);
      padding:12px;
      text-align:center;
      z-index:10;
    }

    .brand{
      font-weight:900;
      font-size:16px;
    }

    main{
      max-width:720px;
      margin:0 auto;
      padding:20px 16px 80px;
    }

    h1{
      margin:0 0 6px 0;
      font-size:18px;
    }

    .hint{
      margin:0 0 16px 0;
      color:rgba(0,0,0,.6);
      font-size:13px;
    }

    /* BUTTON GRID */
    .tools-buttons{
      display:grid;
      gap:14px;
    }

    /* BLACK BUTTON STYLE */
    .rm-btn{
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px;
      border-radius:14px;
      text-decoration:none;
      background:#111;
      color:#fff;
      border:1px solid #000;
      box-shadow:0 3px 0 rgba(0,0,0,.35);
      transition: transform .08s ease, box-shadow .08s ease, background .12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .rm-btn:hover{
      background:#000;
      transform: translateY(-1px);
      box-shadow:0 4px 0 rgba(0,0,0,.35);
    }

    .rm-btn:active{
      transform: translateY(2px);
      box-shadow:0 1px 0 rgba(0,0,0,.35);
    }

    .rm-btn-emoji{
      width:42px;
      height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      background:rgba(255,255,255,.1);
      font-size:22px;
      flex:0 0 42px;
    }

    .rm-btn-text{
      display:flex;
      flex-direction:column;
      gap:3px;
      flex:1;
    }

    .rm-btn-title{
      font-weight:900;
      font-size:16px;
      line-height:1.1;
    }

    .rm-btn-sub{
      font-size:13px;
      opacity:.8;
      line-height:1.2;
    }

    .rm-btn-arrow{
      font-size:20px;
      opacity:.5;
    }

  </style>
</head>

<body>
  <header>
    <div class="brand">Recovery Misfits</div>
  </header>

  <main>
    <h1>Tools</h1>
    <p class="hint">Simple stuff we can actually use.</p>

    <div class="tools-buttons">

      <!-- 🔥 Burn Pad -->
      <a class="rm-btn" href="./burnpad.html">
        <span class="rm-btn-emoji">🔥</span>
        <span class="rm-btn-text">
          <span class="rm-btn-title">Burn Pad</span>
          <span class="rm-btn-sub">Write it. Burn it. Let it go.</span>
        </span>
        <span class="rm-btn-arrow">›</span>
      </a>

      <!-- 🙏 Gratitude -->
      <a class="rm-btn" href="./gratitude.html">
        <span class="rm-btn-emoji">🙏</span>
        <span class="rm-btn-text">
          <span class="rm-btn-title">Gratitude</span>
          <span class="rm-btn-sub">Find one thing that didn’t suck today.</span>
        </span>
        <span class="rm-btn-arrow">›</span>
      </a>

      <!-- 📍 Meeting Guide -->
      <a class="rm-btn"
         href="https://www.aa.org/meeting-guide-app"
         target="_blank"
         rel="noopener noreferrer">
        <span class="rm-btn-emoji">📍</span>
        <span class="rm-btn-text">
          <span class="rm-btn-title">Meeting Guide App</span>
          <span class="rm-btn-sub">Official AA meeting finder.</span>
        </span>
        <span class="rm-btn-arrow">›</span>
      </a>

    </div>
  </main>
</body>
</html>
