<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spiritual Slot Machine — Recovery Misfits</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1b0033" />
  <link rel="icon" href="./icon-192.png">

  <!-- iPhone PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recovery Misfits">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    body{
      margin:0;
      font-family:Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.06), transparent 35%),
        linear-gradient(160deg,#1b0033,#2a0052);
      color:#fff;
      padding-bottom:120px; /* room for bottom nav */
    }

    .wrap{
      max-width:820px;
      margin:0 auto;
      padding:16px 14px 28px;
    }

    .panel{
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.45)),
        linear-gradient(135deg,#d8b24a,#b8891e 55%,#7a520c);
      padding:16px;
      box-shadow:0 18px 48px rgba(0,0,0,.55);
    }

    .slotHeader{
      width:100%;
      max-width:460px;
      display:block;
      margin:0 auto 6px;
    }

    .sub{
      font-size:12px;
      text-align:center;
      opacity:.85;
      margin-bottom:12px;
      font-weight:800;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-bottom:12px;
    }

    .btn{
      border:none;
      padding:12px 14px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
      background:#111;
      color:#fff;
    }

    /* BIG GREEN SPIN */
    #spinBtn{
      background:linear-gradient(#20c35a,#0a8f3b);
      padding:16px 22px;
      font-size:16px;
      min-width:150px;
      box-shadow:0 12px 24px rgba(0,0,0,.4);
    }
    #spinBtn:hover{ background:linear-gradient(#2ae06a,#066a2b); }

    .result{
      border-radius:18px;
      background:#0b0b0b;
      padding:14px;
      min-height:150px;
      position:relative;
    }

    .tag{ font-size:12px; font-weight:900; margin-bottom:8px; }

    .receipt{
      background:#f3efe6;
      color:#111;
      border-radius:14px;
      padding:12px;
    }

    .quote{
      font-family:"Courier New",monospace;
      font-size:18px;
      font-weight:900;
      margin:0;
    }

    .source{
      font-size:12px;
      opacity:.7;
      margin-top:6px;
    }

    /* category glow */
    .result.bigbook{ box-shadow:0 0 20px rgba(44,125,255,.6); }
    .result.oldtimer{ box-shadow:0 0 20px rgba(255,213,74,.6); }
    .result.jackpotOn{ animation: glow 1s infinite alternate; }

    @keyframes glow{
      from{ box-shadow:0 0 12px rgba(255,255,255,.5); }
      to{ box-shadow:0 0 26px rgba(255,255,255,.9); }
    }

    .favorites{ margin-top:16px; }
    .favRow{ border-bottom:1px dashed rgba(255,255,255,.2); padding:8px 0; }

    .toast{
      position:fixed;
      bottom:90px;
      left:50%;
      transform:translateX(-50%);
      background:#fff;
      color:#111;
      padding:10px 12px;
      border-radius:14px;
      opacity:0;
      transition:.2s;
      font-weight:900;
      z-index:2000;
    }
    .toast.show{ opacity:1; }
  </style>
</head>

<body>

  <!-- 🔝 Shared TOP BAR -->
  <div id="rm-topbar"></div>
  <script src="./topbar.js" defer></script>

  <div class="wrap">
    <div class="panel">

      <img src="./slot-header.png" alt="Spiritual Slot Machine" class="slotHeader">
      <div class="sub">Spin for perspective. Rule 62 is the jackpot.</div>

      <div class="row">
        <button id="spinBtn" class="btn">SPIN</button>
        <button id="saveBtn" class="btn" disabled>SAVE</button>
        <button id="shareBtn" class="btn" disabled>SHARE</button>
      </div>

      <div id="resultBox" class="result">
        <div class="tag" id="tag">Ready</div>
        <div class="receipt">
          <p class="quote" id="quote">Pull the lever.</p>
          <div class="source" id="source">The machine is warm.</div>
        </div>
      </div>

      <div class="favorites">
        <strong>Favorites</strong>
        <div id="favList">No favorites yet.</div>
      </div>

    </div>
  </div>

  <div id="toast" class="toast">Saved.</div>

  <!-- 🔻 Shared BOTTOM NAV -->
  <div id="rm-bottom-nav"></div>
  <script src="./nav.js" defer></script>

  <!-- Quote DB -->
  <script src="./slot-quotes.js"></script>

  <script>
  const slotQuotes = window.SLOT_QUOTES || [];

  function buildWeightedPool(quotes){
    const pool=[];
    quotes.forEach(q=>{
      for(let i=0;i<(q.weight||1);i++) pool.push(q);
    });
    return pool;
  }
  const weightedPool=buildWeightedPool(slotQuotes);

  let lastResult=null;
  let favorites=JSON.parse(localStorage.getItem("rm_slot_favs")||"[]");

  const spinBtn=document.getElementById("spinBtn");
  const saveBtn=document.getElementById("saveBtn");
  const shareBtn=document.getElementById("shareBtn");
  const resultBox=document.getElementById("resultBox");
  const quoteEl=document.getElementById("quote");
  const sourceEl=document.getElementById("source");
  const tagEl=document.getElementById("tag");
  const favList=document.getElementById("favList");
  const toast=document.getElementById("toast");

  function showToast(msg){
    toast.textContent=msg;
    toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"),900);
  }

  function renderFavorites(){
    if(!favorites.length){
      favList.textContent="No favorites yet.";
      return;
    }
    favList.innerHTML=favorites.map((f,i)=>`
      <div class="favRow">
        “${f.text}”
        <button onclick="removeFavorite(${i})">Remove</button>
      </div>`).join("");
  }

  window.removeFavorite=function(i){
    favorites.splice(i,1);
    localStorage.setItem("rm_slot_favs",JSON.stringify(favorites));
    renderFavorites();
  };

  function setResult(res){
    lastResult=res;

    tagEl.textContent=res.label;
    quoteEl.textContent=`“${res.text}”`;
    sourceEl.textContent=res.category;

    resultBox.classList.remove("bigbook","oldtimer","jackpotOn");

    if(res.category==="bigbook") resultBox.classList.add("bigbook");
    if(res.category==="oldtimer") resultBox.classList.add("oldtimer");
    if(res.category==="rule62") resultBox.classList.add("jackpotOn");

    saveBtn.disabled=false;
    shareBtn.disabled=!navigator.share;
  }

  function spin(){
    const result=weightedPool[Math.floor(Math.random()*weightedPool.length)];
    setResult(result);
  }

  spinBtn.onclick=spin;

  saveBtn.onclick=()=>{
    if(!lastResult) return;
    favorites.unshift(lastResult);
    localStorage.setItem("rm_slot_favs",JSON.stringify(favorites));
    renderFavorites();
    showToast("Saved.");
  };

  shareBtn.onclick=async()=>{
    if(!navigator.share||!lastResult) return;
    await navigator.share({
      title:"Spiritual Slot Machine",
      text:`“${lastResult.text}” — Recovery Misfits`
    });
  };

  renderFavorites();
  </script>

</body>
</html>
