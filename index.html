<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Misfits v2</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="./icon-192.png">

  <!-- iPhone PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recovery Misfits">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    body{
      margin:0;
      font-family:Roboto,Arial,sans-serif;
      background:#fff;
      padding-bottom:120px; /* sober bar + nav */
    }

    /* ===== IFRAME ===== */
    .frameWrap{
      width:100%;
      height:calc(100vh - 74px - 120px);
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }
  </style>
</head>

<body>

  <!-- Shared TOP BAR (injected by topbar.js) -->
  <div id="rm-topbar"></div>
  <script src="./topbar.js" defer></script>

  <!-- Blogger feed -->
  <div class="frameWrap">
    <iframe src="https://recoverymisfits.blogspot.com/"></iframe>
  </div>

  <!-- Shared SOBER BAR + NAV (injected by nav.js) -->
  <div id="rm-bottom-nav"></div>
  <script src="./nav.js" defer></script>

</body>
</html>
