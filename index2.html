<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Misfits v2</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="./icon-192.png">

  <!-- iPhone/iPad PWA helpers -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recovery Misfits">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    body{
      margin:0;
      font-family:Roboto,Arial,sans-serif;
      background:#fff;
      padding-bottom:110px; /* space for sobriety + nav */
    }

    /* ===== TOP BAR (v2) ===== */
    .rm-topbar{
      position:sticky;
      top:0;
      z-index:9000;
      background:#fff;
      border-bottom:1px solid rgba(0,0,0,.12);
    }

    /* Row 1: title centered, actions right */
    .rm-topbar__row1{
      display:grid;
      grid-template-columns: 1fr auto 1fr; /* left spacer, title, actions */
      align-items:center;
      padding:10px 12px 6px;
      gap:12px;
    }

    .rm-topbar__left{ min-height: 1px; }

    .rm-title{
      text-align:center;
      font-weight:900;
      font-size:16px;
      letter-spacing:.2px;
      line-height:1.2;
      justify-self:center;
      white-space:nowrap;
    }

    .rm-topbar__actions{
      justify-self:end;
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    /* Row 2: status centered */
    .rm-topbar__row2{
      padding:0 12px 10px;
      text-align:center;
    }

    .rm-mode{
      font-size:12px;
      opacity:.75;
      line-height:1.2;
    }

    .rm-btn{
      appearance:none;
      border:1px solid rgba(0,0,0,.18);
      background:#fff;
      color:#111;
      padding:8px 10px;
      border-radius:10px;
      font-weight:700;
      font-size:13px;
      cursor:pointer;
      white-space:nowrap;
    }

    .rm-btn:active{ transform: translateY(1px); }

    /* ✅ Primary button now matches app (black) */
    .rm-btn--primary{
      background:#000;
      color:#fff;
      border-color:#000;
    }
    .rm-btn--primary:active{
      opacity:.9;
    }

    .rm-btn--updates{
      border-color: rgba(0,0,0,.18);
      font-weight:800;
    }

    /* iframe fills screen */
    .frameWrap{
      width:100%;
      height:calc(100vh - 74px - 110px); /* topbar (2-row) + sobriety/nav */
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    /* ===== SOBRIETY BAR ===== */
    .sobrietyBar{
      position:fixed;
      bottom:64px;
      left:0;
      right:0;
      background:#fff;
      border-top:1px solid rgba(0,0,0,.08);
      text-align:center;
      padding:10px 12px;
      z-index:9400;
      font-size:14px;
    }

    .sobrietyBar strong{
      display:block;
      font-size:15px;
      margin-bottom:2px;
    }

    .sobrietyBar span{
      color:#666;
      font-size:12px;
    }

    /* ===== BOTTOM NAV ===== */
    nav#bottomBar{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      height:64px;
      background:#000;
      border-top:1px solid #222;
      display:flex;
      justify-content:space-around;
      align-items:center;
      z-index:9500;
    }

    .navItem{
      flex:1;
      text-align:center;
      text-decoration:none;
      font-size:11px;
      padding:8px 4px;
      color:#bbb;
    }

    .navItem .ico{
      display:block;
      font-size:18px;
      margin-bottom:3px;
    }

    .navItem.active{
      color:#fff;
      font-weight:700;
    }
  </style>
</head>

<body>

  <!-- ===== TOP BAR ===== -->
  <header class="rm-topbar" role="banner">
    <div class="rm-topbar__row1">
      <div class="rm-topbar__left" aria-hidden="true"></div>

      <div class="rm-title">Recovery Misfits v2</div>

      <div class="rm-topbar__actions">
        <!-- Updates pill (optional; shows only if your updates check is wired) -->
        <button id="rm-updates-btn" class="rm-btn rm-btn--updates" style="display:none;">
          🆕 Updates
        </button>

        <button id="rm-install-btn" class="rm-btn rm-btn--primary" style="display:none;">
          Install App • Always Free
        </button>

        <button id="rm-howto-btn" class="rm-btn" style="display:none;">
          How to install
        </button>
      </div>
    </div>

    <div class="rm-topbar__row2">
      <div class="rm-mode" id="rm-mode">Browser Mode</div>
    </div>
  </header>

  <!-- ===== BLOGGER HOME FEED ===== -->
  <div class="frameWrap">
    <iframe src="https://recoverymisfits.blogspot.com/"></iframe>
  </div>

  <!-- ===== SOBRIETY BAR ===== -->
  <div class="sobrietyBar" id="sobrietyBar">
    <strong id="sobrietyDays">—</strong>
    <span id="sobrietyDate">Tap to set sobriety date</span>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav id="bottomBar">
    <a class="navItem active" href="./index2.html">
      <span class="ico">🏠</span>
      Home
    </a>
    <a class="navItem" href="./tools.html">
      <span class="ico">🔧</span>
      Tools
    </a>
    <a class="navItem" href="./readings.html">
      <span class="ico">📖</span>
      Readings
    </a>
    <a class="navItem" href="./audio.html">
      <span class="ico">🎧</span>
      Audio
    </a>
    <a class="navItem" href="./fun.html">
      <span class="ico">🎮</span>
      Fun
    </a>
  </nav>

  <!-- ===== SOBRIETY SCRIPT ===== -->
  <script>
    const bar = document.getElementById("sobrietyBar");
    const daysEl = document.getElementById("sobrietyDays");
    const dateEl = document.getElementById("sobrietyDate");

    function calculateDays(startDate){
      const start = new Date(startDate);
      const now = new Date();
      const diff = now - start;
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function loadSobriety(){
      const saved = localStorage.getItem("sobrietyDate");
      if(!saved){
        daysEl.textContent = "Set your sobriety date";
        dateEl.textContent = "Tap here to enter";
        return;
      }

      const days = calculateDays(saved);
      const pretty = new Date(saved).toLocaleDateString();

      daysEl.textContent = days + " days sober";
      dateEl.textContent = "Since " + pretty;
    }

    bar.addEventListener("click", () => {
      const input = prompt("Enter your sobriety date (YYYY-MM-DD):");
      if(!input) return;
      localStorage.setItem("sobrietyDate", input);
      loadSobriety();
    });

    loadSobriety();
  </script>

  <!-- ===== INSTALL DETECTION SCRIPT ===== -->
  <script>
    (function(){
      const modeEl = document.getElementById('rm-mode');
      const installBtn = document.getElementById('rm-install-btn');
      const howtoBtn = document.getElementById('rm-howto-btn');

      let deferredPrompt = null;

      function isStandalone(){
        return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
          || (window.navigator && window.navigator.standalone === true);
      }

      function isIOS(){
        const ua = navigator.userAgent || '';
        return /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      }

      function setModeText(){
        if (isStandalone()){
          modeEl.textContent = 'Installed (App Mode)';
          installBtn.style.display = 'none';
          howtoBtn.style.display = 'none';
        } else {
          modeEl.textContent = 'Browser Mode';
        }
      }

      setModeText();

      // Chrome/Edge/Android install prompt
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;

        if (!isStandalone()){
          installBtn.style.display = 'inline-flex';
          howtoBtn.style.display = 'none';
        }
      });

      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;

        installBtn.disabled = true;
        try{
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
        } finally {
          deferredPrompt = null;
          installBtn.style.display = 'none';
          installBtn.disabled = false;
          setModeText();
        }
      });

      // iPhone/iPad (no beforeinstallprompt) + general fallback
      setTimeout(() => {
        if (!deferredPrompt && !isStandalone()){
          howtoBtn.style.display = 'inline-flex';
          howtoBtn.textContent = isIOS() ? 'Install (iPhone)' : 'How to install';
        }
      }, 1200);

      howtoBtn.addEventListener('click', () => {
        alert(
          isIOS()
            ? "On iPhone: tap the Share button, then 'Add to Home Screen'."
            : "In Chrome: use the install icon in the address bar or menu → 'Install app'."
        );
      });

      window.addEventListener('appinstalled', () => {
        setModeText();
      });
    })();
  </script>

  <!-- ===== TOP BAR UPDATES PILL (optional; uses updates.html marker) ===== -->
  <script>
    (function(){
      const updatesBtn = document.getElementById('rm-updates-btn');
      if(!updatesBtn) return;

      const UPDATES_PAGE = './updates.html';
      const SEEN_KEY = 'lastSeenUpdateId';

      function extractMarker(html){
        const idMatch = html.match(/data-update-id="([^"]+)"/);
        const titleMatch = html.match(/data-update-title="([^"]+)"/);
        return { id: idMatch ? idMatch[1] : null, title: titleMatch ? titleMatch[1] : null };
      }

      async function checkForNewUpdate(){
        try{
          const res = await fetch(UPDATES_PAGE, { cache: 'no-store' });
          if(!res.ok) return;

          const html = await res.text();
          const marker = extractMarker(html);
          if(!marker.id) return;

          const seen = localStorage.getItem(SEEN_KEY);
          if(seen !== marker.id){
            updatesBtn.style.display = 'inline-flex';
            updatesBtn.onclick = () => window.location.href = UPDATES_PAGE;
          } else {
            updatesBtn.style.display = 'none';
          }
        } catch(e){
          // stay quiet if offline / blocked
        }
      }

      checkForNewUpdate();
    })();
  </script>

</body>
</html>
