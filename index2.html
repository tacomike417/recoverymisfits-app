<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Misfits v2</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="./icon-192.png">

  <!-- iPhone PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recovery Misfits">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    body{
      margin:0;
      font-family:Roboto,Arial,sans-serif;
      background:#fff;
      padding-bottom:120px; /* space for sober bar + nav */
    }

    /* ===== TOP BAR ===== */
    .rm-topbar{
      position:sticky;
      top:0;
      z-index:9000;
      background:#fff;
      border-bottom:1px solid rgba(0,0,0,.12);
    }

    .rm-topbar__row1{
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      padding:10px 12px 6px;
    }

    .rm-title{
      text-align:center;
      font-weight:900;
      font-size:16px;
    }

    .rm-topbar__actions{
      justify-self:end;
      display:flex;
      gap:8px;
    }

    .rm-topbar__row2{
      text-align:center;
      padding-bottom:10px;
    }

    .rm-mode{
      font-size:12px;
      opacity:.75;
    }

    .rm-btn{
      border:1px solid rgba(0,0,0,.18);
      background:#fff;
      color:#111;
      padding:8px 10px;
      border-radius:10px;
      font-weight:700;
      font-size:13px;
      cursor:pointer;
    }

    /* Black install button */
    .rm-btn--primary{
      background:#000;
      color:#fff;
      border-color:#000;
    }

    /* ===== IFRAME ===== */
    .frameWrap{
      width:100%;
      height:calc(100vh - 74px - 120px);
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }
  </style>
</head>

<body>

  <!-- ===== TOP BAR ===== -->
  <header class="rm-topbar">
    <div class="rm-topbar__row1">
      <div></div>

      <div class="rm-title">Recovery Misfits v2</div>

      <div class="rm-topbar__actions">
        <button id="rm-install-btn" class="rm-btn rm-btn--primary" style="display:none;">
          Install App • Always Free
        </button>
        <button id="rm-howto-btn" class="rm-btn" style="display:none;">
          How to install
        </button>
      </div>
    </div>

    <div class="rm-topbar__row2">
      <div class="rm-mode" id="rm-mode">Browser Mode</div>
    </div>
  </header>

  <!-- ===== BLOGGER FEED ===== -->
  <div class="frameWrap">
    <iframe src="https://recoverymisfits.blogspot.com/"></iframe>
  </div>

  <!-- ===== SHARED SOBER BAR + NAV (injected by nav.js) ===== -->
  <div id="rm-bottom-nav"></div>
  <script src="./nav.js" defer></script>

  <!-- ===== INSTALL DETECTION ===== -->
  <script>
    (function(){
      const modeEl = document.getElementById('rm-mode');
      const installBtn = document.getElementById('rm-install-btn');
      const howtoBtn = document.getElementById('rm-howto-btn');

      let deferredPrompt = null;

      function isStandalone(){
        return window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
      }

      function isIOS(){
        return /iPad|iPhone|iPod/.test(navigator.userAgent);
      }

      function setModeText(){
        if (isStandalone()){
          modeEl.textContent = 'Installed (App Mode)';
          installBtn.style.display = 'none';
          howtoBtn.style.display = 'none';
        } else {
          modeEl.textContent = 'Browser Mode';
        }
      }

      setModeText();

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'inline-flex';
      });

      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      });

      // iPhone fallback
      setTimeout(() => {
        if (!deferredPrompt && !isStandalone()){
          howtoBtn.style.display = 'inline-flex';
          howtoBtn.textContent = isIOS() ? 'Install (iPhone)' : 'How to install';
        }
      }, 1200);

      howtoBtn.onclick = () => {
        alert(
          isIOS()
            ? "On iPhone: tap Share → Add to Home Screen."
            : "Use the install icon in your browser."
        );
      };
    })();
  </script>

</body>
</html>
