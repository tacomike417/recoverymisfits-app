<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Misfits</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="./icon-192.png">

  <style>
    body{
      margin:0;
      font-family:Roboto,Arial,sans-serif;
      background:#fff;
      padding-bottom:70px; /* space for bottom bar */
    }

    header{
      position:sticky;
      top:0;
      background:#fff;
      border-bottom:1px solid rgba(0,0,0,.12);
      padding:12px;
      text-align:center;
      z-index:9000;
      font-weight:900;
    }

    /* iframe fills screen */
    .frameWrap{
      width:100%;
      height:calc(100vh - 56px - 70px);
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    /* 🔥 Bottom Bar */
    nav#bottomBar{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      height:64px;
      background:#000;
      border-top:1px solid #222;
      display:flex;
      justify-content:space-around;
      align-items:center;
      z-index:9500;
    }

    .navItem{
      flex:1;
      text-align:center;
      text-decoration:none;
      font-size:11px;
      padding:8px 4px;
      color:#bbb;
    }

    .navItem .ico{
      display:block;
      font-size:18px;
      margin-bottom:3px;
    }

    .navItem.active{
      color:#fff;
      font-weight:700;
    }
  </style>
</head>

<body>

  <header>Recovery Misfits</header>

  <!-- Blogger Reading -->
  <div class="frameWrap">
    <iframe src="https://recoverymisfits.blogspot.com/"></iframe>
  </div>

  <!-- Bottom Navigation -->
  <nav id="bottomBar">
    <a class="navItem active" href="./index2.html">
      <span class="ico">🏠</span>
      Home
    </a>
    <a class="navItem" href="./tools.html">
      <span class="ico">🔧</span>
      Tools
    </a>
    <a class="navItem" href="./readings.html">
      <span class="ico">📖</span>
      Readings
    </a>
    <a class="navItem" href="./audio.html">
      <span class="ico">🎧</span>
      Audio
    </a>
    <a class="navItem" href="./fun.html">
      <span class="ico">🎮</span>
      Fun
    </a>
  </nav>

</body>
</html>
