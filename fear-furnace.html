<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fear Furnace</title>
  <style>
    :root{
      --bg1:#160f14;
      --bg2:#2b1712;
      --panel:#23171b;
      --panel2:#2d1d21;
      --text:#f7efe8;
      --muted:#c7b7aa;
      --accent:#ff9a3c;
      --accent2:#ffcb6b;
      --danger:#ff6b4a;
      --glow:0 0 20px rgba(255,154,60,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,130,70,.12), transparent 30%),
        linear-gradient(180deg, #2a1514 0%, #140d12 55%, #0d090d 100%);
      min-height:100vh;
      overflow-x:hidden;
    }

    .wrap{
      max-width:780px;
      margin:0 auto;
      padding:24px 18px 80px;
    }

    .hero{
      text-align:center;
      margin-bottom:18px;
    }

    .hero h1{
      margin:0;
      font-size:clamp(2rem, 4vw, 3rem);
      letter-spacing:.5px;
    }

    .hero p{
      margin:10px auto 0;
      color:var(--muted);
      max-width:620px;
      line-height:1.5;
      font-size:1rem;
    }

    .furnace-stage{
      position:relative;
      height:290px;
      margin:10px auto 22px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      overflow:hidden;
    }

    .shaft{
      position:absolute;
      top:0;
      left:50%;
      transform:translateX(-50%);
      width:12px;
      height:95px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,160,70,.12));
      opacity:.45;
    }

    .fear-card{
      position:absolute;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      width:min(86%, 420px);
      min-height:72px;
      padding:16px 18px;
      border-radius:18px;
      background:linear-gradient(180deg, #403039, #2a2028);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 16px 30px rgba(0,0,0,.35);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1.35;
      font-weight:700;
      opacity:0;
      pointer-events:none;
    }

    .fear-card.drop{
      animation:dropFear 1.25s ease-in forwards;
    }

    @keyframes dropFear{
      0%{opacity:1; top:18px; transform:translateX(-50%) scale(1) rotate(0deg)}
      70%{opacity:1; top:132px; transform:translateX(-50%) scale(.97) rotate(-2deg)}
      100%{opacity:0; top:190px; transform:translateX(-50%) scale(.55) rotate(6deg)}
    }

    .furnace{
      position:relative;
      width:min(90vw, 360px);
      height:180px;
      border-radius:34px 34px 26px 26px;
      background:
        linear-gradient(180deg, #4a2d28 0%, #2a1919 40%, #1a1115 100%);
      border:2px solid rgba(255,180,120,.18);
      box-shadow:
        inset 0 10px 35px rgba(255,190,120,.05),
        inset 0 -10px 30px rgba(0,0,0,.5),
        0 15px 40px rgba(0,0,0,.35);
    }

    .furnace::before{
      content:"";
      position:absolute;
      inset:16px 20px 34px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.18));
      border:1px solid rgba(255,255,255,.06);
    }

    .mouth{
      position:absolute;
      left:50%;
      bottom:36px;
      transform:translateX(-50%);
      width:210px;
      height:78px;
      border-radius:20px;
      background:
        radial-gradient(circle at 50% 85%, rgba(255,235,140,.9), rgba(255,140,50,.95) 40%, rgba(159,42,12,.9) 70%, #220a0b 100%);
      box-shadow:
        0 0 18px rgba(255,120,40,.55),
        0 0 50px rgba(255,140,40,.25),
        inset 0 0 25px rgba(255,245,170,.2);
      overflow:hidden;
    }

    .furnace.active .mouth{
      animation:pulseFire .9s ease-in-out infinite alternate;
    }

    @keyframes pulseFire{
      from{transform:translateX(-50%) scale(1)}
      to{transform:translateX(-50%) scale(1.03)}
    }

    .flame{
      position:absolute;
      bottom:-8px;
      width:70px;
      height:95px;
      border-radius:50% 50% 45% 45%;
      background:radial-gradient(circle at 50% 65%, #fff6aa 0%, #ffc14a 28%, #ff7f2f 55%, rgba(255,90,20,.3) 75%, transparent 100%);
      filter:blur(.5px);
      opacity:.9;
      animation:flicker 1s infinite ease-in-out alternate;
    }

    .flame.f1{left:18px; animation-delay:.1s}
    .flame.f2{left:68px; height:110px; animation-delay:.35s}
    .flame.f3{left:120px; height:90px; animation-delay:.2s}

    @keyframes flicker{
      from{transform:translateY(4px) scale(.97)}
      to{transform:translateY(-3px) scale(1.05)}
    }

    .ash{
      position:absolute;
      bottom:12px;
      left:50%;
      transform:translateX(-50%);
      color:rgba(255,220,190,.55);
      font-size:.8rem;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    .release-banner{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%) translateY(-8px);
      background:linear-gradient(180deg, rgba(255,193,92,.16), rgba(255,105,56,.1));
      border:1px solid rgba(255,185,110,.35);
      color:#ffe8bd;
      border-radius:999px;
      padding:10px 18px;
      font-weight:700;
      font-size:.95rem;
      opacity:0;
      transition:.35s ease;
      box-shadow:var(--glow);
      text-align:center;
    }

    .release-banner.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .panel{
      background:linear-gradient(180deg, rgba(41,26,30,.96), rgba(28,18,22,.98));
      border:1px solid rgba(255,255,255,.06);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.22);
    }

    .step-tag{
      display:inline-block;
      padding:8px 12px;
      font-size:.85rem;
      font-weight:700;
      border-radius:999px;
      color:#ffe7d1;
      background:rgba(255,158,74,.12);
      border:1px solid rgba(255,158,74,.22);
      margin-bottom:12px;
    }

    .prompt{
      font-size:1.25rem;
      font-weight:800;
      margin:0 0 14px;
      line-height:1.3;
    }

    .help{
      color:var(--muted);
      margin:0 0 14px;
      line-height:1.5;
    }

    textarea, input[type="text"]{
      width:100%;
      background:#140f13;
      border:1px solid rgba(255,255,255,.08);
      color:var(--text);
      border-radius:18px;
      padding:16px;
      font-size:1rem;
      line-height:1.5;
      resize:vertical;
      outline:none;
    }

    textarea:focus, input[type="text"]:focus{
      border-color:rgba(255,170,90,.4);
      box-shadow:0 0 0 3px rgba(255,155,70,.12);
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:14px 18px;
      font-weight:800;
      font-size:.97rem;
      transition:.2s ease;
    }

    .primary{
      background:linear-gradient(180deg, #ffb04f, #ff7b37);
      color:#29140e;
      box-shadow:0 10px 22px rgba(255,128,53,.22);
    }

    .primary:hover{transform:translateY(-1px)}
    .secondary{
      background:#1a1318;
      color:var(--text);
      border:1px solid rgba(255,255,255,.08);
    }

    .secondary:hover{background:#21171d}
    .ghost{
      background:transparent;
      color:#f4cfa5;
      border:1px dashed rgba(255,190,120,.28);
    }

    .choice-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));
      gap:10px;
      margin-top:8px;
      max-height:340px;
      overflow:auto;
      padding-right:2px;
    }

    .choice{
      background:#181116;
      color:var(--text);
      border:1px solid rgba(255,255,255,.07);
      border-radius:18px;
      padding:14px 14px;
      text-align:left;
      line-height:1.35;
      min-height:64px;
    }

    .choice:hover{
      border-color:rgba(255,173,94,.28);
      background:#20161d;
    }

    .choice.selected{
      background:linear-gradient(180deg, rgba(255,143,60,.2), rgba(255,109,49,.14));
      border-color:rgba(255,176,102,.44);
      box-shadow:var(--glow);
    }

    .checklist{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .check{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px 14px;
      border-radius:16px;
      background:#181116;
      border:1px solid rgba(255,255,255,.06);
    }

    .check input{
      width:20px;
      height:20px;
      accent-color:#ff9a3c;
    }

    .quote-box{
      background:rgba(255,162,73,.08);
      border:1px solid rgba(255,190,120,.18);
      color:#ffe8c8;
      padding:14px 16px;
      border-radius:18px;
      line-height:1.55;
      margin:0 0 14px;
    }

    .summary{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .summary .item{
      background:#181116;
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:14px;
    }

    .summary .label{
      color:#f5c38f;
      font-size:.82rem;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:6px;
      font-weight:800;
    }

    .tiny{
      font-size:.92rem;
      color:var(--muted);
      line-height:1.5;
    }

    .hidden{display:none !important}

    @media (max-width:600px){
      .wrap{padding:18px 12px 70px}
      .panel{padding:16px}
      .prompt{font-size:1.14rem}
      .choice-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Fear Furnace</h1>
      <p>
        A simple tool to help you look honestly at a fear, walk it through,
        and let it go.
      </p>
    </div>

    <div class="furnace-stage">
      <div class="release-banner" id="releaseBanner">Fear released. Now go do the next right thing.</div>
      <div class="shaft"></div>
      <div class="fear-card" id="fearCard"></div>

      <div class="furnace" id="furnace">
        <div class="mouth">
          <div class="flame f1"></div>
          <div class="flame f2"></div>
          <div class="flame f3"></div>
        </div>
        <div class="ash">Fear Furnace</div>
      </div>
    </div>

    <div class="panel" id="app"></div>
  </div>

  <script>
    const fearOptions = [
      "Fear of God",
      "Fear of Dying",
      "Fear of Insanity",
      "Fear of Insecurity",
      "Fear of Rejection",
      "Fear of Loneliness",
      "Fear of Disease",
      "Fear of Alcohol",
      "Fear of Drugs",
      "Fear of Relapse",
      "Fear of Sex",
      "Fear of Sin",
      "Fear of Self-Expression",
      "Fear of Authority",
      "Fear of Heights",
      "Fear of Unemployment",
      "Fear of Employment",
      "Fear of Parents",
      "Fear of Losing a Wife",
      "Fear of Losing a Husband",
      "Fear of Losing a Child",
      "Fear of Animals",
      "Fear of Insects",
      "Fear of Police",
      "Fear of Jail",
      "Fear of Doctors",
      "Fear of Stealing",
      "Fear of Creditors",
      "Fear of Being Found Out",
      "Fear of Failure",
      "Fear of Success",
      "Fear of Responsibility",
      "Fear of Physical Pain",
      "Fear of Fear",
      "Fear of Drowning",
      "Fear of Men",
      "Fear of Women",
      "Fear of Being Alone",
      "Fear of People",
      "Fear of Crying",
      "Fear of Poverty",
      "Fear of The Unknown",
      "Fear of Abandonment",
      "Fear of Intimacy",
      "Fear of Disapproval",
      "Fear of Confrontation",
      "Fear of Sobriety",
      "Fear of Hospitals",
      "Fear of Feelings",
      "Fear of Getting Old",
      "Fear of Hurting Others",
      "Fear of Violence",
      "Fear of Writing Inventory",
      "Fear of Being Alive",
      "Fear of Government",
      "Fear of Gangs",
      "Fear of Gossip",
      "Fear of Wealthy People",
      "Fear of Guns",
      "Fear of Change"
    ];

    const underneathOptions = [
      "Rejection",
      "Abandonment",
      "Not feeling good enough",
      "The unknown"
    ];

    const reactionOptions = [
      "Selfish",
      "Self-seeking",
      "Self-reliant",
      "Self-centered"
    ];

    const state = {
      step: 1,
      fearText: "",
      namedFear: "",
      underneath: "",
      ifTrue: "",
      keptFrom: "",
      reactions: [],
      whatToBe: ""
    };

    const app = document.getElementById("app");
    const fearCard = document.getElementById("fearCard");
    const furnace = document.getElementById("furnace");
    const releaseBanner = document.getElementById("releaseBanner");

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function animateFearDrop(text){
      if(!text.trim()) return;
      fearCard.textContent = text.trim();
      fearCard.classList.remove("drop");
      void fearCard.offsetWidth;
      fearCard.classList.add("drop");
      furnace.classList.add("active");
      setTimeout(() => furnace.classList.remove("active"), 1800);
    }

    function showRelease(){
      furnace.classList.add("active");
      releaseBanner.classList.add("show");
      setTimeout(() => {
        releaseBanner.classList.remove("show");
        furnace.classList.remove("active");
      }, 3000);
    }

    function renderChoiceButtons(options, selectedValue, onClickName){
      return `
        <div class="choice-grid">
          ${options.map(opt => `
            <button class="choice ${selectedValue === opt ? 'selected' : ''}" onclick="${onClickName}(${JSON.stringify(opt).replace(/"/g, '&quot;')})">
              ${escapeHtml(opt)}
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderStep1(){
      app.innerHTML = `
        <div class="step-tag">Step 1</div>
        <h2 class="prompt">What fear is bothering you right now?</h2>
        <p class="help">Type it out plain and honest. No perfect wording needed.</p>
        <textarea id="fearInput" rows="5" placeholder="Example: I’m afraid to go to work because my girlfriend just broke up with me.">${escapeHtml(state.fearText)}</textarea>
        <div class="btn-row">
          <button class="primary" onclick="nextFromFear()">Drop it in the furnace</button>
        </div>
      `;
    }

    function renderStep2(){
      app.innerHTML = `
        <div class="step-tag">Step 2</div>
        <h2 class="prompt">What are you really afraid of here?</h2>
        <p class="help">Pick the one that fits best. Don’t overthink it.</p>
        ${renderChoiceButtons(fearOptions, state.namedFear, "pickNamedFear")}
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromNamedFear()">Next</button>
        </div>
      `;
    }

    function renderStep3(){
      app.innerHTML = `
        <div class="step-tag">Step 3</div>
        <h2 class="prompt">Underneath that… which one fits best?</h2>
        <p class="help">This is just to help you look a little deeper.</p>
        ${renderChoiceButtons(underneathOptions, state.underneath, "pickUnderneath")}
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromUnderneath()">Next</button>
        </div>
      `;
    }

    function renderStep4(){
      app.innerHTML = `
        <div class="step-tag">Step 4</div>
        <h2 class="prompt">If this fear actually came true… what would happen?</h2>
        <p class="help">Write what your mind tells you would happen.</p>
        <textarea id="ifTrueInput" rows="5" placeholder="Write it out...">${escapeHtml(state.ifTrue)}</textarea>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromIfTrue()">Next</button>
        </div>
      `;
    }

    function renderStep5(){
      app.innerHTML = `
        <div class="step-tag">Step 5</div>
        <h2 class="prompt">What has this fear kept you from doing?</h2>
        <p class="help">This is where we look at the cost.</p>
        <textarea id="keptFromInput" rows="5" placeholder="Write it out...">${escapeHtml(state.keptFrom)}</textarea>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromKeptFrom()">Next</button>
        </div>
      `;
    }

    function renderStep6(){
      app.innerHTML = `
        <div class="step-tag">Step 6</div>
        <h2 class="prompt">How have you been reacting to this fear?</h2>
        <p class="help">Check any that fit.</p>
        <div class="checklist">
          ${reactionOptions.map(opt => `
            <label class="check">
              <input type="checkbox" value="${escapeHtml(opt)}" ${state.reactions.includes(opt) ? "checked" : ""} onchange="toggleReaction(this.value, this.checked)" />
              <span>${escapeHtml(opt)}</span>
            </label>
          `).join("")}
        </div>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromReactions()">Next</button>
        </div>
      `;
    }

    function renderStep7(){
      app.innerHTML = `
        <div class="step-tag">Step 7</div>
        <h2 class="prompt">What would God have you be instead?</h2>
        <div class="quote-box">
          “We ask Him to remove our fear and direct our attention to what He would have us be.”
          <br />— Alcoholics Anonymous, p. 68
        </div>
        <textarea id="whatToBeInput" rows="5" placeholder="Example: honest, trusting, patient, willing, courageous...">${escapeHtml(state.whatToBe)}</textarea>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="finishFurnace()">Release it</button>
        </div>
      `;
    }

    function renderStep8(){
      app.innerHTML = `
        <div class="step-tag">Done</div>
        <h2 class="prompt">You walked through the fear.</h2>
        <p class="help">Here’s what you wrote. Read it over slow.</p>

        <div class="summary">
          <div class="item">
            <div class="label">What fear was bothering you</div>
            <div>${escapeHtml(state.fearText)}</div>
          </div>

          <div class="item">
            <div class="label">What you were really afraid of</div>
            <div>${escapeHtml(state.namedFear)}</div>
          </div>

          <div class="item">
            <div class="label">Underneath that</div>
            <div>${escapeHtml(state.underneath)}</div>
          </div>

          <div class="item">
            <div class="label">If it came true</div>
            <div>${escapeHtml(state.ifTrue)}</div>
          </div>

          <div class="item">
            <div class="label">What it has kept you from doing</div>
            <div>${escapeHtml(state.keptFrom)}</div>
          </div>

          <div class="item">
            <div class="label">How you were reacting</div>
            <div>${state.reactions.length ? escapeHtml(state.reactions.join(", ")) : "<span class='tiny'>Nothing checked.</span>"}</div>
          </div>

          <div class="item">
            <div class="label">What God would have you be instead</div>
            <div>${escapeHtml(state.whatToBe)}</div>
          </div>
        </div>

        <div class="btn-row">
          <button class="secondary" onclick="startOver()">Start another fear</button>
        </div>
      `;
    }

    function render(){
      switch(state.step){
        case 1: renderStep1(); break;
        case 2: renderStep2(); break;
        case 3: renderStep3(); break;
        case 4: renderStep4(); break;
        case 5: renderStep5(); break;
        case 6: renderStep6(); break;
        case 7: renderStep7(); break;
        case 8: renderStep8(); break;
      }
    }

    function goBack(){
      if(state.step > 1) state.step--;
      render();
    }

    window.nextFromFear = function(){
      const value = document.getElementById("fearInput").value.trim();
      if(!value){
        alert("Write the fear first.");
        return;
      }
      state.fearText = value;
      animateFearDrop(value);
      state.step = 2;
      setTimeout(render, 350);
    };

    window.pickNamedFear = function(value){
      state.namedFear = value;
      render();
    };

    window.nextFromNamedFear = function(){
      if(!state.namedFear){
        alert("Pick the fear that fits best.");
        return;
      }
      state.step = 3;
      render();
    };

    window.pickUnderneath = function(value){
      state.underneath = value;
      render();
    };

    window.nextFromUnderneath = function(){
      if(!state.underneath){
        alert("Pick the one underneath it that fits best.");
        return;
      }
      state.step = 4;
      render();
    };

    window.nextFromIfTrue = function(){
      const value = document.getElementById("ifTrueInput").value.trim();
      if(!value){
        alert("Write what would happen if it came true.");
        return;
      }
      state.ifTrue = value;
      state.step = 5;
      render();
    };

    window.nextFromKeptFrom = function(){
      const value = document.getElementById("keptFromInput").value.trim();
      if(!value){
        alert("Write what this fear has kept you from doing.");
        return;
      }
      state.keptFrom = value;
      state.step = 6;
      render();
    };

    window.toggleReaction = function(value, checked){
      if(checked){
        if(!state.reactions.includes(value)) state.reactions.push(value);
      } else {
        state.reactions = state.reactions.filter(v => v !== value);
      }
    };

    window.nextFromReactions = function(){
      state.step = 7;
      render();
    };

    window.finishFurnace = function(){
      const value = document.getElementById("whatToBeInput").value.trim();
      if(!value){
        alert("Write what God would have you be instead.");
        return;
      }
      state.whatToBe = value;
      animateFearDrop(state.namedFear || state.fearText);
      showRelease();
      state.step = 8;
      setTimeout(render, 450);
    };

    window.startOver = function(){
      state.step = 1;
      state.fearText = "";
      state.namedFear = "";
      state.underneath = "";
      state.ifTrue = "";
      state.keptFrom = "";
      state.reactions = [];
      state.whatToBe = "";
      render();
    };

    render();
  </script>
