<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fear Furnace</title>
  <style>
    :root{
      --bg:#ffffff;
      --panel:#ffffff;
      --line:#111111;
      --soft:#666666;
      --soft2:#8a8a8a;
      --fill:#f5f5f5;
      --fill2:#efefef;
      --text:#111111;
      --radius:22px;
      --shadow:0 8px 24px rgba(0,0,0,.06);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:20px 14px 80px;
    }

    .hero{
      text-align:center;
      margin-bottom:16px;
    }

    .hero h1{
      margin:0;
      font-size:clamp(2rem, 4vw, 2.6rem);
      letter-spacing:.4px;
    }

    .hero p{
      margin:10px auto 0;
      max-width:560px;
      color:var(--soft);
      line-height:1.5;
      font-size:1rem;
    }

    .signal-row{
      min-height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:8px 0 16px;
    }

    .signal{
      display:none;
      align-items:center;
      gap:10px;
      font-size:.96rem;
      color:var(--soft);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 14px;
      background:#fff;
    }

    .signal.show{
      display:flex;
    }

    .ember{
      width:14px;
      height:14px;
      border-radius:50%;
      background:#111;
      animation:pulse 1s ease-in-out infinite;
      position:relative;
      flex:0 0 14px;
    }

    .ember::after{
      content:"";
      position:absolute;
      inset:-6px;
      border:1px solid #111;
      border-radius:50%;
      opacity:.25;
      animation:ripple 1s ease-out infinite;
    }

    @keyframes pulse{
      0%,100%{transform:scale(.78); opacity:.55;}
      50%{transform:scale(1); opacity:1;}
    }

    @keyframes ripple{
      0%{transform:scale(.6); opacity:.35;}
      100%{transform:scale(1.55); opacity:0;}
    }

    .panel{
      background:var(--panel);
      border:2px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
    }

    .tag{
      display:inline-block;
      padding:8px 12px;
      border:1.5px solid var(--line);
      border-radius:999px;
      font-weight:700;
      font-size:.9rem;
      margin-bottom:12px;
      background:#fff;
    }

    .prompt{
      margin:0 0 12px;
      font-size:1.22rem;
      line-height:1.35;
    }

    .help{
      margin:0 0 14px;
      color:var(--soft);
      line-height:1.5;
    }

    textarea,
    input[type="text"]{
      width:100%;
      border:2px solid var(--line);
      border-radius:18px;
      padding:15px;
      font-size:1rem;
      line-height:1.5;
      color:var(--text);
      background:#fff;
      outline:none;
      resize:vertical;
    }

    textarea:focus,
    input[type="text"]:focus{
      background:#fff;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:13px 18px;
      font-weight:800;
      font-size:.96rem;
      transition:.15s ease;
    }

    button:hover{
      transform:translateY(-1px);
    }

    .primary{
      background:#111;
      color:#fff;
      border:2px solid #111;
    }

    .secondary{
      background:#fff;
      color:#111;
      border:2px solid #111;
    }

    .ghost{
      background:#f3f3f3;
      color:#111;
      border:2px dashed #111;
    }

    .choice-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:10px;
      margin-top:8px;
    }

    .choice{
      background:#fff;
      color:#111;
      border:2px solid #111;
      border-radius:18px;
      padding:14px;
      text-align:left;
      line-height:1.35;
      min-height:62px;
      font-weight:700;
    }

    .choice.selected{
      background:#111;
      color:#fff;
    }

    .subsection{
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid #d7d7d7;
    }

    .search-wrap{
      margin:12px 0 12px;
    }

    .selected-box{
      margin-top:12px;
      padding:14px;
      border:2px solid #111;
      border-radius:18px;
      background:#f7f7f7;
      line-height:1.45;
      font-weight:700;
    }

    .selected-box .mini{
      display:block;
      font-size:.84rem;
      color:var(--soft);
      font-weight:700;
      margin-bottom:4px;
      text-transform:uppercase;
      letter-spacing:.5px;
    }

    .checklist{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .check{
      display:flex;
      align-items:center;
      gap:12px;
      border:2px solid #111;
      border-radius:16px;
      padding:14px;
      background:#fff;
    }

    .check input{
      width:20px;
      height:20px;
      accent-color:#111;
      flex:0 0 20px;
    }

    .quote-box{
      border:2px solid #111;
      border-radius:18px;
      padding:14px;
      margin:0 0 14px;
      background:#f7f7f7;
      line-height:1.55;
      font-style:italic;
    }

    .summary{
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .item{
      border:2px solid #111;
      border-radius:18px;
      padding:14px;
      background:#fff;
    }

    .label{
      font-size:.82rem;
      text-transform:uppercase;
      letter-spacing:.7px;
      margin-bottom:6px;
      color:var(--soft);
      font-weight:800;
    }

    .done-wrap{
      text-align:center;
    }

    .meditation-wrap{
      margin-top:16px;
      padding:16px;
      border:2px solid #111;
      border-radius:18px;
      text-align:center;
      background:#f7f7f7;
    }

    .clock{
      font-size:2rem;
      font-weight:800;
      letter-spacing:1px;
      margin:8px 0 12px;
    }

    .done-screen{
      text-align:center;
      padding:12px 4px 4px;
    }

    .done-screen h2{
      margin:0 0 8px;
      font-size:1.5rem;
    }

    .done-screen p{
      margin:0 0 14px;
      color:var(--soft);
      line-height:1.5;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:640px){
      .wrap{padding:16px 12px 70px}
      .panel{padding:16px}
      .choice-grid{grid-template-columns:1fr 1fr}
    }

    @media (max-width:460px){
      .choice-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Fear Furnace</h1>
      <p>
        A simple tool to help you look honestly at a fear, walk it through, and let it go.
      </p>
    </div>

    <div class="signal-row">
      <div class="signal" id="signal">
        <div class="ember"></div>
        <span id="signalText">Working through it…</span>
      </div>
    </div>

    <div class="panel" id="app"></div>
  </div>

  <script>
    const categories = {
      "Relationship": [
        "Fear of Rejection",
        "Fear of Loneliness",
        "Fear of Abandonment",
        "Fear of Intimacy",
        "Fear of Losing a Wife",
        "Fear of Losing a Husband",
        "Fear of Losing a Child",
        "Fear of Men",
        "Fear of Women",
        "Fear of Parents",
        "Fear of People",
        "Fear of Hurting Others",
        "Fear of Disapproval",
        "Fear of Gossip"
      ],
      "Identity / Emotional": [
        "Fear of Insecurity",
        "Fear of Self-Expression",
        "Fear of Failure",
        "Fear of Success",
        "Fear of Responsibility",
        "Fear of Feelings",
        "Fear of Crying",
        "Fear of Being Found Out",
        "Fear of Fear",
        "Fear of Being Alive",
        "Fear of Writing Inventory"
      ],
      "Health / Death": [
        "Fear of Dying",
        "Fear of Insanity",
        "Fear of Disease",
        "Fear of Physical Pain",
        "Fear of Hospitals",
        "Fear of Doctors",
        "Fear of Getting Old"
      ],
      "Addiction / Recovery": [
        "Fear of Alcohol",
        "Fear of Drugs",
        "Fear of Relapse",
        "Fear of Sobriety"
      ],
      "Authority / Consequences": [
        "Fear of Authority",
        "Fear of Police",
        "Fear of Jail",
        "Fear of Government",
        "Fear of Gangs",
        "Fear of Creditors",
        "Fear of Stealing"
      ],
      "Work / Money / Stability": [
        "Fear of Unemployment",
        "Fear of Employment",
        "Fear of Poverty",
        "Fear of Wealthy People",
        "Fear of Change"
      ],
      "Spiritual": [
        "Fear of God",
        "Fear of Sin"
      ],
      "Physical / Situational": [
        "Fear of Heights",
        "Fear of Animals",
        "Fear of Insects",
        "Fear of Drowning",
        "Fear of Violence",
        "Fear of Guns",
        "Fear of Confrontation",
        "Fear of The Unknown"
      ]
    };

    const underneathOptions = [
      "Rejection",
      "Abandonment",
      "Not feeling good enough",
      "The unknown"
    ];

    const reactionOptions = [
      "Selfish",
      "Self-seeking",
      "Self-reliant",
      "Self-centered"
    ];

    const state = {
      step: 1,
      fearText: "",
      selectedCategory: "",
      fearSearch: "",
      namedFear: "",
      underneath: "",
      ifTrue: "",
      keptFrom: "",
      reactions: [],
      meditationRunning: false,
      meditationSeconds: 30,
      meditationInterval: null
    };

    const app = document.getElementById("app");
    const signal = document.getElementById("signal");
    const signalText = document.getElementById("signalText");

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showSignal(text = "Working through it…", ms = 1100){
      signalText.textContent = text;
      signal.classList.add("show");
      setTimeout(() => {
        signal.classList.remove("show");
      }, ms);
    }

    function renderCategoryButtons(){
      return `
        <div class="choice-grid">
          ${Object.keys(categories).map(cat => `
            <button class="choice ${state.selectedCategory === cat ? 'selected' : ''}" onclick="pickCategory(${JSON.stringify(cat).replace(/"/g, '&quot;')})">
              ${escapeHtml(cat)}
            </button>
          `).join("")}
        </div>
      `;
    }

    function getFilteredFears(){
      if(!state.selectedCategory) return [];
      const all = categories[state.selectedCategory] || [];
      const q = state.fearSearch.trim().toLowerCase();
      if(!q) return all;
      return all.filter(item => item.toLowerCase().includes(q));
    }

    function renderFearChoices(){
      if(!state.selectedCategory) return "";
      if(state.namedFear){
        return `
          <div class="selected-box">
            <span class="mini">Selected fear</span>
            ${escapeHtml(state.namedFear)}
          </div>
        `;
      }

      const filtered = getFilteredFears();

      return `
        <div class="subsection">
          <p class="help"><strong>${escapeHtml(state.selectedCategory)}</strong></p>
          <div class="search-wrap">
            <input type="text" id="fearSearchInput" placeholder="Search this list..." value="${escapeHtml(state.fearSearch)}" oninput="updateFearSearch(this.value)" />
          </div>
          <div class="choice-grid">
            ${filtered.map(item => `
              <button class="choice" onclick="pickNamedFear(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                ${escapeHtml(item)}
              </button>
            `).join("")}
          </div>
          ${filtered.length === 0 ? `<p class="help" style="margin-top:12px;">No matches in this category.</p>` : ""}
        </div>
      `;
    }

    function renderStep1(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">What fear is bothering you right now?</h2>
        <p class="help">Type it out plain and honest. No perfect wording needed.</p>
        <textarea id="fearInput" rows="5" placeholder="Example: I’m afraid to go to work because my girlfriend just broke up with me.">${escapeHtml(state.fearText)}</textarea>
        <div class="btn-row">
          <button class="primary" onclick="nextFromFear()">Keep going</button>
        </div>
      `;
    }

    function renderStep2(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">What’s the nature of this fear?</h2>
        <p class="help">Start with the category that fits best. Then pick the fear that feels closest to what’s going on.</p>
        ${renderCategoryButtons()}
        ${renderFearChoices()}
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromNamedFear()">Next</button>
        </div>
      `;
    }

    function renderStep3(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">Is this fear feeling like one of these?</h2>
        <p class="help">Pick the one that feels closest.</p>
        <div class="choice-grid">
          ${underneathOptions.map(opt => `
            <button class="choice ${state.underneath === opt ? 'selected' : ''}" onclick="pickUnderneath(${JSON.stringify(opt).replace(/"/g, '&quot;')})">
              ${escapeHtml(opt)}
            </button>
          `).join("")}
        </div>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromUnderneath()">Next</button>
        </div>
      `;
    }

    function renderStep4(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">If this fear actually came true… what would happen?</h2>
        <p class="help">Write what your mind tells you would happen.</p>
        <textarea id="ifTrueInput" rows="5" placeholder="Write it out...">${escapeHtml(state.ifTrue)}</textarea>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromIfTrue()">Next</button>
        </div>
      `;
    }

    function renderStep5(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">What has this fear kept you from doing?</h2>
        <p class="help">This is where we look at the cost.</p>
        <textarea id="keptFromInput" rows="5" placeholder="Write it out...">${escapeHtml(state.keptFrom)}</textarea>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromKeptFrom()">Next</button>
        </div>
      `;
    }

    function renderStep6(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">Where did I get the ball rolling on this fear?</h2>
        <p class="help">Check any that fit.</p>
        <div class="checklist">
          ${reactionOptions.map(opt => `
            <label class="check">
              <input type="checkbox" value="${escapeHtml(opt)}" ${state.reactions.includes(opt) ? "checked" : ""} onchange="toggleReaction(this.value, this.checked)" />
              <span>${escapeHtml(opt)}</span>
            </label>
          `).join("")}
        </div>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="finishFearWork()">Next</button>
        </div>
      `;
    }

    function renderStep7(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">Here’s what you came up with.</h2>
        <div class="summary">
          <div class="item">
            <div class="label">What fear was bothering you</div>
            <div>${escapeHtml(state.fearText)}</div>
          </div>

          <div class="item">
            <div class="label">What you were really afraid of</div>
            <div>${escapeHtml(state.namedFear)}</div>
          </div>

          <div class="item">
            <div class="label">What this fear feels like underneath</div>
            <div>${escapeHtml(state.underneath)}</div>
          </div>

          <div class="item">
            <div class="label">If it came true</div>
            <div>${escapeHtml(state.ifTrue)}</div>
          </div>

          <div class="item">
            <div class="label">What it has kept you from doing</div>
            <div>${escapeHtml(state.keptFrom)}</div>
          </div>

          <div class="item">
            <div class="label">Where you got the ball rolling</div>
            <div>${state.reactions.length ? escapeHtml(state.reactions.join(", ")) : "Nothing checked."}</div>
          </div>

          <div class="item">
            <div class="label">Big Book reminder</div>
            <div>“We ask Him to remove our fear and direct our attention to what He would have us be.” — Alcoholics Anonymous, p. 68</div>
          </div>
        </div>

        <div class="btn-row">
          <button class="secondary" onclick="startOver()">Work on another fear?</button>
          <button class="primary" onclick="showMeditation()">I’m done</button>
        </div>
      `;
    }

    function renderStep8(){
      const seconds = state.meditationSeconds;
      const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
      const ss = String(seconds % 60).padStart(2, "0");

      app.innerHTML = `
        <div class="done-screen">
          <h2>Nice work.</h2>
          <p>Take 30 seconds and sit still with it.</p>

          <div class="meditation-wrap">
            <div class="label" style="margin-bottom:8px;">30 second meditation</div>
            <div class="clock" id="clock">${mm}:${ss}</div>
            <div class="btn-row" style="justify-content:center;">
              ${
                state.meditationRunning
                ? `<button class="secondary" onclick="pauseMeditation()">Pause</button>`
                : `<button class="primary" onclick="startMeditation()">Start</button>`
              }
              <button class="secondary" onclick="resetMeditation()">Reset</button>
              <button class="ghost" onclick="startOver()">Work on another fear?</button>
            </div>
          </div>
        </div>
      `;
    }

    function render(){
      switch(state.step){
        case 1: renderStep1(); break;
        case 2: renderStep2(); break;
        case 3: renderStep3(); break;
        case 4: renderStep4(); break;
        case 5: renderStep5(); break;
        case 6: renderStep6(); break;
        case 7: renderStep7(); break;
        case 8: renderStep8(); break;
      }
    }

    function goBack(){
      if(state.step > 1){
        state.step--;
        render();
      }
    }

    window.nextFromFear = function(){
      const value = document.getElementById("fearInput").value.trim();
      if(!value){
        alert("Write the fear first.");
        return;
      }
      state.fearText = value;
      showSignal("Looking at it…");
      state.step = 2;
      setTimeout(render, 250);
    };

    window.pickCategory = function(value){
      if(state.selectedCategory !== value){
        state.selectedCategory = value;
        state.namedFear = "";
        state.fearSearch = "";
      }
      render();
    };

    window.updateFearSearch = function(value){
      state.fearSearch = value;
      render();
      const el = document.getElementById("fearSearchInput");
      if(el){
        el.focus();
        el.setSelectionRange(value.length, value.length);
      }
    };

    window.pickNamedFear = function(value){
      state.namedFear = value;
      render();
    };

    window.nextFromNamedFear = function(){
      if(!state.namedFear){
        alert("Pick the fear that fits best.");
        return;
      }
      showSignal("Taking it a little deeper…");
      state.step = 3;
      setTimeout(render, 250);
    };

    window.pickUnderneath = function(value){
      state.underneath = value;
      render();
    };

    window.nextFromUnderneath = function(){
      if(!state.underneath){
        alert("Pick the one that feels closest.");
        return;
      }
      state.step = 4;
      render();
    };

    window.nextFromIfTrue = function(){
      const value = document.getElementById("ifTrueInput").value.trim();
      if(!value){
        alert("Write what would happen if it came true.");
        return;
      }
      state.ifTrue = value;
      state.step = 5;
      render();
    };

    window.nextFromKeptFrom = function(){
      const value = document.getElementById("keptFromInput").value.trim();
      if(!value){
        alert("Write what this fear has kept you from doing.");
        return;
      }
      state.keptFrom = value;
      state.step = 6;
      render();
    };

    window.toggleReaction = function(value, checked){
      if(checked){
        if(!state.reactions.includes(value)) state.reactions.push(value);
      } else {
        state.reactions = state.reactions.filter(v => v !== value);
      }
    };

    window.finishFearWork = function(){
      showSignal("Putting it together…");
      state.step = 7;
      setTimeout(render, 250);
    };

    window.showMeditation = function(){
      state.step = 8;
      state.meditationRunning = false;
      state.meditationSeconds = 30;
      clearInterval(state.meditationInterval);
      state.meditationInterval = null;
      render();
    };

    window.startMeditation = function(){
      if(state.meditationRunning) return;
      state.meditationRunning = true;
      render();

      state.meditationInterval = setInterval(() => {
        if(state.meditationSeconds > 0){
          state.meditationSeconds--;
          const clock = document.getElementById("clock");
          if(clock){
            const mm = String(Math.floor(state.meditationSeconds / 60)).padStart(2, "0");
            const ss = String(state.meditationSeconds % 60).padStart(2, "0");
            clock.textContent = `${mm}:${ss}`;
          }
        } else {
          clearInterval(state.meditationInterval);
          state.meditationInterval = null;
          state.meditationRunning = false;
          render();
          showSignal("Done.");
        }
      }, 1000);
    };

    window.pauseMeditation = function(){
      state.meditationRunning = false;
      clearInterval(state.meditationInterval);
      state.meditationInterval = null;
      render();
    };

    window.resetMeditation = function(){
      state.meditationRunning = false;
      clearInterval(state.meditationInterval);
      state.meditationInterval = null;
      state.meditationSeconds = 30;
      render();
    };

    window.startOver = function(){
      clearInterval(state.meditationInterval);
      state.meditationInterval = null;

      state.step = 1;
      state.fearText = "";
      state.selectedCategory = "";
      state.fearSearch = "";
      state.namedFear = "";
      state.underneath = "";
      state.ifTrue = "";
      state.keptFrom = "";
      state.reactions = [];
      state.meditationRunning = false;
      state.meditationSeconds = 30;
      render();
    };

    render();
  </script>
</body>
</html>
