<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Recovery Misfits — Sobriety Date</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000" />
<link rel="icon" href="./icon-192.png">

<!-- SOCIAL SHARE -->
<meta property="og:title" content="Recovery Misfits — Sobriety Counts">
<meta property="og:description" content="One day at a time. Still here.">
<meta property="og:image" content="https://blogger.googleusercontent.com/img/a/AVvXsEhMQkk3xaDJyzM5uvXRSakqjBxcP3TCgJsgZddmCHAjaJWRpwdVyLxsiX9WyMaPf-OewzrRFiiZLUNsFM9krRLpW6vbwxLoMLIc9ZLu9YvDzcAxFAjif8zgEL1zqIps6LIVRYkCUCNuT-Rh6RIETLU9z61WpcoWkU4qrT2vQFy4-2rvGDpwz_atWzZ4-sya=s1600">

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#f5f1e8;
  font-family:Arial;
}

.page{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.bigCount{
  font-size:80px;
  font-weight:900;
  text-align:center;
}

.shareBtn{
  margin-top:20px;
  width:100%;
  padding:18px;
  font-size:18px;
  font-weight:900;
  border-radius:20px;
  background:#e8dcc3;
  color:#111;
  border:none;
}
</style>
</head>

<body>

<div class="page">

<h2>Days Sober</h2>
<div id="dayCount" class="bigCount">0</div>

<button class="shareBtn" id="shareFriendsBtn">
Share With Friends
</button>

</div>

<script>
const SHARE_URL = "https://recoverymisfits.blogspot.com/";
const SOBER_KEY = "rm_sober_date";

function today(){
  const d=new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function getDays(){
  const s=localStorage.getItem(SOBER_KEY);
  if(!s) return 0;
  const start=new Date(s);
  const now=new Date();
  return Math.floor((now-start)/(1000*60*60*24))+1;
}

function render(){
  document.getElementById("dayCount").innerText=getDays();
}

render();

function milestoneLabel(d){
  if(d===30) return "30 DAYS";
  if(d===60) return "60 DAYS";
  if(d===90) return "90 DAYS";
  if(d===180) return "6 MONTHS";
  if(d===365) return "1 YEAR";
  return d+" DAYS";
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

async function makeImage(){
  const canvas=document.createElement("canvas");
  canvas.width=1080;
  canvas.height=1350;
  const ctx=canvas.getContext("2d");

  const days=getDays();

  ctx.fillStyle="#000";
  ctx.fillRect(0,0,1080,1350);

  // LOGO
  const img=new Image();
  img.src="https://blogger.googleusercontent.com/img/a/AVvXsEhMQkk3xaDJyzM5uvXRSakqjBxcP3TCgJsgZddmCHAjaJWRpwdVyLxsiX9WyMaPf-OewzrRFiiZLUNsFM9krRLpW6vbwxLoMLIc9ZLu9YvDzcAxFAjif8zgEL1zqIps6LIVRYkCUCNuT-Rh6RIETLU9z61WpcoWkU4qrT2vQFy4-2rvGDpwz_atWzZ4-sya=s1600";
  await new Promise(r=>img.onload=r);

  ctx.drawImage(img,390,40,300,300);

  ctx.fillStyle="#fff";
  ctx.font="900 200px Arial";
  ctx.textAlign="center";
  ctx.fillText(days,540,600);

  ctx.font="40px Arial";
  ctx.fillText("DAYS SOBER",540,670);

  // milestones
  const list=[30,60,90,180,365];
  list.forEach((m,i)=>{
    const hit=days>=m;
    const x=100+i*180;
    const y=750;

    roundRect(ctx,x,y,150,60,20);
    ctx.fillStyle=hit?"#e8dcc3":"#222";
    ctx.fill();

    ctx.fillStyle=hit?"#000":"#fff";
    ctx.font="20px Arial";
    ctx.fillText(milestoneLabel(m),x+75,y+38);
  });

  ctx.fillStyle="#aaa";
  ctx.font="28px Arial";
  ctx.fillText("recoverymisfits.blogspot.com",540,1300);

  return canvas;
}

document.getElementById("shareFriendsBtn").onclick=async()=>{
  const canvas=await makeImage();

  canvas.toBlob(async blob=>{
    const file=new File([blob],"sobriety.png",{type:"image/png"});

    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        text:"Check out Recovery Misfits — "+SHARE_URL
      });
    }else{
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download="sobriety.png";
      a.click();
    }
  });
};
</script>

</body>
</html>
