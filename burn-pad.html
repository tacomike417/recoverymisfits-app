<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Misfits — Burn Pad</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="./icon-192.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recovery Misfits">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    :root{
      --burn-cycle: 3s;
    }

    body{
      font-family:Roboto,Arial,sans-serif;
      margin:0;
      background:#fff;
      color:#111;
      padding-bottom:120px;
    }

    .page{
      max-width:980px;
      margin:0 auto;
      padding:14px 12px 24px;
    }

    .pageTitle{
      font-weight:1000;
      font-size:18px;
      margin:12px 4px 4px;
    }

    .pageSub{
      font-weight:800;
      color:#666;
      margin:0 4px 12px;
      line-height:1.25;
      font-size:13px;
    }

    input{
      width:100%;
      padding:10px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.18);
      margin-top:8px;
      font-weight:800;
      box-sizing:border-box;
      font-size:16px;
    }

    textarea{
      width:100%;
      padding:10px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.18);
      margin-top:8px;
      font-weight:800;
      box-sizing:border-box;
      font-size:16px;
      line-height:1.35;
      resize:vertical;
      min-height:88px;
      font-family:inherit;
    }

    .row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}

    .btn{
      padding:9px 12px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.18);
      background:#fff;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      color:#111;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-sizing:border-box;
      min-height:44px;
      line-height:1.1;
      font-family:inherit;
    }
    .btn.primary{background:#111;color:#fff;border-color:rgba(0,0,0,.18);}

    .muted{color:#666;font-weight:800;line-height:1.25;}
    .qLabel{margin-top:12px;font-weight:1000;letter-spacing:.2px;}
    .divider{height:1px;background:rgba(0,0,0,.10);margin:12px 0;}

    .stepWrap{display:none;}
    .stepWrap.active{display:block;}

    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
    .chipBtn{
      border:1px solid rgba(0,0,0,.18);
      border-radius:999px;padding:7px 10px;background:#fff;
      font-weight:1000;cursor:pointer;user-select:none;font-size:13px;
    }
    .chipBtn.active{background:#111;color:#fff;border-color:rgba(0,0,0,.18);}
    .burnHeaderLine{margin-top:6px;font-weight:900;color:#666;line-height:1.25;}

    .tinyLink{
      background:none;border:none;padding:0;margin:0;
      color:#111;
      font-weight:1000;
      cursor:pointer;
      text-decoration:underline;
      text-underline-offset:3px;
      font-family:inherit;
      font-size:inherit;
    }

    .burstWrap{position:relative; display:inline-flex;}
    .star{
      position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
      pointer-events:none;will-change:transform,opacity;font-size:16px;opacity:0;
      animation:starFly .85s ease-out forwards;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.10));
    }
    @keyframes starFly{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.9);}
      10%{opacity:1;}
      100%{opacity:0;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(1.15);}
    }

    .prayerBox{
      margin-top:10px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:14px;
      padding:12px;
      background:#fff;
      font-weight:900;
      line-height:1.45;
    }

    .card{
      border:1px solid rgba(0,0,0,.12);
      border-radius:16px;
      padding:14px;
      background:#fff;
      margin:10px 4px 14px;
    }

    #burnDoneSheet .doneWrap{
      margin-top:12px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:16px;
      padding:14px;
      background:#fff;
    }

    .burnAnimStage{
      position:relative;
      height:220px;
      border:1px solid rgba(0,0,0,.18);
      border-radius:16px;
      background:
        radial-gradient(circle at 82% 18%, rgba(255,184,61,.14), rgba(255,184,61,0) 22%),
        radial-gradient(circle at 28% 82%, rgba(255,93,0,.10), rgba(255,93,0,0) 26%),
        linear-gradient(180deg, #0a0a0a 0%, #101010 55%, #161616 100%);
      overflow:hidden;
      box-shadow: inset 0 0 20px rgba(255,255,255,.03);
    }

    .burnGround{
      position:absolute;
      left:0; right:0; bottom:0;
      height:42px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border-top:1px solid rgba(255,255,255,.05);
    }

    .burnGlow{
      position:absolute;
      right:-30px;
      bottom:28px;
      width:160px;
      height:160px;
      background:radial-gradient(circle, rgba(255,173,59,.55) 0%, rgba(255,110,0,.26) 38%, rgba(255,110,0,0) 72%);
      opacity:0;
      transform:scale(.6);
      filter:blur(4px);
    }

    .burnTrashEmoji{
      position:absolute;
      right:24px;
      bottom:34px;
      font-size:54px;
      line-height:1;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.45));
      transform-origin:50% 100%;
      z-index:5;
    }

    .burnPaper{
      position:absolute;
      left:26px;
      bottom:42px;
      width:52px;
      height:66px;
      border:2px solid rgba(255,255,255,.25);
      border-radius:8px;
      background:linear-gradient(180deg,#fff 0%, #f2f2f2 100%);
      box-shadow:0 4px 14px rgba(0,0,0,.28);
      opacity:.22;
    }

    .burnPaper::before{
      content:"";
      position:absolute;
      left:8px;
      right:8px;
      top:12px;
      height:2px;
      background:rgba(0,0,0,.08);
      box-shadow:0 10px 0 rgba(0,0,0,.08), 0 20px 0 rgba(0,0,0,.08), 0 30px 0 rgba(0,0,0,.08);
    }

    .burnFlame{
      position:absolute;
      left:40px;
      bottom:56px;
      width:28px;
      height:44px;
      opacity:0;
      transform:translateX(0) translateY(0) scale(.9) rotate(0deg);
      filter: drop-shadow(0 0 10px rgba(255,120,0,.45)) drop-shadow(0 0 20px rgba(255,120,0,.28));
      z-index:3;
    }

    .burnFlame::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 72%, #fff1a8 0%, #ffd86b 25%, #ff9a1f 55%, #ff5a00 76%, rgba(255,90,0,0) 79%);
      clip-path:polygon(50% 0%, 68% 18%, 86% 46%, 70% 100%, 30% 100%, 14% 46%, 32% 18%);
      border-radius:50% 50% 60% 60%;
    }

    .burnFlame::after{
      content:"";
      position:absolute;
      left:8px;
      top:10px;
      width:12px;
      height:18px;
      background:radial-gradient(circle at 50% 70%, #fff7d1 0%, #ffe79a 48%, rgba(255,231,154,0) 78%);
      clip-path:polygon(50% 0%, 70% 30%, 64% 100%, 36% 100%, 30% 30%);
      border-radius:50%;
    }

    .burnFlameTrail{
      position:absolute;
      left:58px;
      bottom:62px;
      width:24px;
      height:24px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,216,107,.95) 0%, rgba(255,130,20,.76) 44%, rgba(255,130,20,0) 74%);
      opacity:0;
      filter:blur(.5px);
      z-index:2;
    }

    .trailPuff{
      position:absolute;
      width:22px;
      height:22px;
      border-radius:50%;
      opacity:0;
      background:radial-gradient(circle, rgba(255,205,115,.85) 0%, rgba(255,126,28,.42) 45%, rgba(255,126,28,0) 76%);
      filter:blur(1px);
      z-index:1;
    }

    .p1{ left:82px; bottom:74px; }
    .p2{ left:120px; bottom:82px; }
    .p3{ left:160px; bottom:88px; }
    .p4{ left:205px; bottom:92px; }
    .p5{ left:250px; bottom:94px; }
    .p6{ left:296px; bottom:92px; }
    .p7{ left:340px; bottom:86px; }

    .dove{
      position:absolute;
      right:58px;
      bottom:74px;
      width:46px;
      height:34px;
      opacity:0;
      transform:translate(0,0) scale(.7) rotate(0deg);
      z-index:4;
      filter: drop-shadow(0 4px 10px rgba(255,255,255,.18));
    }

    .dove::before,
    .dove::after{
      content:"";
      position:absolute;
      background:#fff;
      border:1px solid rgba(255,255,255,.18);
    }

    .dove::before{
      width:26px;
      height:16px;
      left:12px;
      top:12px;
      border-radius:60% 50% 55% 45%;
      transform:rotate(6deg);
    }

    .dove::after{
      width:18px;
      height:10px;
      left:2px;
      top:6px;
      border-radius:100% 0 100% 0;
      transform:rotate(-24deg);
      box-shadow:
        20px 0 0 -2px #fff,
        20px 0 0 0 rgba(255,255,255,.16);
    }

    .doveWing{
      position:absolute;
      width:20px;
      height:12px;
      left:12px;
      top:2px;
      background:#fff;
      border:1px solid rgba(255,255,255,.18);
      border-radius:100% 0 100% 0;
      transform-origin:bottom right;
      opacity:0;
    }

    .spark{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:radial-gradient(circle, #fff4b8 0%, #ffd56b 45%, rgba(255,213,107,0) 75%);
      opacity:0;
      z-index:4;
    }

    .spark1{ right:62px; bottom:82px; }
    .spark2{ right:42px; bottom:76px; }
    .spark3{ right:82px; bottom:72px; }

    .dunkBtn{
      position:absolute;
      left:calc(100% - 132px);
      top:58px;
      width:88px;
      height:40px;
      border:none;
      border-radius:999px;
      background:#111;
      color:#fff;
      font-weight:1000;
      font-family:inherit;
      font-size:13px;
      cursor:pointer;
      z-index:8;
      opacity:0;
      pointer-events:none;
      transform:translateY(0) scale(.92);
      box-shadow:0 6px 18px rgba(0,0,0,.35);
    }

    .dunkCallout{
      position:absolute;
      right:18px;
      top:18px;
      font-size:16px;
      font-weight:1000;
      color:#ffd86b;
      opacity:0;
      z-index:8;
      text-shadow:0 2px 10px rgba(0,0,0,.55);
      letter-spacing:.02em;
    }

    .scorePop{
      position:absolute;
      left:50%;
      top:26px;
      transform:translateX(-50%) translateY(8px) scale(.92);
      background:rgba(17,17,17,.88);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px;
      padding:9px 14px;
      font-weight:1000;
      font-size:14px;
      line-height:1.1;
      opacity:0;
      z-index:10;
      pointer-events:none;
      white-space:nowrap;
    }

    .scorePop.show{
      animation:scorePopIn .95s ease-out forwards;
    }

    .burnMsg{
      margin-top:14px;
      font-weight:1000;
      line-height:1.3;
      opacity:0;
      transform:translateY(8px);
      transition:opacity .3s ease, transform .3s ease;
    }

    .burnDoneBtnRow{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .burnDoneBtnRow .btn{ width:100%; }

    .burnAnimStage.run .burnFlame{
      animation: flameIntoTrash var(--burn-cycle) linear infinite;
    }

    .burnAnimStage.run .burnFlameTrail{
      animation: flameTrail var(--burn-cycle) linear infinite;
    }

    .burnAnimStage.run .p1{ animation: puff1 var(--burn-cycle) linear infinite; }
    .burnAnimStage.run .p2{ animation: puff2 var(--burn-cycle) linear infinite; }
    .burnAnimStage.run .p3{ animation: puff3 var(--burn-cycle) linear infinite; }
    .burnAnimStage.run .p4{ animation: puff4 var(--burn-cycle) linear infinite; }
    .burnAnimStage.run .p5{ animation: puff5 var(--burn-cycle) linear infinite; }
    .burnAnimStage.run .p6{ animation: puff6 var(--burn-cycle) linear infinite; }
    .burnAnimStage.run .p7{ animation: puff7 var(--burn-cycle) linear infinite; }

    .burnAnimStage.run .burnGlow{
      animation: glowBlast var(--burn-cycle) linear infinite;
    }

    .burnAnimStage.run .burnTrashEmoji{
      animation: trashKick var(--burn-cycle) linear infinite;
    }

    .burnAnimStage.run .dove{
      animation: doveFlyAway var(--burn-cycle) linear infinite;
    }

    .burnAnimStage.run .doveWing{
      animation: wingFlap .24s ease-in-out infinite alternate;
      opacity:1;
    }

    .burnAnimStage.run .spark1{
      animation: sparkRise1 var(--burn-cycle) linear infinite;
    }

    .burnAnimStage.run .spark2{
      animation: sparkRise2 var(--burn-cycle) linear infinite;
    }

    .burnAnimStage.run .spark3{
      animation: sparkRise3 var(--burn-cycle) linear infinite;
    }

    .burnAnimStage.run .dunkBtn{
      animation:dunkTargetMove var(--burn-cycle) linear infinite;
      opacity:1;
      pointer-events:auto;
    }

    .burnAnimStage.run .dunkCallout{
      animation:dunkCalloutPulse var(--burn-cycle) linear infinite;
    }

    .burnAnimStage.dunked .burnFlame,
    .burnAnimStage.dunked .burnFlameTrail,
    .burnAnimStage.dunked .trailPuff,
    .burnAnimStage.dunked .dunkBtn,
    .burnAnimStage.dunked .dunkCallout{
      animation-play-state:paused !important;
    }

    .burnAnimStage.dunked .burnGlow{
      animation:glowBlast .7s ease-out forwards !important;
    }

    .burnAnimStage.dunked .burnTrashEmoji{
      animation:trashKick .4s ease-out 2 forwards !important;
    }

    .burnAnimStage.dunked .dove{
      animation:doveFlyAway 1.6s cubic-bezier(.18,.74,.2,1) forwards !important;
    }

    .burnAnimStage.dunked .doveWing{
      animation:wingFlap .22s ease-in-out infinite alternate !important;
      opacity:1;
    }

    .burnAnimStage.dunked .spark1{
      animation:sparkRise1 .8s ease-out forwards !important;
    }
    .burnAnimStage.dunked .spark2{
      animation:sparkRise2 .9s ease-out forwards !important;
    }
    .burnAnimStage.dunked .spark3{
      animation:sparkRise3 1s ease-out forwards !important;
    }

    @keyframes flameIntoTrash{
      0%{
        opacity:1;
        transform:translateX(0) translateY(0) scale(.92) rotate(-6deg);
      }
      12%{
        opacity:1;
        transform:translateX(28px) translateY(-6px) scale(1) rotate(2deg);
      }
      24%{
        opacity:1;
        transform:translateX(62px) translateY(-12px) scale(1.04) rotate(6deg);
      }
      36%{
        opacity:1;
        transform:translateX(108px) translateY(-18px) scale(1.08) rotate(12deg);
      }
      48%{
        opacity:1;
        transform:translateX(168px) translateY(-18px) scale(1.06) rotate(16deg);
      }
      60%{
        opacity:1;
        transform:translateX(236px) translateY(-14px) scale(1) rotate(20deg);
      }
      72%{
        opacity:1
