<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 The Brain Dumper</title>

<style>

:root{
--bg:#1b1e24;
--panel:#2a2f37;
--panel2:#1d2127;
--text:#f5f7fa;
--pink:#ff5ea8;
--pink2:#ff9ac6;
--yellow:#f5c84c;
--blue:#56a8ff;
--purple:#a66bff;
--line:rgba(255,255,255,.12);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
margin:0;
min-height:100%;
font-family:system-ui,Segoe UI,Roboto,sans-serif;
background:linear-gradient(#252a31,#171a1f);
color:var(--text);
}

body{
display:flex;
justify-content:center;
padding:16px 12px 28px;
}

.wrap{width:100%;max-width:760px}

.card{
background:linear-gradient(var(--panel),var(--panel2));
border-radius:24px;
border:1px solid var(--line);
box-shadow:0 24px 60px rgba(0,0,0,.35);
overflow:hidden;
}

.top{text-align:center;padding:22px 18px 10px}

h1{
margin:0;
font-size:clamp(2rem,5vw,3rem);
letter-spacing:-.04em;
}

.entry{padding:12px 18px 0}

textarea{
width:100%;
min-height:110px;
border-radius:18px;
border:none;
outline:none;
padding:16px;
background:#12151a;
border:1px solid var(--line);
color:white;
font-size:1rem;
}

.actions{padding:12px 18px 18px}

.dump-btn{
width:100%;
border:none;
border-radius:999px;
padding:15px;
font-weight:900;
font-size:1rem;
cursor:pointer;
color:white;
background:linear-gradient(135deg,var(--pink),var(--pink2));
box-shadow:0 12px 26px rgba(255,94,168,.24);
}

.scene{
position:relative;
margin:0 18px 16px;
height:580px;
border-radius:24px;
overflow:hidden;
border:1px solid var(--line);
background:
radial-gradient(circle at 50% 30%, rgba(255,255,255,.05), transparent 35%),
linear-gradient(#333842,#20242b 55%, #171a1f);
}

.prompt{
position:absolute;
top:14px;
left:50%;
transform:translateX(-50%);
padding:8px 14px;
border-radius:999px;
font-size:.86rem;
font-weight:900;
background:rgba(0,0,0,.25);
border:1px solid var(--line);
z-index:20;
}

.health{
position:absolute;
top:55px;
left:50%;
transform:translateX(-50%);
width:240px;
height:12px;
background:#111;
border-radius:999px;
border:1px solid rgba(255,255,255,.1);
overflow:hidden;
z-index:20;
}

.health-fill{
height:100%;
width:100%;
background:linear-gradient(90deg,#ff9ac6,#ff5ea8);
transition:width .2s;
}

.jar-zone{
position:absolute;
inset:90px 0 0 0;
display:flex;
align-items:center;
justify-content:center;
transition:.5s;
}

.scene.chest-mode .jar-zone,
.scene.chest-mode .health,
.scene.chest-mode .prompt{
opacity:0;
transform:scale(.96);
pointer-events:none;
}

.jar{
position:relative;
width:260px;
height:300px;
border-radius:18px;
border:2px solid rgba(255,255,255,.25);
background:rgba(255,255,255,.08);
display:flex;
align-items:center;
justify-content:center;
text-align:center;
cursor:pointer;
}

.thought{
padding:18px;
font-weight:700;
}

.weak{
position:absolute;
width:50px;
height:50px;
border-radius:50%;
border:3px solid white;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.2)}
}

.break-fade{
position:absolute;
inset:0;
background:radial-gradient(circle at center, rgba(0,0,0,.2), rgba(0,0,0,.75));
opacity:0;
transition:.5s;
z-index:22;
}

.scene.chest-mode .break-fade{
opacity:1;
}

.chest{
position:absolute;
left:50%;
bottom:-200px;
transform:translateX(-50%);
width:150px;
height:120px;
opacity:0;
cursor:pointer;
z-index:30;
}

.chest.show{
opacity:1;
animation:riseChest 1s forwards;
}

@keyframes riseChest{
0%{bottom:-200px;transform:translateX(-50%) scale(.4)}
70%{bottom:230px;transform:translateX(-50%) scale(1.2)}
100%{bottom:210px;transform:translateX(-50%) scale(1)}
}

.chest-inner{
position:relative;
width:100%;
height:100%;
}

.chest.throb .chest-inner{
animation:throb 1.2s infinite;
}

@keyframes throb{
0%,100%{transform:scale(1)}
50%{transform:scale(1.08)}
}

.chest-orb{
position:absolute;
inset:-60px;
border-radius:50%;
filter:blur(18px);
opacity:.9;
animation:orbPulse 1.3s infinite;
}

.chest.yellow .chest-orb{background:radial-gradient(circle,rgba(245,200,76,.7),transparent 70%)}
.chest.blue .chest-orb{background:radial-gradient(circle,rgba(86,168,255,.7),transparent 70%)}
.chest.purple .chest-orb{background:radial-gradient(circle,rgba(166,107,255,.7),transparent 70%)}

@keyframes orbPulse{
0%,100%{transform:scale(.9)}
50%{transform:scale(1.1)}
}

.reward{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
opacity:0;
pointer-events:none;
transition:.3s;
z-index:40;
}

.reward.show{
opacity:1;
pointer-events:auto;
}

.reward-title{
font-size:2.6rem;
font-weight:900;
}

.again{
margin-top:16px;
padding:12px 18px;
border-radius:999px;
border:none;
font-weight:900;
cursor:pointer;
}

.billbob{
font-size:3rem;
margin-top:12px;
animation:dance 1s infinite;
}

@keyframes dance{
0%,100%{transform:rotate(0)}
50%{transform:rotate(10deg)}
}

.disclaimer{
text-align:center;
font-size:.75rem;
color:#9aa3ad;
padding:0 18px 18px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="top">
<h1>🧠 The Brain Dumper</h1>
</div>

<div class="entry">
<textarea id="thoughtInput" placeholder="What's stuck in your head right now?"></textarea>
</div>

<div class="actions">
<button class="dump-btn" id="dumpBtn">Dump</button>
</div>

<div class="scene" id="scene">

<div class="prompt">Find the weak spot</div>

<div class="health">
<div class="health-fill" id="healthFill"></div>
</div>

<div class="break-fade"></div>

<div class="jar-zone">

<div class="jar" id="jar">

<div class="thought" id="thoughtText">
Drop a thought above
</div>

<div class="weak" id="weak"></div>

</div>

</div>

<div class="chest" id="chest"></div>

<div class="reward" id="reward">
<div>
<div class="reward-title" id="rewardTitle"></div>
<div id="rule"></div>
<button class="again" id="again">Dump another thought</button>
</div>
</div>

</div>

<div class="disclaimer">
A small reflection tool for emotional reset.
</div>

</div>
</div>

<script>

const dumpBtn=document.getElementById("dumpBtn")
const thoughtInput=document.getElementById("thoughtInput")
const thoughtText=document.getElementById("thoughtText")
const weak=document.getElementById("weak")
const jar=document.getElementById("jar")
const scene=document.getElementById("scene")
const chest=document.getElementById("chest")
const reward=document.getElementById("reward")
const rewardTitle=document.getElementById("rewardTitle")
const again=document.getElementById("again")
const rule=document.getElementById("rule")
const healthFill=document.getElementById("healthFill")

let health=0
let maxHealth=0

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}

function vibrate(p){if(navigator.vibrate)navigator.vibrate(p)}

function moveWeak(){
weak.style.left=rand(30,230)+"px"
weak.style.top=rand(30,220)+"px"
}

dumpBtn.onclick=()=>{
const t=thoughtInput.value.trim()
if(!t)return

thoughtText.textContent=t
maxHealth=rand(18,26)
health=maxHealth
healthFill.style.width="100%"
moveWeak()
}

jar.onclick=(e)=>{

if(!health)return

const rect=jar.getBoundingClientRect()
const x=e.clientX-rect.left
const y=e.clientY-rect.top

const wx=weak.offsetLeft+25
const wy=weak.offsetTop+25

const dist=Math.hypot(x-wx,y-wy)

let dmg=1

if(dist<20){
dmg=3
vibrate([40])
}
else if(dist<50){
dmg=2
vibrate([20,20])
}
else{
vibrate([10])
}

health-=dmg
if(health<0)health=0

healthFill.style.width=(health/maxHealth*100)+"%"

if(health===0){
breakThought()
}else{
moveWeak()
}

}

function breakThought(){

scene.classList.add("chest-mode")

setTimeout(()=>{
spawnChest()
},600)

}

function spawnChest(){

const roll=Math.random()

let type="yellow"
if(roll>.7)type="blue"
if(roll>.95)type="purple"

chest.className="chest "+type+" show"

chest.innerHTML=`
<div class="chest-inner">
<div class="chest-orb"></div>
<svg viewBox="0 0 120 100">
<rect x="18" y="36" width="84" height="40" rx="8" fill="#d7a62b"/>
<rect x="16" y="24" width="88" height="24" rx="10" fill="#f7d56a"/>
</svg>
</div>
`

setTimeout(()=>{chest.classList.add("throb")},900)

chest.onclick=()=>openChest(type)

}

function openChest(type){

vibrate([40,20,70])

chest.style.display="none"

if(type==="yellow"){
rewardTitle.textContent="That one doesn’t get to stay."
rule.textContent=""
}

if(type==="blue"){
rewardTitle.textContent="Progress, not perfection."
rule.textContent=""
}

if(type==="purple"){
rewardTitle.textContent="RULE 62"
rule.innerHTML='<div class="billbob">🕺🕺</div><div>Don\'t take yourself so damn serious</div>'
}

reward.classList.add("show")

}

again.onclick=()=>{
location.reload()
}

</script>

</body>
</html>
