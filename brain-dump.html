<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Dump</title>
  <style>
    :root{
      --bg1:#12081a;
      --bg2:#251033;
      --panel:rgba(255,255,255,.08);
      --panelBorder:rgba(255,255,255,.14);
      --text:#fff7fc;
      --muted:#d8bdd0;
      --pink:#ff4fa0;
      --pink2:#ff82c0;
      --pink3:#ffd0e5;
      --purple:#a855f7;
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --radius:26px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,79,160,.22), transparent 28%),
        radial-gradient(circle at 85% 0%, rgba(168,85,247,.16), transparent 25%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
      color:var(--text);
      overflow-x:hidden;
    }

    body{
      padding:18px 14px 34px;
      display:flex;
      justify-content:center;
    }

    .wrap{
      width:100%;
      max-width:720px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--panelBorder);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      overflow:hidden;
      position:relative;
    }

    .top{
      padding:22px 20px 10px;
      text-align:center;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 15px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.11);
      color:var(--muted);
      font-size:.88rem;
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-size:clamp(2.1rem,6vw,3.4rem);
      line-height:.95;
      letter-spacing:-.04em;
    }

    .entry{
      padding:12px 20px 0;
    }

    textarea{
      width:100%;
      min-height:140px;
      resize:vertical;
      border:none;
      outline:none;
      border-radius:22px;
      padding:18px;
      font-size:1.08rem;
      line-height:1.45;
      background:rgba(8,6,16,.56);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    textarea::placeholder{
      color:#cfa8be;
    }

    .actions{
      padding:14px 20px 18px;
    }

    .dump-btn{
      width:100%;
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:16px 24px;
      font-size:1.08rem;
      font-weight:900;
      color:white;
      background:linear-gradient(135deg,var(--pink),var(--pink2));
      box-shadow:0 14px 28px rgba(255,79,160,.28);
      transition:transform .14s ease, box-shadow .2s ease, filter .2s ease;
    }

    .dump-btn:active{
      transform:scale(.985);
      filter:brightness(.98);
    }

    .stage{
      padding:0 20px 24px;
    }

    .scene{
      position:relative;
      height:350px;
      border-radius:26px;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.12), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
    }

    .arenaGlow{
      position:absolute;
      left:50%;
      bottom:16px;
      transform:translateX(-50%);
      width:180px;
      height:32px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,79,160,.32), transparent 72%);
      filter:blur(14px);
      opacity:.7;
    }

    .thought{
      position:absolute;
      left:50%;
      top:78px;
      transform:translateX(-50%);
      max-width:78%;
      min-width:130px;
      padding:12px 18px;
      border-radius:999px;
      text-align:center;
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.18);
      color:#ffeef6;
      font-weight:700;
      font-size:1rem;
      line-height:1.3;
      box-shadow:0 12px 24px rgba(0,0,0,.18);
      z-index:5;
      opacity:0;
    }

    .thought.show{
      opacity:1;
    }

    .brain{
      position:absolute;
      left:50%;
      bottom:74px;
      width:134px;
      height:112px;
      transform:translateX(-50%);
      z-index:6;
      filter:drop-shadow(0 16px 24px rgba(0,0,0,.28));
    }

    .brain .blob{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 30% 28%, #ffd0e5, #ff89bb 70%),
        linear-gradient(180deg, #ffb4d1, #ff6eae);
      border-radius:48% 52% 46% 54% / 42% 42% 58% 58%;
      border:3px solid rgba(255,255,255,.26);
      box-shadow: inset 0 10px 16px rgba(255,255,255,.15);
    }

    .brain:before,
    .brain:after{
      content:"";
      position:absolute;
      top:11px;
      width:52px;
      height:76px;
      border:3px solid rgba(255,255,255,.24);
      border-radius:48% 52% 45% 55%;
      opacity:.58;
    }

    .brain:before{left:12px}
    .brain:after{right:12px}

    .face{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .eye{
      position:absolute;
      top:47px;
      width:11px;
      height:11px;
      border-radius:50%;
      background:#4f2138;
      transition:transform .15s ease;
    }

    .eye.left{left:40px}
    .eye.right{right:40px}

    .mouth{
      position:absolute;
      left:50%;
      bottom:24px;
      width:34px;
      height:15px;
      transform:translateX(-50%);
      border-bottom:4px solid #4f2138;
      border-radius:0 0 18px 18px;
      opacity:.82;
    }

    .weapon{
      position:absolute;
      left:50%;
      bottom:122px;
      transform:translateX(-50%) scale(.5);
      font-size:56px;
      z-index:8;
      opacity:0;
      pointer-events:none;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.24));
    }

    .impact{
      position:absolute;
      left:50%;
      top:126px;
      transform:translate(-50%,-50%) scale(.2);
      font-weight:1000;
      font-size:2rem;
      letter-spacing:.04em;
      color:#fff4fa;
      text-shadow:0 0 16px rgba(255,255,255,.28);
      opacity:0;
      z-index:9;
      pointer-events:none;
      white-space:nowrap;
    }

    .bits{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:7;
    }

    .bit{
      position:absolute;
      left:50%;
      top:126px;
      width:12px;
      height:12px;
      border-radius:50%;
      opacity:0;
      background:linear-gradient(135deg, #fff, #ff9cc8);
    }

    .affirmation-card{
      margin-top:16px;
      background:rgba(12,6,18,.52);
      border:1px solid rgba(255,255,255,.1);
      border-radius:22px;
      padding:16px 16px 15px;
      opacity:0;
      transform:translateY(12px);
      transition:all .4s ease;
    }

    .affirmation-card.show{
      opacity:1;
      transform:translateY(0);
    }

    .affirmation{
      margin:0;
      font-size:1.12rem;
      line-height:1.45;
      text-align:center;
    }

    .tiny{
      margin-top:8px;
      text-align:center;
      color:var(--muted);
      font-size:.88rem;
    }

    .scene.shake{
      animation:screenShake .45s ease;
    }

    .brain.punch{
      animation:brainPunch .85s ease forwards;
    }

    .brain.stomp{
      animation:brainStomp .95s ease forwards;
    }

    .brain.headbutt{
      animation:brainHeadbutt .9s ease forwards;
    }

    .thought.punched{
      animation:thoughtPunched .85s ease forwards;
    }

    .thought.stomped{
      animation:thoughtStomped .95s ease forwards;
    }

    .thought.headbutted{
      animation:thoughtHeadbutted .9s ease forwards;
    }

    .weapon.showPunch{
      animation:weaponPunch .55s ease forwards;
    }

    .weapon.showBoot{
      animation:weaponBoot .65s ease forwards;
    }

    .weapon.showStar{
      animation:weaponStar .65s ease forwards;
    }

    .impact.show{
      animation:impactPop .62s ease forwards;
    }

    .bit.fly1{ animation:bit1 .75s ease forwards; }
    .bit.fly2{ animation:bit2 .8s ease forwards; }
    .bit.fly3{ animation:bit3 .78s ease forwards; }
    .bit.fly4{ animation:bit4 .82s ease forwards; }
    .bit.fly5{ animation:bit5 .72s ease forwards; }
    .bit.fly6{ animation:bit6 .84s ease forwards; }

    @keyframes screenShake{
      0%,100%{transform:translateX(0)}
      15%{transform:translateX(-9px)}
      30%{transform:translateX(8px)}
      45%{transform:translateX(-7px)}
      60%{transform:translateX(6px)}
      75%{transform:translateX(-4px)}
    }

    @keyframes brainPunch{
      0%{transform:translateX(-50%) translateY(0) rotate(0) scale(1)}
      18%{transform:translateX(-50%) translateY(-4px) rotate(-4deg) scale(1.02)}
      42%{transform:translateX(-30%) translateY(-40px) rotate(12deg) scale(1.07)}
      58%{transform:translateX(-66%) translateY(-16px) rotate(-9deg) scale(1.02)}
      74%{transform:translateX(-44%) translateY(-48px) rotate(8deg) scale(1.05)}
      100%{transform:translateX(-50%) translateY(-8px) rotate(0) scale(1)}
    }

    @keyframes brainStomp{
      0%{transform:translateX(-50%) translateY(0) scale(1)}
      16%{transform:translateX(-50%) translateY(-46px) scale(1.04)}
      40%{transform:translateX(-50%) translateY(12px) scale(.96,1.08)}
      52%{transform:translateX(-50%) translateY(-18px) scale(1.02)}
      70%{transform:translateX(-50%) translateY(8px) scale(.98,1.04)}
      100%{transform:translateX(-50%) translateY(-8px) scale(1)}
    }

    @keyframes brainHeadbutt{
      0%{transform:translateX(-50%) translateY(0) scale(1)}
      22%{transform:translateX(-50%) translateY(-18px) scale(1.03)}
      42%{transform:translateX(-50%) translateY(-80px) scale(1.08)}
      58%{transform:translateX(-50%) translateY(-12px) scale(.98)}
      100%{transform:translateX(-50%) translateY(-8px) scale(1)}
    }

    @keyframes thoughtPunched{
      0%{transform:translateX(-50%) scale(1); opacity:1}
      30%{transform:translateX(-50%) translateX(10px) scale(1.06)}
      55%{transform:translateX(-50%) translateX(-16px) rotate(-8deg) scale(.96)}
      100%{transform:translateX(-50%) translateY(-38px) scale(.2); opacity:0}
    }

    @keyframes thoughtStomped{
      0%{transform:translateX(-50%) scale(1); opacity:1}
      30%{transform:translateX(-50%) scale(1.14,.82)}
      48%{transform:translateX(-50%) scale(.86,1.18)}
      100%{transform:translateX(-50%) scale(.15); opacity:0}
    }

    @keyframes thoughtHeadbutted{
      0%{transform:translateX(-50%) scale(1); opacity:1}
      34%{transform:translateX(-50%) translateY(0) scale(1.03)}
      55%{transform:translateX(-50%) translateY(-16px) scale(1.06)}
      100%{transform:translateX(-50%) translateY(-72px) scale(.18); opacity:0}
    }

    @keyframes weaponPunch{
      0%{opacity:0; transform:translateX(-50%) translateY(24px) scale(.4) rotate(-18deg)}
      30%{opacity:1; transform:translateX(-10%) translateY(-48px) scale(1) rotate(12deg)}
      100%{opacity:0; transform:translateX(24%) translateY(-66px) scale(1.15) rotate(18deg)}
    }

    @keyframes weaponBoot{
      0%{opacity:0; transform:translateX(-50%) translateY(10px) scale(.45) rotate(-20deg)}
      35%{opacity:1; transform:translateX(-50%) translateY(-78px) scale(1) rotate(0deg)}
      100%{opacity:0; transform:translateX(-50%) translateY(-88px) scale(1.08) rotate(8deg)}
    }

    @keyframes weaponStar{
      0%{opacity:0; transform:translateX(-50%) translateY(20px) scale(.4) rotate(0)}
      30%{opacity:1; transform:translateX(-50%) translateY(-56px) scale(1) rotate(140deg)}
      100%{opacity:0; transform:translateX(-50%) translateY(-80px) scale(1.2) rotate(260deg)}
    }

    @keyframes impactPop{
      0%{opacity:0; transform:translate(-50%,-50%) scale(.2)}
      28%{opacity:1; transform:translate(-50%,-50%) scale(1.3)}
      100%{opacity:0; transform:translate(-50%,-50%) scale(1.8)}
    }

    @keyframes bit1{
      0%{opacity:1; transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0; transform:translate(-120px,-90px) scale(.4)}
    }
    @keyframes bit2{
      0%{opacity:1; transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0; transform:translate(110px,-80px) scale(.35)}
    }
    @keyframes bit3{
      0%{opacity:1; transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0; transform:translate(-92px,22px) scale(.4)}
    }
    @keyframes bit4{
      0%{opacity:1; transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0; transform:translate(95px,18px) scale(.35)}
    }
    @keyframes bit5{
      0%{opacity:1; transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0; transform:translate(-28px,-112px) scale(.3)}
    }
    @keyframes bit6{
      0%{opacity:1; transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0; transform:translate(18px,88px) scale(.45)}
    }

    @media (max-width:560px){
      .scene{height:330px}
      .brain{width:118px;height:100px;bottom:78px}
      .thought{top:72px;font-size:.96rem;max-width:84%}
      .weapon{font-size:50px}
      .impact{font-size:1.7rem}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="badge">🧠 Brain Dump</div>
        <h1>Dump it.</h1>
      </div>

      <div class="entry">
        <textarea id="dumpInput" placeholder="I’m scared everybody hates me"></textarea>
      </div>

      <div class="actions">
        <button class="dump-btn" id="dumpBtn">Dump</button>
      </div>

      <div class="stage">
        <div class="scene" id="scene">
          <div class="arenaGlow"></div>

          <div class="thought" id="thoughtBubble"></div>

          <div class="brain" id="brain">
            <div class="blob"></div>
            <div class="face">
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="mouth"></div>
            </div>
          </div>

          <div class="weapon" id="weapon"></div>
          <div class="impact" id="impact"></div>

          <div class="bits" id="bits">
            <div class="bit" id="bit1"></div>
            <div class="bit" id="bit2"></div>
            <div class="bit" id="bit3"></div>
            <div class="bit" id="bit4"></div>
            <div class="bit" id="bit5"></div>
            <div class="bit" id="bit6"></div>
          </div>
        </div>

        <div class="affirmation-card" id="affirmationCard">
          <p class="affirmation" id="affirmationText"></p>
          <div class="tiny">dump complete</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const dumpBtn = document.getElementById("dumpBtn");
    const dumpInput = document.getElementById("dumpInput");
    const scene = document.getElementById("scene");
    const brain = document.getElementById("brain");
    const thoughtBubble = document.getElementById("thoughtBubble");
    const weapon = document.getElementById("weapon");
    const impact = document.getElementById("impact");
    const affirmationCard = document.getElementById("affirmationCard");
    const affirmationText = document.getElementById("affirmationText");

    const bits = [
      document.getElementById("bit1"),
      document.getElementById("bit2"),
      document.getElementById("bit3"),
      document.getElementById("bit4"),
      document.getElementById("bit5"),
      document.getElementById("bit6")
    ];

    const affirmations = [
      "That thought had a lot to say for something so flimsy.",
      "Not every thought deserves a chair at the table.",
      "Well, that got handled.",
      "You don’t have to carry every weird thing your brain says.",
      "That one can go ahead and leave now.",
      "Heavy thought. Weak fighter.",
      "Your brain really tried it. Anyway.",
      "That spiral just got evicted."
    ];

    const attacks = [
      {
        name: "punch",
        weapon: "🥊",
        impact: "POW",
        brainClass: "punch",
        thoughtClass: "punched",
        weaponClass: "showPunch",
        vibration: [40, 30, 60]
      },
      {
        name: "stomp",
        weapon: "👢",
        impact: "STOMP",
        brainClass: "stomp",
        thoughtClass: "stomped",
        weaponClass: "showBoot",
        vibration: [60, 40, 90]
      },
      {
        name: "headbutt",
        weapon: "💥",
        impact: "BONK",
        brainClass: "headbutt",
        thoughtClass: "headbutted",
        weaponClass: "showStar",
        vibration: [30, 20, 30, 20, 70]
      }
    ];

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function resetAnimation(){
      scene.classList.remove("shake");
      brain.className = "brain";
      thoughtBubble.className = "thought";
      weapon.className = "weapon";
      impact.className = "impact";
      affirmationCard.classList.remove("show");

      bits.forEach((bit, i) => {
        bit.className = "bit";
      });
    }

    function vibrate(pattern){
      if (navigator.vibrate) {
        navigator.vibrate(pattern);
      }
    }

    function runBits(){
      bits[0].classList.add("fly1");
      bits[1].classList.add("fly2");
      bits[2].classList.add("fly3");
      bits[3].classList.add("fly4");
      bits[4].classList.add("fly5");
      bits[5].classList.add("fly6");
    }

    dumpBtn.addEventListener("click", () => {
      const text = dumpInput.value.trim();

      if(!text){
        scene.classList.remove("shake");
        void scene.offsetWidth;
        scene.classList.add("shake");
        vibrate([50,30,50]);
        affirmationText.textContent = "Throw something in there first.";
        affirmationCard.classList.add("show");
        return;
      }

      const attack = pick(attacks);
      const affirmation = pick(affirmations);

      resetAnimation();
      void scene.offsetWidth;

      thoughtBubble.textContent = text.length > 70 ? text.slice(0, 70) + "..." : text;
      thoughtBubble.classList.add("show");

      weapon.textContent = attack.weapon;
      impact.textContent = attack.impact;

      scene.classList.add("shake");
      vibrate(attack.vibration);

      setTimeout(() => {
        brain.classList.add(attack.brainClass);
        thoughtBubble.classList.add(attack.thoughtClass);
        weapon.classList.add(attack.weaponClass);
        impact.classList.add("show");
        runBits();
      }, 80);

      setTimeout(() => {
        affirmationText.textContent = affirmation;
        affirmationCard.classList.add("show");
      }, 780);

      setTimeout(() => {
        thoughtBubble.textContent = "";
        thoughtBubble.className = "thought";
        weapon.className = "weapon";
        impact.className = "impact";
      }, 1250);
    });
  </script>
</body>
</html>
