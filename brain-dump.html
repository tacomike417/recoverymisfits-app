<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 The Brain Dumper</title>
  <style>
    :root{
      --bg1:#1d2127;
      --bg2:#12151a;
      --card1:#2b3139;
      --card2:#1b1f25;
      --text:#f5f7fa;
      --muted:#b8c0ca;
      --pink:#ff5ca8;
      --pink2:#ff9dca;
      --pink3:#ffd3e7;
      --glass:rgba(255,255,255,.14);
      --glass-line:rgba(255,255,255,.32);
      --shadow:0 24px 60px rgba(0,0,0,.38);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, #2b3139 0%, var(--bg1) 40%, var(--bg2) 100%);
    }

    body{
      display:flex;
      justify-content:center;
      padding:16px 12px 28px;
    }

    .wrap{width:100%;max-width:760px}

    .card{
      background:linear-gradient(180deg,var(--card1),var(--card2));
      border:1px solid rgba(255,255,255,.08);
      border-radius:26px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .top{
      padding:22px 18px 8px;
      text-align:center;
    }

    h1{
      margin:0;
      font-size:clamp(2rem,5vw,3rem);
      line-height:1;
      letter-spacing:-.04em;
    }

    .entry{padding:14px 18px 0}

    textarea{
      width:100%;
      min-height:120px;
      resize:vertical;
      border:none;
      outline:none;
      border-radius:20px;
      padding:16px;
      background:#12151a;
      color:var(--text);
      border:1px solid rgba(255,255,255,.08);
      font-size:1rem;
      line-height:1.45;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    textarea::placeholder{color:#97a1ad}

    .actions{padding:12px 18px 18px}

    .dump-btn{
      width:100%;
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:16px 22px;
      font-size:1rem;
      font-weight:1000;
      color:#fff;
      background:linear-gradient(135deg,var(--pink),var(--pink2));
      box-shadow:
        0 14px 28px rgba(255,92,168,.28),
        inset 0 1px 0 rgba(255,255,255,.28);
      transition:transform .14s ease, filter .2s ease;
    }

    .dump-btn:active{transform:scale(.985);filter:brightness(.98)}

    .scene{
      position:relative;
      height:560px;
      margin:0 18px 16px;
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.04) 0%, rgba(255,255,255,0) 38%),
        linear-gradient(180deg,#343942 0%, #242932 55%, #191d23 100%);
      isolation:isolate;
    }

    .scene::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.03) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 28%, rgba(255,255,255,.025) 0 2px, transparent 3px),
        radial-gradient(circle at 40% 70%, rgba(255,255,255,.02) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 76%, rgba(255,255,255,.025) 0 2px, transparent 3px);
      background-size:180px 180px;
      opacity:.65;
      pointer-events:none;
    }

    .prompt{
      position:absolute;
      top:16px;
      left:50%;
      transform:translateX(-50%);
      z-index:9;
      padding:9px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.24);
      border:1px solid rgba(255,255,255,.08);
      color:#f7dce9;
      font-size:.86rem;
      font-weight:1000;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    .jar-wrap{
      position:absolute;
      inset:60px 0 0 0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:5;
    }

    .jar{
      position:relative;
      width:min(360px,82vw);
      height:min(430px,76vw);
      max-height:430px;
      transform-origin:center;
      transition:transform .18s ease, filter .25s ease;
    }

    .jar.hit{
      animation:jarHit .18s ease;
    }

    .scene.shake .jar{
      animation:jarBreak .28s ease;
    }

    @keyframes jarHit{
      0%{transform:scale(1)}
      40%{transform:scale(.982)}
      100%{transform:scale(1)}
    }

    @keyframes jarBreak{
      0%{transform:translate(0,0)}
      20%{transform:translate(-4px,2px)}
      40%{transform:translate(4px,-2px)}
      60%{transform:translate(-3px,1px)}
      80%{transform:translate(2px,-1px)}
      100%{transform:translate(0,0)}
    }

    .jar-svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      filter:drop-shadow(0 24px 28px rgba(0,0,0,.24));
    }

    .brain-area{
      position:absolute;
      left:50%;
      top:54%;
      width:62%;
      aspect-ratio:1 / .9;
      transform:translate(-50%,-50%);
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      transition:transform .3s ease, filter .5s ease;
    }

    .brain-blob{
      position:absolute;
      inset:0;
      border-radius:56% 44% 52% 48% / 55% 52% 48% 45%;
      background:
        radial-gradient(circle at 34% 30%, #e2e6eb 0%, #cbd2d9 48%, #afb7c1 100%);
      box-shadow:
        inset 0 10px 14px rgba(255,255,255,.36),
        inset 0 -10px 18px rgba(0,0,0,.08),
        0 18px 24px rgba(0,0,0,.16);
      animation:brainPulse 2.8s ease-in-out infinite;
      overflow:hidden;
    }

    .brain-blob::before{
      content:"";
      position:absolute;
      inset:14% 18% 18% 16%;
      border-radius:50%;
      background:
        repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.16) 0 6px, rgba(255,255,255,0) 7px 16px);
      opacity:.34;
      filter:blur(1px);
    }

    .brain-blob::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 68% 30%, rgba(255,255,255,.22) 0 10%, transparent 20%),
        radial-gradient(circle at 35% 70%, rgba(255,255,255,.10) 0 12%, transparent 22%);
      opacity:.8;
    }

    @keyframes brainPulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.018)}
    }

    .scene.healed .brain-blob{
      background:
        radial-gradient(circle at 34% 30%, var(--pink3) 0%, var(--pink2) 50%, var(--pink) 100%);
      box-shadow:
        inset 0 10px 14px rgba(255,255,255,.34),
        inset 0 -10px 18px rgba(145,0,69,.14),
        0 0 30px rgba(255,92,168,.24),
        0 16px 22px rgba(0,0,0,.14);
    }

    .thought-text{
      position:relative;
      z-index:2;
      width:76%;
      text-align:center;
      font-weight:1000;
      font-size:clamp(.95rem,2.3vw,1.16rem);
      line-height:1.22;
      color:#1d232a;
      text-shadow:0 1px 0 rgba(255,255,255,.25);
      word-break:break-word;
      transition:color .4s ease, opacity .25s ease;
      padding:6px 10px;
    }

    .scene.healed .thought-text{color:#fff7fb}

    .brain-cracks{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:3;
    }

    .crack{
      position:absolute;
      left:50%;
      top:50%;
      width:3px;
      height:90px;
      background:linear-gradient(180deg, rgba(34,40,47,.96), rgba(34,40,47,.15));
      border-radius:999px;
      transform-origin:top center;
      opacity:.92;
      box-shadow:0 0 0 1px rgba(255,255,255,.04);
    }

    .crack::before,.crack::after{
      content:"";
      position:absolute;
      width:3px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(34,40,47,.86), rgba(34,40,47,.16));
      transform-origin:top center;
    }

    .crack::before{
      height:var(--b1,22px);
      top:18px;
      left:-8px;
      transform:rotate(-28deg);
    }

    .crack::after{
      height:var(--b2,18px);
      top:38px;
      left:8px;
      transform:rotate(28deg);
    }

    .glass-cracks{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:7;
    }

    .glass-line{
      position:absolute;
      width:2px;
      height:110px;
      background:linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.18));
      border-radius:999px;
      transform-origin:top center;
      opacity:.85;
      filter:blur(.1px);
    }

    .glass-line::before,.glass-line::after{
      content:"";
      position:absolute;
      width:2px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.16));
      transform-origin:top center;
    }

    .glass-line::before{
      height:var(--g1,24px);
      top:22px;
      left:-7px;
      transform:rotate(-30deg);
    }

    .glass-line::after{
      height:var(--g2,18px);
      top:48px;
      left:7px;
      transform:rotate(26deg);
    }

    .smash{
      position:absolute;
      z-index:10;
      font-size:clamp(2rem,5vw,3rem);
      font-weight:1000;
      letter-spacing:.05em;
      color:#fff8fb;
      text-shadow:
        0 8px 22px rgba(0,0,0,.24),
        0 0 18px rgba(255,255,255,.16);
      opacity:0;
      transform:scale(.3) rotate(-6deg);
      pointer-events:none;
    }

    .smash.show{animation:smashPop .38s ease forwards}
    @keyframes smashPop{
      0%{opacity:0;transform:scale(.3) rotate(-8deg)}
      45%{opacity:1;transform:scale(1.1) rotate(0deg)}
      100%{opacity:0;transform:scale(1.35) rotate(5deg)}
    }

    .bloom{
      position:absolute;
      inset:-12%;
      z-index:2;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.26) 0%, rgba(255,180,214,.18) 18%, rgba(255,92,168,.14) 34%, transparent 62%);
      opacity:0;
      transform:scale(.75);
      transition:opacity .8s ease, transform .8s ease;
      pointer-events:none;
    }

    .scene.healed .bloom{
      opacity:1;
      transform:scale(1.04);
    }

    .result{
      position:absolute;
      inset:0;
      z-index:12;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:28px;
      opacity:0;
      pointer-events:none;
      transition:opacity .65s ease;
    }

    .result.show{
      opacity:1;
      pointer-events:auto;
    }

    .affirmation{
      font-size:clamp(2rem,5.6vw,3.6rem);
      line-height:1.04;
      letter-spacing:-.04em;
      font-weight:1000;
      color:#fff9fc;
      text-shadow:
        0 10px 24px rgba(0,0,0,.18),
        0 0 20px rgba(255,255,255,.12);
      max-width:560px;
    }

    .subaffirm{
      margin-top:12px;
      color:#fff2f8;
      font-size:1rem;
      font-weight:900;
    }

    .again{
      margin-top:18px;
      border:none;
      border-radius:999px;
      padding:12px 18px;
      font-size:.98rem;
      font-weight:1000;
      cursor:pointer;
      color:#7b1548;
      background:#fff;
      box-shadow:0 10px 20px rgba(0,0,0,.14);
    }

    .disclaimer{
      padding:0 18px 18px;
      text-align:center;
      color:#a9b2bd;
      font-size:.74rem;
      line-height:1.4;
    }

    @media (max-width:560px){
      .scene{height:500px}
      .jar-wrap{inset:54px 0 0 0}
      .prompt{font-size:.8rem}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <h1>🧠 The Brain Dumper</h1>
      </div>

      <div class="entry">
        <textarea id="thoughtInput" placeholder="What’s stuck in your head right now?"></textarea>
      </div>

      <div class="actions">
        <button class="dump-btn" id="dumpBtn">Dump</button>
      </div>

      <div class="scene" id="scene">
        <div class="prompt" id="prompt">Now smash that thought</div>
        <div class="bloom"></div>

        <div class="jar-wrap">
          <div class="jar" id="jar">
            <svg class="jar-svg" viewBox="0 0 320 420" aria-hidden="true">
              <defs>
                <linearGradient id="glassGrad" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stop-color="rgba(255,255,255,.20)" />
                  <stop offset="100%" stop-color="rgba(255,255,255,.08)" />
                </linearGradient>
                <linearGradient id="lidGrad" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stop-color="#959daa" />
                  <stop offset="100%" stop-color="#5e6671" />
                </linearGradient>
              </defs>

              <ellipse cx="160" cy="392" rx="98" ry="18" fill="rgba(0,0,0,.22)"/>

              <rect x="92" y="22" width="136" height="34" rx="10" fill="url(#lidGrad)" opacity=".95"/>
              <rect x="102" y="30" width="116" height="6" rx="3" fill="rgba(255,255,255,.20)"/>

              <path d="M88 52
                       Q86 82 84 124
                       L84 292
                       Q84 360 160 372
                       Q236 360 236 292
                       L236 124
                       Q234 82 232 52 Z"
                    fill="rgba(255,255,255,.10)"
                    stroke="rgba(255,255,255,.34)"
                    stroke-width="4"/>

              <path d="M100 72
                       Q96 98 96 132
                       L96 286
                       Q96 338 160 348
                       Q224 338 224 286
                       L224 132
                       Q224 98 220 72 Z"
                    fill="rgba(255,255,255,.06)"/>

              <path d="M112 78
                       Q102 152 104 274
                       Q108 318 138 340"
                    fill="none"
                    stroke="rgba(255,255,255,.20)"
                    stroke-width="8"
                    stroke-linecap="round"/>

              <path d="M214 92
                       Q222 160 220 250"
                    fill="none"
                    stroke="rgba(255,255,255,.09)"
                    stroke-width="5"
                    stroke-linecap="round"/>
            </svg>

            <div class="brain-area">
              <div class="brain-blob" id="brainBlob"></div>
              <div class="thought-text" id="thoughtText">Drop a thought above</div>
              <div class="brain-cracks" id="brainCracks"></div>
            </div>

            <div class="glass-cracks" id="glassCracks"></div>
          </div>
        </div>

        <div class="smash" id="smashText">SMASH</div>

        <div class="result" id="result">
          <div>
            <div class="affirmation" id="affirmationText"></div>
            <div class="subaffirm">You don’t have to keep that one.</div>
            <button class="again" id="againBtn">Dump another thought</button>
          </div>
        </div>
      </div>

      <div class="disclaimer">
        A small reflection tool for stress relief and emotional reset. It is not a substitute for professional, crisis, or mental health care.
      </div>
    </div>
  </div>

  <script>
    const thoughtInput = document.getElementById('thoughtInput');
    const dumpBtn = document.getElementById('dumpBtn');
    const scene = document.getElementById('scene');
    const jar = document.getElementById('jar');
    const thoughtText = document.getElementById('thoughtText');
    const brainCracks = document.getElementById('brainCracks');
    const glassCracks = document.getElementById('glassCracks');
    const smashText = document.getElementById('smashText');
    const result = document.getElementById('result');
    const affirmationText = document.getElementById('affirmationText');
    const againBtn = document.getElementById('againBtn');

    const affirmations = [
      "You can let that go.",
      "That thought doesn’t get to stay.",
      "Not every thought is true.",
      "Your mind just made more room.",
      "You don’t have to carry that one.",
      "That spiral just lost its grip.",
      "That one was loud, not wise.",
      "You are allowed to release it."
    ];

    const smashWords = ["SMASH", "CRACK", "POP", "BREAK"];

    let state = {
      ready: false,
      broken: false,
      tapsNeeded: 0,
      tapsDone: 0,
      currentThought: ""
    };

    function truncateThought(text, max = 70) {
      const clean = text.replace(/\s+/g, ' ').trim();
      return clean.length <= max ? clean : clean.slice(0, max).trim() + '...';
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function vibrate(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    function resetVisuals() {
      scene.classList.remove('healed', 'shake');
      result.classList.remove('show');
      brainCracks.innerHTML = '';
      glassCracks.innerHTML = '';
      smashText.classList.remove('show');
      state.broken = false;
      state.tapsDone = 0;
    }

    function buildGame() {
      const text = thoughtInput.value.trim();
      if (!text) {
        thoughtInput.focus();
        return;
      }

      resetVisuals();

      state.ready = true;
      state.currentThought = truncateThought(text);
      state.tapsNeeded = randomInt(4, 9);
      thoughtText.textContent = state.currentThought;
    }

    function addBrainCrack() {
      const crack = document.createElement('div');
      crack.className = 'crack';
      crack.style.left = `${randomInt(30, 70)}%`;
      crack.style.top = `${randomInt(26, 68)}%`;
      crack.style.height = `${randomInt(48, 108)}px`;
      crack.style.transform = `rotate(${randomInt(0, 359)}deg)`;
      crack.style.setProperty('--b1', `${randomInt(14, 30)}px`);
      crack.style.setProperty('--b2', `${randomInt(12, 24)}px`);
      brainCracks.appendChild(crack);
    }

    function addGlassCrack() {
      const line = document.createElement('div');
      line.className = 'glass-line';
      line.style.left = `${randomInt(26, 74)}%`;
      line.style.top = `${randomInt(20, 54)}%`;
      line.style.height = `${randomInt(70, 130)}px`;
      line.style.transform = `rotate(${randomInt(0, 359)}deg)`;
      line.style.setProperty('--g1', `${randomInt(14, 32)}px`);
      line.style.setProperty('--g2', `${randomInt(12, 24)}px`);
      glassCracks.appendChild(line);
    }

    function popSmash() {
      const rect = scene.getBoundingClientRect();
      smashText.textContent = pick(smashWords);
      smashText.style.left = `${randomInt(rect.width * 0.18, rect.width * 0.72)}px`;
      smashText.style.top = `${randomInt(rect.height * 0.20, rect.height * 0.58)}px`;
      smashText.classList.remove('show');
      void smashText.offsetWidth;
      smashText.classList.add('show');
    }

    function tapJar() {
      if (!state.ready || state.broken) return;

      state.tapsDone += 1;

      jar.classList.remove('hit');
      void jar.offsetWidth;
      jar.classList.add('hit');

      addBrainCrack();
      if (state.tapsDone >= 2 && Math.random() > 0.35) addGlassCrack();

      popSmash();
      vibrate(18);

      if (state.tapsDone >= state.tapsNeeded) {
        completeBreak();
      }
    }

    function completeBreak() {
      state.broken = true;
      scene.classList.add('shake');

      if (glassCracks.children.length < 4) {
        for (let i = glassCracks.children.length; i < 4; i++) addGlassCrack();
      }

      vibrate([25, 20, 45, 20, 80]);

      setTimeout(() => {
        scene.classList.add('healed');
      }, 120);

      setTimeout(() => {
        affirmationText.textContent = pick(affirmations);
        result.classList.add('show');
        state.ready = false;
      }, 760);
    }

    dumpBtn.addEventListener('click', buildGame);
    jar.addEventListener('click', tapJar);

    againBtn.addEventListener('click', () => {
      resetVisuals();
      state.ready = false;
      thoughtInput.value = '';
      thoughtText.textContent = 'Drop a thought above';
      thoughtInput.focus();
    });

    thoughtInput.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') buildGame();
    });
  </script>
</body>
</html>
