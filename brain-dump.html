<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Dumper</title>
  <style>
    :root{
      --bg1:#08111f;
      --bg2:#13233c;
      --card:rgba(255,255,255,.08);
      --cardBorder:rgba(255,255,255,.14);
      --text:#f7fbff;
      --muted:#bad0e8;
      --accent:#7dd3fc;
      --accent2:#a78bfa;
      --good:#86efac;
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(125,211,252,.16), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(167,139,250,.14), transparent 28%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
      color:var(--text);
      overflow-x:hidden;
    }

    body{
      display:flex;
      justify-content:center;
      padding:22px 14px 40px;
    }

    .wrap{
      width:100%;
      max-width:720px;
      position:relative;
    }

    .card{
      background:var(--card);
      border:1px solid var(--cardBorder);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter: blur(18px);
      overflow:hidden;
      position:relative;
    }

    .top{
      padding:24px 20px 10px;
      text-align:center;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      font-size:.86rem;
      color:var(--muted);
      margin-bottom:14px;
    }

    h1{
      margin:0;
      font-size:clamp(2rem,5vw,3rem);
      line-height:1;
      letter-spacing:-.03em;
    }

    .sub{
      margin:12px auto 0;
      max-width:560px;
      color:var(--muted);
      font-size:1rem;
      line-height:1.45;
    }

    .entry{
      padding:18px 20px 0;
    }

    label{
      display:block;
      margin:0 0 10px;
      color:#d9ecff;
      font-weight:700;
      font-size:.95rem;
    }

    textarea{
      width:100%;
      min-height:140px;
      resize:vertical;
      border:none;
      outline:none;
      border-radius:20px;
      padding:18px 18px 20px;
      font-size:1.05rem;
      line-height:1.5;
      background:rgba(7,16,30,.75);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    textarea::placeholder{
      color:#97afc7;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      padding:16px 20px 20px;
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:15px 22px;
      font-size:1rem;
      font-weight:800;
      transition:transform .15s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button:active{
      transform:scale(.98);
    }

    .dump-btn{
      flex:1 1 220px;
      color:#08111f;
      background:linear-gradient(135deg,var(--accent),#c4b5fd);
      box-shadow:0 12px 25px rgba(125,211,252,.24);
    }

    .clear-btn{
      background:rgba(255,255,255,.08);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
    }

    .stage{
      position:relative;
      min-height:300px;
      padding:4px 20px 24px;
      overflow:hidden;
    }

    .scene{
      position:relative;
      height:280px;
      border-radius:24px;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,.12), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      overflow:hidden;
    }

    .glow{
      position:absolute;
      inset:auto 0 18px 0;
      margin:auto;
      width:160px;
      height:28px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(125,211,252,.32), transparent 70%);
      filter:blur(12px);
      opacity:.5;
    }

    .brain{
      position:absolute;
      left:50%;
      bottom:62px;
      width:128px;
      height:108px;
      transform:translateX(-50%);
      filter:drop-shadow(0 18px 24px rgba(0,0,0,.28));
      transition:transform .45s ease, opacity .35s ease;
      z-index:3;
    }

    .brain .blob{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 30% 30%, #ffc6de, #ff90be 70%),
        linear-gradient(180deg, #ffb0d0, #ff7db4);
      border-radius:48% 52% 46% 54% / 42% 42% 58% 58%;
      border:3px solid rgba(255,255,255,.28);
      box-shadow: inset 0 10px 16px rgba(255,255,255,.14);
    }

    .brain:before,
    .brain:after{
      content:"";
      position:absolute;
      top:12px;
      width:52px;
      height:76px;
      border:3px solid rgba(255,255,255,.25);
      border-radius:48% 52% 45% 55%;
      opacity:.55;
    }

    .brain:before{left:12px}
    .brain:after{right:12px}

    .face{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .eye{
      position:absolute;
      top:48px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:#4b2840;
    }

    .eye.left{left:40px}
    .eye.right{right:40px}

    .mouth{
      position:absolute;
      left:50%;
      bottom:26px;
      width:30px;
      height:14px;
      border-bottom:4px solid #4b2840;
      border-radius:0 0 20px 20px;
      transform:translateX(-50%);
      opacity:.75;
    }

    .dump-hole{
      position:absolute;
      left:50%;
      bottom:26px;
      transform:translateX(-50%);
      width:150px;
      height:42px;
      background:radial-gradient(ellipse at center, rgba(0,0,0,.82), rgba(0,0,0,.25) 72%, transparent 73%);
      border-radius:50%;
      z-index:1;
    }

    .stream{
      position:absolute;
      left:50%;
      bottom:82px;
      width:18px;
      height:20px;
      transform:translateX(-50%);
      background:linear-gradient(180deg, rgba(125,211,252,.95), rgba(167,139,250,.95));
      border-radius:10px;
      opacity:0;
      filter:blur(.4px);
      z-index:2;
    }

    .burst{
      position:absolute;
      left:50%;
      top:52%;
      width:14px;
      height:14px;
      border-radius:50%;
      background:radial-gradient(circle, #fff, rgba(255,255,255,.2));
      opacity:0;
      pointer-events:none;
    }

    .float-word{
      position:absolute;
      left:50%;
      top:56%;
      transform:translate(-50%,0);
      font-size:.9rem;
      font-weight:700;
      color:#e7f6ff;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      padding:8px 12px;
      border-radius:999px;
      opacity:0;
      white-space:nowrap;
      z-index:4;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }

    .affirmation-card{
      margin-top:16px;
      background:rgba(8,17,31,.48);
      border:1px solid rgba(125,211,252,.18);
      border-radius:22px;
      padding:18px 18px 16px;
      opacity:0;
      transform:translateY(12px);
      transition:all .45s ease;
    }

    .affirmation-card.show{
      opacity:1;
      transform:translateY(0);
    }

    .affirmation-tag{
      display:inline-block;
      font-size:.78rem;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:var(--good);
      margin-bottom:8px;
    }

    .affirmation{
      font-size:1.18rem;
      line-height:1.45;
      margin:0;
    }

    .tiny{
      margin-top:10px;
      color:var(--muted);
      font-size:.92rem;
      line-height:1.45;
    }

    .shake{
      animation:shake .45s ease;
    }

    .brain.dumping{
      animation:brainDrop .95s ease forwards;
    }

    .stream.go{
      animation:streamDump .95s ease forwards;
    }

    .brain.relief{
      animation:brainRelief 1.5s ease forwards;
    }

    .burst.go{
      animation:burst 1.2s ease forwards;
    }

    .float-word.go{
      animation:floatAway 1.5s ease forwards;
    }

    @keyframes shake{
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(7px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(4px)}
    }

    @keyframes brainDrop{
      0%{transform:translateX(-50%) translateY(0) scale(1)}
      18%{transform:translateX(-50%) translateY(-10px) scale(1.03)}
      50%{transform:translateX(-50%) translateY(18px) scale(.96)}
      72%{transform:translateX(-50%) translateY(10px) scale(1.01)}
      100%{transform:translateX(-50%) translateY(0) scale(1)}
    }

    @keyframes streamDump{
      0%{opacity:0;height:10px}
      15%{opacity:1;height:22px}
      35%{opacity:1;height:88px}
      70%{opacity:1;height:132px}
      100%{opacity:0;height:148px}
    }

    @keyframes brainRelief{
      0%{transform:translateX(-50%) translateY(0) scale(1)}
      28%{transform:translateX(-50%) translateY(-10px) scale(.98)}
      55%{transform:translateX(-50%) translateY(-18px) scale(.95)}
      100%{transform:translateX(-50%) translateY(-10px) scale(.965)}
    }

    @keyframes burst{
      0%{opacity:0; transform:translate(-50%,-50%) scale(.4)}
      25%{opacity:1; transform:translate(-50%,-50%) scale(4)}
      100%{opacity:0; transform:translate(-50%,-50%) scale(8)}
    }

    @keyframes floatAway{
      0%{opacity:0; transform:translate(-50%,18px) scale(.8)}
      10%{opacity:1; transform:translate(-50%,0) scale(1)}
      60%{opacity:1; transform:translate(-50%,-54px) scale(1.03)}
      100%{opacity:0; transform:translate(-50%,-104px) scale(.95)}
    }

    .footer-note{
      text-align:center;
      color:#a8bfd7;
      font-size:.85rem;
      padding:8px 18px 22px;
    }

    @media (max-width:560px){
      .scene{height:260px}
      .brain{width:112px;height:96px}
      .affirmation{font-size:1.05rem}
      .actions{padding-top:14px}
      .dump-btn,.clear-btn{width:100%}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="badge">🧠 Brain Dumper</div>
        <h1>Dump it out.</h1>
        <p class="sub">
          Type the thing that’s spinning in your head, hit dump, and let the app
          toss back something steadier and kinder.
        </p>
      </div>

      <div class="entry">
        <label for="dumpInput">What’s stuck in your head right now?</label>
        <textarea id="dumpInput" placeholder="Example: I’m scared everybody hates me."></textarea>
      </div>

      <div class="actions">
        <button class="dump-btn" id="dumpBtn">Dump It</button>
        <button class="clear-btn" id="clearBtn" type="button">Clear</button>
      </div>

      <div class="stage">
        <div class="scene" id="scene">
          <div class="glow"></div>
          <div class="brain" id="brain">
            <div class="blob"></div>
            <div class="face">
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="mouth"></div>
            </div>
          </div>
          <div class="stream" id="stream"></div>
          <div class="dump-hole"></div>
          <div class="burst" id="burst"></div>
          <div class="float-word" id="floatWord">letting it go</div>
        </div>

        <div class="affirmation-card" id="affirmationCard">
          <div class="affirmation-tag">Relief returned:</div>
          <p class="affirmation" id="affirmationText"></p>
          <div class="tiny" id="tinyText"></div>
        </div>
      </div>

      <div class="footer-note">
        One thought dumped is one less thought running laps.
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('dumpInput');
    const dumpBtn = document.getElementById('dumpBtn');
    const clearBtn = document.getElementById('clearBtn');
    const brain = document.getElementById('brain');
    const stream = document.getElementById('stream');
    const burst = document.getElementById('burst');
    const floatWord = document.getElementById('floatWord');
    const affirmationCard = document.getElementById('affirmationCard');
    const affirmationText = document.getElementById('affirmationText');
    const tinyText = document.getElementById('tinyText');
    const scene = document.getElementById('scene');

    const categories = [
      {
        match: ['hate me','nobody likes me','everybody hates me','rejected','they hate me','ignored','left out','not wanted'],
        word: 'rejection',
        lines: [
          "Not every quiet room is a verdict about you.",
          "You do not need everyone’s approval to be okay today.",
          "Your worth did not rise and fall because somebody felt weird."
        ],
        tiny: [
          "Maybe this is just your fear doing impressions again.",
          "You’re allowed to take up space without reading minds.",
          "The story in your head is not always the truth in the room."
        ]
      },
      {
        match: ['scared','afraid','fear','panic','anxious','anxiety','terrified','nervous'],
        word: 'fear',
        lines: [
          "Fear is loud, but loud does not mean true.",
          "You can feel fear and still not obey it.",
          "This moment is survivable, even if your head is being dramatic."
        ],
        tiny: [
          "Breathe first. Decide second.",
          "Your nervous system is trying to protect you, not predict the future.",
          "You don’t have to solve your whole life in this one mood."
        ]
      },
      {
        match: ['failure','failing','screwed up','mess up','loser','not good enough','worthless','behind'],
        word: 'shame',
        lines: [
          "A hard moment is not your whole identity.",
          "You are allowed to be unfinished and still valuable.",
          "Messy does not mean hopeless."
        ],
        tiny: [
          "You’re a person, not a performance review.",
          "Growth usually looks clumsy before it looks inspiring.",
          "You can be learning without being lost."
        ]
      },
      {
        match: ['angry','mad','furious','resent','resentment','pissed','rage'],
        word: 'anger',
        lines: [
          "Anger can signal pain without becoming your steering wheel.",
          "You don’t have to carry this heat all day.",
          "You can loosen your grip without pretending nothing happened."
        ],
        tiny: [
          "Maybe your peace is worth more than one more mental argument.",
          "You can step back before you strike back.",
          "Not everything needs your courtroom today."
        ]
      },
      {
        match: ['alone','lonely','nobody','isolated','by myself','empty'],
        word: 'loneliness',
        lines: [
          "Lonely is a feeling, not proof that you are forgotten.",
          "You still belong here, even on the weird days.",
          "Connection can start small — one text, one breath, one honest moment."
        ],
        tiny: [
          "You do not have to disappear just because you feel low.",
          "Sometimes the next right move is simply reaching one inch outward.",
          "Being human feels strange sometimes. You’re still not alone in that."
        ]
      },
      {
        match: ['control','cant fix','can’t fix','fix it','make them','make him','make her','make people','controlling'],
        word: 'control',
        lines: [
          "You can care deeply without running the universe.",
          "Not everything is yours to fix.",
          "Peace often begins where control finally gets tired."
        ],
        tiny: [
          "You’re allowed to put down what was never really in your hands.",
          "Trying harder is not always the same as surrendering better.",
          "You can love people without managing their whole movie."
        ]
      },
      {
        match: ['tired','burned out','burnt out','exhausted','drained','done','worn out'],
        word: 'burnout',
        lines: [
          "Tired does not mean broken.",
          "Rest is not weakness; it is maintenance.",
          "You do not have to earn the right to take a breath."
        ],
        tiny: [
          "Even machines overheat. You are a person.",
          "You’re allowed to stop clenching for a minute.",
          "Maybe today doesn’t need greatness. Maybe it just needs gentleness."
        ]
      }
    ];

    const generalLines = [
      "That thought can leave without taking you with it.",
      "You are allowed to put this down for a minute.",
      "Just because your brain said it with confidence does not make it true.",
      "You can let this pass through instead of building a house for it.",
      "You are not every thought that wanders through your head."
    ];

    const generalTiny = [
      "Dumped thoughts don’t get the last word.",
      "A little less pressure is still relief.",
      "That spiral looked important. It wasn’t necessarily useful.",
      "You don’t have to keep polishing a fear to prove it exists.",
      "Good job taking out some mental trash."
    ];

    const floatWords = [
      "letting it go",
      "not today",
      "less heavy",
      "brain cleared",
      "dump complete",
      "out it goes"
    ];

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function getAffirmation(text){
      const t = text.toLowerCase();

      for(const category of categories){
        if(category.match.some(m => t.includes(m))){
          return {
            word: category.word,
            line: pick(category.lines),
            tiny: pick(category.tiny)
          };
        }
      }

      return {
        word: 'mental clutter',
        line: pick(generalLines),
        tiny: pick(generalTiny)
      };
    }

    function resetAnimationState(){
      brain.classList.remove('dumping','relief','shake');
      stream.classList.remove('go');
      burst.classList.remove('go');
      floatWord.classList.remove('go');
    }

    function clearOutput(){
      affirmationCard.classList.remove('show');
      affirmationText.textContent = '';
      tinyText.textContent = '';
      floatWord.textContent = 'letting it go';
    }

    dumpBtn.addEventListener('click', () => {
      const text = input.value.trim();

      if(!text){
        scene.classList.remove('shake');
        void scene.offsetWidth;
        scene.classList.add('shake');
        affirmationCard.classList.add('show');
        affirmationText.textContent = "Put one thought in the box first, even if it’s ugly.";
        tinyText.textContent = "A brain dump works better when there’s actually something to dump.";
        return;
      }

      const result = getAffirmation(text);
      resetAnimationState();
      void brain.offsetWidth;

      floatWord.textContent = pick(floatWords);

      brain.classList.add('dumping');
      stream.classList.add('go');

      setTimeout(() => {
        brain.classList.remove('dumping');
        brain.classList.add('relief');
        burst.classList.add('go');
        floatWord.classList.add('go');
      }, 650);

      setTimeout(() => {
        affirmationText.textContent = result.line;
        tinyText.textContent = result.tiny;
        affirmationCard.classList.add('show');
      }, 980);

      setTimeout(() => {
        resetAnimationState();
      }, 2200);
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearOutput();
      resetAnimationState();
      scene.classList.remove('shake');
      input.focus();
    });
  </script>
</body>
</html>
