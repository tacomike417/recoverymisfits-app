<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Brain Dumper</title>

<style>

:root{
--bg:#1e2126;
--panel:#2a2e35;
--text:#f3f5f7;
--pink:#ff6ca8;
--pink2:#ff9fc8;
--gray1:#d6dbe1;
--gray2:#c0c6cd;
--gray3:#aeb6bf;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,Segoe UI,Roboto,sans-serif;
background:linear-gradient(#2b2f36,#1e2126);
color:var(--text);
display:flex;
justify-content:center;
padding:20px;
}

.wrap{
width:100%;
max-width:700px;
}

.card{
background:linear-gradient(#2a2e35,#1b1e23);
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 20px 40px rgba(0,0,0,.35);
overflow:hidden;
}

.top{
text-align:center;
padding:24px 20px 10px;
}

h1{
margin:0;
font-size:2.6rem;
letter-spacing:-.04em;
}

.entry{
padding:14px 20px 0;
}

textarea{
width:100%;
min-height:110px;
border-radius:18px;
border:none;
outline:none;
padding:16px;
background:#13161a;
border:1px solid rgba(255,255,255,.08);
color:white;
font-size:1rem;
}

textarea::placeholder{
color:#9aa3ad;
}

.actions{
padding:12px 20px 18px;
}

.dump-btn{
width:100%;
padding:15px;
border:none;
border-radius:999px;
font-weight:900;
font-size:1rem;
color:white;
cursor:pointer;
background:linear-gradient(135deg,var(--pink),var(--pink2));
box-shadow:0 12px 24px rgba(255,80,160,.25);
}

.scene{
position:relative;
height:480px;
margin:0 20px 16px;
border-radius:22px;
overflow:hidden;
border:1px solid rgba(255,255,255,.08);
background:#30343b;
display:flex;
align-items:center;
justify-content:center;
}

.prompt{
position:absolute;
top:16px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.25);
border-radius:999px;
padding:8px 14px;
font-weight:900;
font-size:.85rem;
}

.brain{
width:320px;
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
cursor:pointer;
color:#1c2127;
font-weight:900;
font-size:1.2rem;

background:
radial-gradient(circle at 35% 30%,var(--gray1) 0%,var(--gray2) 45%,var(--gray3) 100%);

border-radius:55% 45% 50% 50% / 55% 55% 45% 45%;

box-shadow:
0 18px 40px rgba(0,0,0,.25),
inset 0 10px 20px rgba(255,255,255,.6),
inset 0 -10px 20px rgba(0,0,0,.05);

animation:pulse 2.8s ease-in-out infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.02)}
}

.brain.hit{
animation:thump .18s ease;
}

@keyframes thump{
0%{transform:scale(1)}
40%{transform:scale(.95)}
100%{transform:scale(1)}
}

.scene.healed .brain{
background:
radial-gradient(circle at 35% 30%,#ffd6e8 0%,#ff9ec7 45%,#ff6da9 100%);
color:white;
}

.smash{
position:absolute;
font-weight:900;
font-size:2rem;
color:white;
opacity:0;
pointer-events:none;
}

.smash.show{
animation:pop .35s ease forwards;
}

@keyframes pop{
0%{opacity:0;transform:scale(.4)}
50%{opacity:1;transform:scale(1.2)}
100%{opacity:0;transform:scale(1.4)}
}

.result{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
opacity:0;
transition:.6s;
}

.result.show{
opacity:1;
}

.affirmation{
font-size:2.6rem;
font-weight:900;
max-width:500px;
}

.again{
margin-top:18px;
border:none;
border-radius:999px;
padding:12px 18px;
font-weight:900;
cursor:pointer;
}

.disclaimer{
text-align:center;
font-size:.75rem;
color:#9aa3ad;
padding:0 20px 20px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="top">
<h1>🧠 The Brain Dumper</h1>
</div>

<div class="entry">
<textarea id="thoughtInput" placeholder="What's stuck in your head right now?"></textarea>
</div>

<div class="actions">
<button class="dump-btn" id="dumpBtn">Dump</button>
</div>

<div class="scene" id="scene">

<div class="prompt">Now smash that thought</div>

<div class="brain" id="brain">
Drop a thought above
</div>

<div class="smash" id="smash">SMASH</div>

<div class="result" id="result">
<div>
<div class="affirmation" id="affirmation"></div>
<button class="again" id="again">Dump another thought</button>
</div>
</div>

</div>

<div class="disclaimer">
A small reflection tool for emotional reset. Not a substitute for professional care.
</div>

</div>
</div>

<script>

const brain=document.getElementById("brain")
const dumpBtn=document.getElementById("dumpBtn")
const thoughtInput=document.getElementById("thoughtInput")
const smash=document.getElementById("smash")
const scene=document.getElementById("scene")
const result=document.getElementById("result")
const affirmation=document.getElementById("affirmation")
const again=document.getElementById("again")

const affirmations=[
"You can let that go.",
"That thought doesn't get to stay.",
"Not every thought is true.",
"Your mind just made more space.",
"You don't have to carry that one.",
"That spiral just lost its grip."
]

let tapsNeeded=0
let taps=0
let ready=false

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

dumpBtn.onclick=()=>{
const text=thoughtInput.value.trim()
if(!text)return

brain.textContent=text
tapsNeeded=rand(3,10)
taps=0
ready=true
scene.classList.remove("healed")
result.classList.remove("show")
}

brain.onclick=()=>{

if(!ready)return

taps++

brain.classList.remove("hit")
void brain.offsetWidth
brain.classList.add("hit")

smash.textContent=["SMASH","CRACK","POP","BONK"][rand(0,3)]

smash.style.left=rand(40,300)+"px"
smash.style.top=rand(120,260)+"px"

smash.classList.remove("show")
void smash.offsetWidth
smash.classList.add("show")

if(taps>=tapsNeeded){

scene.classList.add("healed")

affirmation.textContent=
affirmations[rand(0,affirmations.length-1)]

result.classList.add("show")

ready=false

}

}

again.onclick=()=>{
thoughtInput.value=""
brain.textContent="Drop a thought above"
result.classList.remove("show")
scene.classList.remove("healed")
ready=false
}

</script>

</body>
</html>
