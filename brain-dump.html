<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Brain Dumper</title>

<style>

*{
box-sizing:border-box;
font-family:system-ui, -apple-system, Segoe UI, Roboto;
}

body{
margin:0;
color:white;
overflow:hidden;
}

/* ---------- BRAIN BACKGROUND ---------- */

body.gray{
background:
radial-gradient(circle at 20% 30%, #5a5a5a 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #6b6b6b 0%, transparent 40%),
radial-gradient(circle at 50% 50%, #4c4c4c 0%, #2e2e2e 70%);
transition:background 0.8s ease;
}

body.pink{
background:
radial-gradient(circle at 20% 30%, #ff9ec4 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #ffb7d2 0%, transparent 40%),
radial-gradient(circle at 50% 50%, #ff7fb1 0%, #d94f88 70%);
transition:background 0.8s ease;
}

/* ---------- UI ---------- */

.wrapper{
max-width:700px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin:10px 0 20px;
font-size:34px;
}

textarea{
width:100%;
height:120px;
border-radius:16px;
border:none;
padding:16px;
font-size:16px;
resize:none;
background:#1e1e1e;
color:white;
}

button{
width:100%;
margin-top:10px;
padding:14px;
font-size:18px;
border-radius:999px;
border:none;
cursor:pointer;
font-weight:bold;
background:#ff4fa0;
color:white;
}

/* ---------- GAME AREA ---------- */

.game{
position:relative;
height:420px;
margin-top:20px;
border-radius:20px;
background:rgba(0,0,0,.25);
overflow:hidden;
}

.hole{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:140px;
height:40px;
border-radius:50%;
background:black;
box-shadow:
0 0 20px rgba(255,0,100,.6),
inset 0 6px 10px rgba(255,255,255,.1);
animation:pulse 1.6s infinite;
}

@keyframes pulse{
0%{transform:translateX(-50%) scale(1)}
50%{transform:translateX(-50%) scale(1.12)}
100%{transform:translateX(-50%) scale(1)}
}

/* ---------- THOUGHT BUBBLE ---------- */

.thought{
position:absolute;
top:100px;
left:50%;
transform:translate(-50%,0);
padding:12px 18px;
border-radius:999px;
background:white;
color:black;
font-weight:bold;
cursor:grab;
user-select:none;
white-space:nowrap;
}

/* ---------- AFFIRMATION ---------- */

.affirmation{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
font-size:34px;
opacity:0;
transition:opacity .8s;
}

.affirmation.show{
opacity:1;
}

/* ---------- DISCLAIMER ---------- */

.disclaimer{
margin-top:14px;
text-align:center;
font-size:12px;
opacity:.6;
}

</style>
</head>

<body class="gray">

<div class="wrapper">

<h1>The Brain Dumper</h1>

<textarea id="thoughtInput" placeholder="What's stuck in your head?"></textarea>

<button id="dumpBtn">Dump</button>

<div class="game" id="game">

<div class="hole" id="hole"></div>

<div class="affirmation" id="affirmation"></div>

</div>

<div class="disclaimer">
A small tool for letting thoughts go.  
Not a substitute for professional care.
</div>

</div>

<script>

/* ---------- ELEMENTS ---------- */

const dumpBtn = document.getElementById("dumpBtn")
const input = document.getElementById("thoughtInput")
const game = document.getElementById("game")
const hole = document.getElementById("hole")
const affirmation = document.getElementById("affirmation")

let thought
let dragging = false

/* ---------- AFFIRMATIONS ---------- */

const affirmations = [

"That thought doesn't get to stay.",
"You can let that go.",
"Not every thought is true.",
"Your mind can be quieter.",
"That spiral just lost.",
"You don't have to carry that."

]

/* ---------- CREATE THOUGHT ---------- */

dumpBtn.onclick = () => {

const text = input.value.trim()

if(!text) return

const truncated = text.length > 40
? text.slice(0,40)+"..."
: text

thought = document.createElement("div")
thought.className = "thought"
thought.innerText = "Thought: " + truncated

game.appendChild(thought)

/* drifting motion */

let driftX = 0
let driftY = 0

setInterval(()=>{

if(dragging) return

driftX += (Math.random()-0.5)*40
driftY += (Math.random()-0.5)*20

thought.style.transform =
`translate(calc(-50% + ${driftX}px), ${driftY}px)`

},900)

/* drag */

thought.onpointerdown = e=>{
dragging=true
thought.setPointerCapture(e.pointerId)
}

thought.onpointermove = e=>{
if(!dragging) return

const rect = game.getBoundingClientRect()

const x = e.clientX - rect.left
const y = e.clientY - rect.top

thought.style.left = x+"px"
thought.style.top = y+"px"
thought.style.transform="translate(-50%,-50%)"

checkHole(x,y)
}

thought.onpointerup = ()=>{
dragging=false
}

}

/* ---------- HOLE DETECTION ---------- */

function checkHole(x,y){

const rect = hole.getBoundingClientRect()
const gameRect = game.getBoundingClientRect()

const hx = rect.left - gameRect.left + rect.width/2
const hy = rect.top - gameRect.top + rect.height/2

const dist = Math.hypot(x-hx,y-hy)

if(dist < 70){

dumpSuccess()

}

}

/* ---------- SUCCESS ---------- */

function dumpSuccess(){

thought.remove()

document.body.classList.remove("gray")
document.body.classList.add("pink")

const text = affirmations[
Math.floor(Math.random()*affirmations.length)
]

affirmation.innerText = text
affirmation.classList.add("show")

navigator.vibrate?.([60,40,80])

}

</script>

</body>
</html>
