<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Updates — Recovery Misfits v2</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="./icon-192.png">

  <style>
    body{
      margin:0;
      font-family:Roboto,Arial,sans-serif;
      background:#fff;
      padding-bottom:110px;
      color:#111;
    }

    header{
      position:sticky;
      top:0;
      z-index:9000;
      background:#fff;
      border-bottom:1px solid rgba(0,0,0,.12);
      padding:12px;
      text-align:center;
      font-weight:900;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:16px 14px 28px;
    }

    .sub{
      margin:6px 0 16px;
      color:#666;
      font-size:13px;
      text-align:center;
    }

    .card{
      border:1px solid rgba(0,0,0,.12);
      border-radius:14px;
      padding:14px;
      margin:12px 0;
      background:#fff;
    }

    .card h3{
      margin:0 0 6px;
      font-size:15px;
    }

    .meta{
      font-size:12px;
      color:#666;
      margin-bottom:8px;
    }

    .card ul{
      margin:0;
      padding-left:18px;
      color:#222;
    }

    /* ===== BOTTOM NAV (same style as app) ===== */
    nav#bottomBar{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      height:64px;
      background:#000;
      border-top:1px solid #222;
      display:flex;
      justify-content:space-around;
      align-items:center;
      z-index:9500;
    }

    .navItem{
      flex:1;
      text-align:center;
      text-decoration:none;
      font-size:11px;
      padding:8px 4px;
      color:#bbb;
    }

    .navItem .ico{
      display:block;
      font-size:18px;
      margin-bottom:3px;
    }

    .navItem.active{
      color:#fff;
      font-weight:700;
    }
  </style>
</head>

<body>

  <!-- ======================================================
       🔑 UPDATE MARKER (TOP BAR READS THIS — DO NOT REMOVE)
       Change data-update-id when you post a new update
       ====================================================== -->
  <div id="rm-update-marker"
       data-update-id="2026-02-27-v2-welcome"
       data-update-title="02-27-2026 — Welcome to Recovery Misfits Version 2"
       style="display:none;"></div>

  <header>Updates</header>

  <div class="wrap">
    <div class="sub">No spam. Just changes and new stuff.</div>

    <!-- ===== NEWEST UPDATE (ADD NEW ONES AT TOP) ===== -->
    <div class="card">
      <h3>02-27-2026 — Welcome to Recovery Misfits Version 2</h3>
      <div class="meta">A fresh start</div>
      <ul>
        <li>New top bar with install support</li>
        <li>Cleaner layout for tools, audio, and games</li>
        <li>Updates tab added so you can see what’s new</li>
      </ul>
    </div>

    <!-- Future updates go ABOVE older ones -->

  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav id="bottomBar">
    <a class="navItem" href="./index2.html">
      <span class="ico">🏠</span>Home
    </a>
    <a class="navItem" href="./tools.html">
      <span class="ico">🔧</span>Tools
    </a>
    <a class="navItem" href="./readings.html">
      <span class="ico">📖</span>Readings
    </a>
    <a class="navItem" href="./audio.html">
      <span class="ico">🎧</span>Audio
    </a>
    <a class="navItem" href="./fun.html">
      <span class="ico">🎮</span>Fun
    </a>
    <a class="navItem active" href="./updates.html">
      <span class="ico">🆕</span>Updates
    </a>
  </nav>

  <!-- ======================================================
       ✔ MARK UPDATE AS SEEN AFTER ONE VISIT
       ====================================================== -->
  <script>
    (function(){
      const marker = document.getElementById('rm-update-marker');
      if(!marker) return;

      const updateId = marker.getAttribute('data-update-id');
      if(updateId){
        localStorage.setItem('lastSeenUpdateId', updateId);
      }
    })();
  </script>

</body>
</html>
