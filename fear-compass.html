<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fear Compass</title>

<style>

:root{
--gold:#d4af37;
--blue:#2f5f9e;
--soft:#666;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#fff;
color:#111;
margin:0;
padding:20px;
}

.container{
max-width:720px;
margin:auto;
}

h1{
text-align:center;
}

.card{
border:2px solid #111;
border-radius:18px;
padding:20px;
margin-top:20px;
}

textarea{
width:100%;
padding:14px;
border-radius:14px;
border:2px solid #111;
font-size:16px;
}

button{
padding:12px 18px;
border-radius:20px;
border:none;
font-weight:bold;
cursor:pointer;
}

.primary{
background:var(--blue);
color:white;
}

.secondary{
background:white;
border:2px solid #111;
}

.choice{
display:block;
width:100%;
padding:14px;
margin:6px 0;
border-radius:14px;
border:2px solid var(--gold);
background:white;
text-align:left;
cursor:pointer;
}

.choice.selected{
background:var(--gold);
color:white;
}

.divider{
height:2px;
background:var(--gold);
margin:16px 0;
}

.check{
display:flex;
align-items:center;
margin:10px 0;
}

.check input{
margin-right:10px;
}

.quote{
border:2px solid var(--blue);
border-radius:18px;
padding:18px;
background:#eef3fa;
font-style:italic;
margin-bottom:18px;
}

.timer{
font-size:28px;
font-weight:bold;
text-align:center;
margin:14px 0;
color:var(--blue);
}

</style>
</head>

<body>

<div class="container">

<h1>🧭 Fear Compass</h1>

<div id="app"></div>

</div>

<script>

const state={
step:1,
fear:"",
category:"",
namedFear:"",
heldBack:"",
stolen:[],
rootFear:"",
ifTrue:"",
reactions:[],
nextAction:"",
time:30,
timer:null
}

const categories={
"Me and other people":[
"Fear of Rejection","Fear of Loneliness","Fear of Abandonment",
"Fear of Intimacy","Fear of People"
],

"How I feel":[
"Fear of Failure","Fear of Success","Fear of Feelings",
"Fear of Being Found Out","Fear of Responsibility"
],

"Body and health":[
"Fear of Dying","Fear of Disease","Fear of Hospitals"
],

"Drinking and using":[
"Fear of Relapse","Fear of Sobriety"
],

"Authority stuff":[
"Fear of Police","Fear of Jail","Fear of Authority"
],

"Life falling apart":[
"Fear of Unemployment","Fear of Poverty","Fear of Change"
],

"God and spiritual stuff":[
"Fear of God","Fear of Doing Something Wrong"
],

"Physical danger":[
"Fear of Violence","Fear of Guns","Fear of Heights","Fear of The Unknown"
]
}

const stolenOptions=[
"Avoiding certain people",
"Spending time with loved ones",
"Earning money",
"Sleep",
"Peace of mind",
"Showing up for work",
"Asking for help",
"Trying new things",
"Speaking up",
"Going places I need to go",
"Doing what I know I should do"
]

const rootFears={
"Rejection":"I might not be accepted.",
"Abandonment":"They might move on without me and I’m all alone.",
"Neglect":"I feel like I’m on my own and nobody’s there for me.",
"Unknown":"I feel like I have no control or idea of what happens next."
}

function render(){

const app=document.getElementById("app")

switch(state.step){

case 1:

app.innerHTML=`

<div class="card">
<h2>What fear is bothering you right now?</h2>

<textarea id="fearInput"
placeholder="Example: I'm afraid I'm going to get fired from my job."></textarea>

<br><br>

<button class="primary" onclick="saveFear()">Next</button>
</div>

`
break


case 2:

let cats=Object.keys(categories).map(c=>`

<button class="choice" onclick="pickCategory('${c}')">${c}</button>

`).join("")

app.innerHTML=`

<div class="card">

<h2>What’s the nature of this fear?</h2>

${cats}

<br>

<button class="secondary" onclick="back()">Back</button>

</div>

`
break


case 3:

let fears=categories[state.category].map(f=>`

<button class="choice" onclick="pickFear('${f}')">${f}</button>

`).join("")

app.innerHTML=`

<div class="card">

<h2>Pick the fear that fits best</h2>

${fears}

<br>

<button class="secondary" onclick="back()">Back</button>

</div>

`
break


case 4:

app.innerHTML=`

<div class="card">

<h2>What has this fear held you back from doing?</h2>

<textarea id="heldBack"></textarea>

<br><br>

<button class="secondary" onclick="back()">Back</button>
<button class="primary" onclick="saveHeldBack()">Next</button>

</div>

`
break


case 5:

let stolen=stolenOptions.map(o=>`

<label class="check">
<input type="checkbox" value="${o}" onchange="toggleStolen(this)">
${o}
</label>

`).join("")

app.innerHTML=`

<div class="card">

<h2>Fear usually costs us something. What has this one been costing you?</h2>

<div class="divider"></div>

${stolen}

<br>

<button class="secondary" onclick="back()">Back</button>
<button class="primary" onclick="next()">Next</button>

</div>

`
break


case 6:

let roots=Object.keys(rootFears).map(r=>`

<button class="choice" onclick="pickRoot('${r}')">
<strong>${r}</strong><br>
<small>${rootFears[r]}</small>
</button>

`).join("")

app.innerHTML=`

<div class="card">

<h2>Is this fear feeling like one of these?</h2>

${roots}

<br>

<button class="secondary" onclick="back()">Back</button>

</div>

`
break


case 7:

app.innerHTML=`

<div class="card">

<h2>If this fear came true, what would happen?</h2>

<textarea id="ifTrue"></textarea>

<br><br>

<button class="secondary" onclick="back()">Back</button>
<button class="primary" onclick="saveIfTrue()">Next</button>

</div>

`
break


case 8:

app.innerHTML=`

<div class="card">

<div class="quote">

“We ask Him to remove our fear and direct our attention to what He would have us be.”

<br>— Alcoholics Anonymous p.68

</div>

<textarea
placeholder="What’s the next right thing to do without this fear running the show?"
id="nextAction"></textarea>

<br><br>

<button class="primary" onclick="startMeditation()">Begin 30-second meditation</button>

</div>

`
break


case 9:

app.innerHTML=`

<div class="card">

<div class="timer" id="timer">${state.time}</div>

<button class="secondary" onclick="reset()">Work on another fear</button>

</div>

`

break

}

}

function saveFear(){
state.fear=document.getElementById("fearInput").value
state.step=2
render()
}

function pickCategory(c){
state.category=c
state.step=3
render()
}

function pickFear(f){
state.namedFear=f
state.step=4
render()
}

function saveHeldBack(){
state.heldBack=document.getElementById("heldBack").value
state.step=5
render()
}

function toggleStolen(box){

if(box.checked) state.stolen.push(box.value)
else state.stolen=state.stolen.filter(x=>x!==box.value)

}

function pickRoot(r){
state.rootFear=r
state.step=7
render()
}

function saveIfTrue(){
state.ifTrue=document.getElementById("ifTrue").value
state.step=8
render()
}

function startMeditation(){

state.step=9
render()

state.timer=setInterval(()=>{

state.time--

document.getElementById("timer").innerText=state.time

if(state.time<=0){
clearInterval(state.timer)
}

},1000)

}

function back(){
state.step--
render()
}

function next(){
state.step++
render()
}

function reset(){
location.reload()
}

render()

</script>

</body>
</html>
