<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fear Compass</title>
  <style>
    :root{
      --bg:#ffffff;
      --panel:#ffffff;
      --text:#111111;
      --line:#111111;
      --muted:#666666;
      --tan:#d4af37;
      --tan-soft:#f5ebc8;
      --blue:#2f5f9e;
      --blue-soft:#e9f1fb;
      --radius:22px;
      --shadow:0 8px 24px rgba(0,0,0,.06);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:18px 14px 80px;
    }

    .hero{
      text-align:center;
      margin-bottom:14px;
    }

    .hero h1{
      margin:0;
      font-size:clamp(2rem, 4vw, 2.7rem);
      letter-spacing:.3px;
      line-height:1.1;
    }

    .hero p{
      margin:10px auto 0;
      max-width:560px;
      color:var(--muted);
      line-height:1.5;
      font-size:1rem;
    }

    .signal-row{
      min-height:34px;
      display:flex;
      justify-content:center;
      align-items:center;
      margin:6px 0 14px;
    }

    .signal{
      display:none;
      align-items:center;
      gap:10px;
      font-size:.95rem;
      color:var(--muted);
      border:1px solid var(--blue);
      border-radius:999px;
      padding:8px 14px;
      background:#fff;
    }

    .signal.show{
      display:flex;
    }

    .compass-dot{
      width:14px;
      height:14px;
      border-radius:50%;
      background:var(--blue);
      position:relative;
      flex:0 0 14px;
      animation:pulse 1s ease-in-out infinite;
    }

    .compass-dot::after{
      content:"";
      position:absolute;
      inset:-6px;
      border:1px solid var(--tan);
      border-radius:50%;
      opacity:.25;
      animation:ripple 1s ease-out infinite;
    }

    @keyframes pulse{
      0%,100%{ transform:scale(.8); opacity:.55; }
      50%{ transform:scale(1); opacity:1; }
    }

    @keyframes ripple{
      0%{ transform:scale(.7); opacity:.35; }
      100%{ transform:scale(1.6); opacity:0; }
    }

    .panel{
      background:var(--panel);
      border:2px solid var(--line);
      border-radius:28px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .tag{
      display:inline-block;
      padding:8px 12px;
      border:1.5px solid var(--line);
      border-radius:999px;
      font-weight:700;
      font-size:.9rem;
      background:#fff;
      margin-bottom:12px;
    }

    .prompt{
      margin:0 0 10px;
      font-size:1.22rem;
      line-height:1.35;
    }

    .help{
      margin:0 0 14px;
      color:var(--muted);
      line-height:1.5;
    }

    textarea,
    input[type="text"]{
      width:100%;
      border:2px solid var(--line);
      border-radius:20px;
      padding:14px 16px;
      font-size:1rem;
      line-height:1.45;
      color:var(--text);
      background:#fff;
      outline:none;
      resize:vertical;
      min-height:110px;
      display:block;
    }

    textarea.short{
      min-height:86px;
    }

    textarea.medium{
      min-height:108px;
    }

    textarea:focus,
    input[type="text"]:focus{
      box-shadow:0 0 0 3px rgba(47,95,158,.10);
      border-color:var(--blue);
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    button{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:999px;
      padding:13px 18px;
      font-weight:800;
      font-size:.96rem;
      transition:.15s ease;
    }

    button:hover{
      transform:translateY(-1px);
    }

    .primary{
      background:#111111;
      color:#ffffff;
      border:2px solid #111111;
    }

    .secondary{
      background:#ffffff;
      color:#111111;
      border:2px solid #111111;
    }

    .ghost{
      background:#f3f3f3;
      color:#111111;
      border:2px dashed #111111;
    }

    .choice-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:10px;
      margin-top:8px;
    }

    .choice{
      background:#ffffff;
      color:#111111;
      border:2px solid #111111;
      border-radius:18px;
      padding:14px;
      text-align:left;
      line-height:1.35;
      min-height:62px;
      font-weight:700;
    }

    .choice.selected{
      background:var(--tan);
      color:#111111;
      border-color:#111111;
    }

    .category-selected{
      margin-top:8px;
      margin-bottom:14px;
    }

    .fear-list-wrap{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid #dddddd;
    }

    .fear-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:10px;
      margin-top:8px;
    }

    .fear-choice{
      background:#ffffff;
      color:#111111;
      border:2px solid #111111;
      border-radius:18px;
      padding:14px;
      text-align:left;
      line-height:1.35;
      min-height:62px;
      font-weight:700;
    }

    .fear-choice.selected{
      background:var(--tan);
      color:#111111;
      border-color:#111111;
    }

    .selected-box{
      margin-top:12px;
      padding:14px;
      border:2px solid #111111;
      border-radius:18px;
      background:var(--tan-soft);
      line-height:1.45;
      font-weight:700;
    }

    .selected-box .mini{
      display:block;
      font-size:.82rem;
      color:#111111;
      font-weight:800;
      margin-bottom:4px;
      text-transform:uppercase;
      letter-spacing:.5px;
    }

    .divider{
      height:2px;
      background:var(--tan);
      margin:14px 0 16px;
      border-radius:999px;
    }

    .root-grid{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .root-card{
      background:#ffffff;
      color:#111111;
      border:2px solid #111111;
      border-radius:18px;
      padding:16px;
      text-align:left;
      line-height:1.4;
      min-height:88px;
    }

    .root-card strong{
      display:block;
      margin-bottom:5px;
      font-size:1.12rem;
      color:#111111;
    }

    .root-card small{
      display:block;
      color:var(--muted);
      line-height:1.45;
      font-size:.98rem;
    }

    .root-card.selected{
      background:var(--tan);
      color:#111111;
    }

    .root-card.selected strong,
    .root-card.selected small{
      color:#111111;
    }

    .checklist{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .check{
      display:flex;
      align-items:flex-start;
      gap:12px;
      border:2px solid #111111;
      border-radius:16px;
      padding:14px;
      background:#ffffff;
    }

    .check input{
      width:20px;
      height:20px;
      accent-color:var(--blue);
      flex:0 0 20px;
      margin-top:2px;
    }

    .check strong{
      display:block;
      margin-bottom:4px;
      color:#111111;
      font-size:1rem;
    }

    .check small{
      color:var(--muted);
      line-height:1.45;
      display:block;
    }

    .quote-box{
      border:2px solid var(--blue);
      border-radius:20px;
      padding:18px;
      margin:0 0 16px;
      background:var(--blue-soft);
      line-height:1.65;
      font-style:italic;
      font-size:1.08rem;
      text-align:center;
    }

    .summary{
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .item{
      border:2px solid #111111;
      border-radius:18px;
      padding:14px;
      background:#ffffff;
    }

    .label{
      font-size:.82rem;
      text-transform:uppercase;
      letter-spacing:.7px;
      margin-bottom:6px;
      color:var(--muted);
      font-weight:800;
    }

    .done-screen{
      text-align:center;
      padding:8px 2px 2px;
    }

    .done-screen h2{
      margin:0 0 8px;
      font-size:1.5rem;
    }

    .done-screen p{
      margin:0 0 14px;
      color:var(--muted);
      line-height:1.5;
    }

    .meditation-wrap{
      margin-top:16px;
      padding:18px;
      border:2px solid #111111;
      border-radius:20px;
      text-align:center;
      background:#ffffff;
    }

    .meditation-focus{
      border:2px solid var(--blue);
      border-radius:18px;
      padding:14px;
      background:var(--blue-soft);
      color:#111111;
      line-height:1.5;
      font-weight:700;
      margin-bottom:14px;
    }

    .clock{
      font-size:2.2rem;
      font-weight:800;
      letter-spacing:1px;
      margin:8px 0 14px;
      color:var(--blue);
    }

    .release-screen{
      text-align:center;
      padding:18px 6px;
      animation:fadeIn .25s ease;
    }

    .release-screen h2{
      margin:0 0 10px;
      font-size:1.7rem;
      line-height:1.2;
    }

    .release-screen p{
      margin:0;
      color:var(--muted);
      line-height:1.55;
      font-size:1.04rem;
    }

    @keyframes fadeIn{
      from{ opacity:0; transform:translateY(6px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @media (max-width:640px){
      .wrap{ padding:16px 12px 70px; }
      .panel{ padding:16px; }
      .choice-grid,
      .fear-grid{ grid-template-columns:1fr 1fr; }
      .prompt{ font-size:1.18rem; }
    }

    @media (max-width:460px){
      .choice-grid,
      .fear-grid{ grid-template-columns:1fr; }
      .panel{ padding:14px; border-radius:24px; }
      textarea,
      input[type="text"]{
        min-height:90px;
      }
      textarea.medium{
        min-height:96px;
      }
      .btn-row{
        margin-top:16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>🧭 Fear Compass</h1>
      <p>A simple tool to help you look honestly at a fear, walk it through, and find the next right direction.</p>
    </div>

    <div class="signal-row">
      <div class="signal" id="signal">
        <div class="compass-dot"></div>
        <span id="signalText">Working through it…</span>
      </div>
    </div>

    <div class="panel" id="app"></div>
  </div>

  <script>
    const categories = {
      "Me and other people": [
        "Fear of Being Rejected",
        "Fear of Being Alone",
        "Fear of Being Abandoned",
        "Fear of Getting Close to People",
        "Fear of Losing a Wife",
        "Fear of Losing a Husband",
        "Fear of Losing a Child",
        "Fear of Men",
        "Fear of Women",
        "Fear of My Parents",
        "Fear of People in General",
        "Fear of Hurting Others",
        "Fear of People Being Disappointed in Me",
        "Fear of People Talking About Me",
        "Fear of Being Judged",
        "Fear of Not Being Good Enough",
        "Fear of Not Being Approved By Others"
      ],
      "How I feel": [
        "Fear of Not Feeling Secure",
        "Fear of Expressing Myself",
        "Fear of Failure",
        "Fear of Success",
        "Fear of Responsibility",
        "Fear of Feeling My Feelings",
        "Fear of Crying",
        "Fear of Being Found Out",
        "Fear of Writing Inventory",
        "Fear of Looking Stupid",
        "Fear of Facing Reality",
        "Fear of Being Wrong"
      ],
      "Body and health": [
        "Fear of Dying",
        "Fear of Insanity",
        "Fear of Losing My Mind",
        "Fear of Disease",
        "Fear of Serious Illness",
        "Fear of Physical Pain",
        "Fear of Hospitals",
        "Fear of Doctors",
        "Fear of Getting Old",
        "Fear of Losing My Health",
        "Fear of Becoming Disabled",
        "Fear of Not Being Able to Take Care of Myself"
      ],
      "Drinking and using": [
        "Fear of Alcohol",
        "Fear of Drugs",
        "Fear of Relapse",
        "Fear of Sobriety",
        "Fear of Running Into My Old Drinking Crowd",
        "Fear of Making New Sober Friends",
        "Fear of Being Boring Without Alcohol",
        "Fear of Temptation",
        "Fear of Hitting Another Rock Bottom",
        "Fear of Going Back to My Old Life"
      ],
      "Authority stuff": [
        "Fear of Authority",
        "Fear of Police",
        "Fear of Jail",
        "Fear of Government",
        "Fear of Gangs",
        "Fear of Creditors",
        "Fear of Being Accused of Stealing",
        "Fear of Becoming Desperate Enough to Steal"
      ],
      "Life falling apart": [
        "Fear of Being Unemployable",
        "Fear of Employment",
        "Fear of Wealthy People",
        "Fear of Change",
        "Fear of Losing My Job",
        "Fear of Becoming Homeless",
        "Fear of Not Having Enough Money",
        "Fear of Being Broke",
        "Fear of My Life Falling Apart Again"
      ],
      "God and spiritual stuff": [
        "Fear of God",
        "Fear of Doing Something Spiritually Wrong",
        "Fear of Not Being Forgiven",
        "Fear of Being Judged by God",
        "Fear of Turning My Will Over to God",
        "Fear of Letting God Down"
      ],
      "Physical danger": [
        "Fear of Heights",
        "Fear of Animals",
        "Fear of Insects",
        "Fear of Drowning",
        "Fear of Violence",
        "Fear of Guns",
        "Fear of Physical Confrontation"
      ]
    };

    const underneathOptions = [
      {
        key: "Rejection",
        description: "I might not be accepted."
      },
      {
        key: "Abandonment",
        description: "They might move on without me and I’m all alone."
      },
      {
        key: "Neglect",
        description: "I feel like I’m on my own and nobody’s there for me."
      },
      {
        key: "Unknown",
        description: "I feel like I have no control or idea of what happens next."
      }
    ];

    const stolenOptions = [
      "Avoiding certain people",
      "Spending time with loved ones",
      "Earning money",
      "Sleep",
      "Peace of mind",
      "Showing up for work",
      "Asking for help",
      "Trying new things",
      "Speaking up",
      "Going places I need to go",
      "Doing what I know I should do"
    ];

    const reactionOptions = [
      {
        key: "Selfish",
        label: "Selfish",
        description: "I’m putting my wants ahead of everything else."
      },
      {
        key: "Self-seeking",
        label: "Self-seeking",
        description: "I want my way."
      },
      {
        key: "Self-reliant",
        label: "Self-reliant",
        description: "I am not asking for help."
      },
      {
        key: "Self-centered",
        label: "Self-centered",
        description: "I’m making it all about me again."
      }
    ];

    const state = {
      step: 1,
      fearText: "",
      selectedCategory: "",
      namedFear: "",
      heldBack: "",
      stolen: [],
      underneath: "",
      ifTrue: "",
      reactions: [],
      nextRightThing: "",
      meditationRunning: false,
      meditationSeconds: 30,
      meditationInterval: null,
      releaseTimeout: null
    };

    const app = document.getElementById("app");
    const signal = document.getElementById("signal");
    const signalText = document.getElementById("signalText");

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showSignal(text = "Working through it…", ms = 1000){
      signalText.textContent = text;
      signal.classList.add("show");
      setTimeout(() => signal.classList.remove("show"), ms);
    }

    function clearReleaseTimeout(){
      if(state.releaseTimeout){
        clearTimeout(state.releaseTimeout);
        state.releaseTimeout = null;
      }
    }

    function renderCategoryButtons(){
      const keys = Object.keys(categories);

      if(state.selectedCategory){
        return `
          <div class="category-selected">
            <button class="choice selected" onclick="clearCategorySelection()">
              ${escapeHtml(state.selectedCategory)}
            </button>
          </div>
        `;
      }

      return `
        <div class="choice-grid">
          ${keys.map(cat => `
            <button class="choice" onclick="pickCategory(${JSON.stringify(cat).replace(/"/g, '&quot;')})">
              ${escapeHtml(cat)}
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderFearChoices(){
      if(!state.selectedCategory) return "";

      const fears = categories[state.selectedCategory] || [];

      return `
        <div class="fear-list-wrap">
          ${state.namedFear ? `
            <div class="selected-box">
              <span class="mini">Selected fear</span>
              ${escapeHtml(state.namedFear)}
            </div>
          ` : `
            <div class="fear-grid">
              ${fears.map(item => `
                <button class="fear-choice ${state.namedFear === item ? 'selected' : ''}" onclick="pickNamedFear(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                  ${escapeHtml(item)}
                </button>
              `).join("")}
            </div>
          `}
        </div>
      `;
    }

    function renderStep1(){
      app.innerHTML = `
        <h2 class="prompt">What fear is bothering you right now?</h2>
        <p class="help">Type it out plain and honest. No perfect wording needed.</p>
        <textarea id="fearInput" class="medium" placeholder="Example: I’m afraid I’m going to get fired from my job.">${escapeHtml(state.fearText)}</textarea>
        <div class="btn-row">
          <button class="primary" onclick="nextFromFear()">Next</button>
        </div>
      `;
    }

    function renderStep2(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">What’s the nature of this fear?</h2>
        ${renderCategoryButtons()}
        ${renderFearChoices()}
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromNamedFear()">Next</button>
        </div>
      `;
    }

    function renderStep3(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">What has this fear held you back from doing?</h2>
        <textarea id="heldBackInput" class="short" placeholder="">${escapeHtml(state.heldBack)}</textarea>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromHeldBack()">Next</button>
        </div>
      `;
    }

    function renderStep4(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">Fear usually costs us something. What has this one been costing you?</h2>
        <div class="divider"></div>
        <div class="checklist">
          ${stolenOptions.map(opt => `
            <label class="check">
              <input type="checkbox" value="${escapeHtml(opt)}" ${state.stolen.includes(opt) ? "checked" : ""} onchange="toggleStolen(this.value, this.checked)" />
              <div><strong>${escapeHtml(opt)}</strong></div>
            </label>
          `).join("")}
        </div>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromStolen()">Next</button>
        </div>
      `;
    }

    function renderStep5(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">Is this fear feeling like one of these?</h2>
        <div class="root-grid">
          ${underneathOptions.map(opt => `
            <button class="root-card ${state.underneath === opt.key ? 'selected' : ''}" onclick="pickUnderneath(${JSON.stringify(opt.key).replace(/"/g, '&quot;')})">
              <strong>${escapeHtml(opt.key)}</strong>
              <small>${escapeHtml(opt.description)}</small>
            </button>
          `).join("")}
        </div>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromUnderneath()">Next</button>
        </div>
      `;
    }

    function renderStep6(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">If this fear actually came true… what would happen?</h2>
        <textarea id="ifTrueInput" class="short" placeholder="">${escapeHtml(state.ifTrue)}</textarea>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="nextFromIfTrue()">Next</button>
        </div>
      `;
    }

    function renderStep7(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">Where did I get the ball rolling on this fear?</h2>
        <div class="checklist">
          ${reactionOptions.map(opt => `
            <label class="check">
              <input type="checkbox" value="${escapeHtml(opt.key)}" ${state.reactions.includes(opt.key) ? "checked" : ""} onchange="toggleReaction(this.value, this.checked)" />
              <div>
                <strong>${escapeHtml(opt.label)}</strong>
                <small>${escapeHtml(opt.description)}</small>
              </div>
            </label>
          `).join("")}
        </div>
        <div class="btn-row">
          <button class="secondary" onclick="goBack()">Back</button>
          <button class="primary" onclick="finishFearWork()">Next</button>
        </div>
      `;
    }

    function renderStep8(){
      app.innerHTML = `
        <div class="tag">Let’s take it further</div>
        <h2 class="prompt">Here’s what you came up with.</h2>
        <div class="summary">
          <div class="item">
            <div class="label">What fear was bothering you</div>
            <div>${escapeHtml(state.fearText)}</div>
          </div>
          <div class="item">
            <div class="label">What you were really afraid of</div>
            <div>${escapeHtml(state.namedFear)}</div>
          </div>
          <div class="item">
            <div class="label">What it held you back from doing</div>
            <div>${escapeHtml(state.heldBack)}</div>
          </div>
          <div class="item">
            <div class="label">What this fear has been costing you</div>
            <div>${state.stolen.length ? escapeHtml(state.stolen.join(", ")) : "Nothing checked."}</div>
          </div>
          <div class="item">
            <div class="label">What this fear feels like underneath</div>
            <div>${escapeHtml(state.underneath)}</div>
          </div>
          <div class="item">
            <div class="label">If it came true</div>
            <div>${escapeHtml(state.ifTrue)}</div>
          </div>
          <div class="item">
            <div class="label">Where you got the ball rolling</div>
            <div>${state.reactions.length ? escapeHtml(state.reactions.join(", ")) : "Nothing checked."}</div>
          </div>
        </div>
        <div class="btn-row">
          <button class="secondary" onclick="startOver()">Work on another fear?</button>
          <button class="primary" onclick="showReleaseScreen()">I’m done</button>
        </div>
      `;
    }

    function renderStep9(){
      app.innerHTML = `
        <div class="release-screen">
          <h2>🧭 Fear Looked At Honestly</h2>
          <p>Fear loses power when it is seen clearly.</p>
        </div>
      `;
    }

    function renderStep10(){
      const seconds = state.meditationSeconds;
      const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
      const ss = String(seconds % 60).padStart(2, "0");

      app.innerHTML = `
        <div class="done-screen">
          <h2>Nice work.</h2>
          <p>Take 30 seconds and sit still with this.</p>

          <div class="quote-box">
            “We ask Him to remove our fear and direct our attention to what He would have us be.”
            <br />— Alcoholics Anonymous, p. 68
          </div>

          <textarea id="nextRightThingInput" class="short" placeholder="What’s the next right thing to do without this fear running the show?">${escapeHtml(state.nextRightThing)}</textarea>

          <div class="meditation-wrap">
            ${state.nextRightThing.trim() ? `
              <div class="meditation-focus">${escapeHtml(state.nextRightThing)}</div>
            ` : ``}
            <div class="label" style="margin-bottom:8px;">30 second meditation</div>
            <div class="clock" id="clock">${mm}:${ss}</div>
            <div class="btn-row" style="justify-content:center;">
              ${
                state.meditationRunning
                  ? `<button class="secondary" onclick="pauseMeditation()">Pause</button>`
                  : `<button class="primary" onclick="startMeditation()">Start</button>`
              }
              <button class="secondary" onclick="resetMeditation()">Reset</button>
              <button class="ghost" onclick="startOver()">Work on another fear?</button>
            </div>
          </div>
        </div>
      `;
    }

    function render(){
      switch(state.step){
        case 1: renderStep1(); break;
        case 2: renderStep2(); break;
        case 3: renderStep3(); break;
        case 4: renderStep4(); break;
        case 5: renderStep5(); break;
        case 6: renderStep6(); break;
        case 7: renderStep7(); break;
        case 8: renderStep8(); break;
        case 9: renderStep9(); break;
        case 10: renderStep10(); break;
      }
    }

    function goBack(){
      clearReleaseTimeout();

      if(state.step > 1){
        if(state.step === 10){
          storeNextRightThingFromInput();
        }

        if(state.step === 9){
          state.step = 8;
        } else {
          state.step--;
        }

        render();
      }
    }

    function nextFromFear(){
      const value = document.getElementById("fearInput").value.trim();
      if(!value){
        alert("Write the fear first.");
        return;
      }
      state.fearText = value;
      showSignal("Looking at it…");
      state.step = 2;
      setTimeout(render, 180);
    }

    function pickCategory(value){
      state.selectedCategory = value;
      state.namedFear = "";
      render();
    }

    function clearCategorySelection(){
      state.selectedCategory = "";
      state.namedFear = "";
      render();
    }

    function pickNamedFear(value){
      state.namedFear = value;
      render();
    }

    function nextFromNamedFear(){
      if(!state.namedFear){
        alert("Pick the fear that fits best.");
        return;
      }
      state.step = 3;
      render();
    }

    function nextFromHeldBack(){
      const value = document.getElementById("heldBackInput").value.trim();
      if(!value){
        alert("Write what this fear has held you back from doing.");
        return;
      }
      state.heldBack = value;
      state.step = 4;
      render();
    }

    function toggleStolen(value, checked){
      if(checked){
        if(!state.stolen.includes(value)) state.stolen.push(value);
      } else {
        state.stolen = state.stolen.filter(v => v !== value);
      }
    }

    function nextFromStolen(){
      state.step = 5;
      render();
    }

    function pickUnderneath(value){
      state.underneath = value;
      render();
    }

    function nextFromUnderneath(){
      if(!state.underneath){
        alert("Pick the one that feels closest.");
        return;
      }
      state.step = 6;
      render();
    }

    function nextFromIfTrue(){
      const value = document.getElementById("ifTrueInput").value.trim();
      if(!value){
        alert("Write what would happen if it came true.");
        return;
      }
      state.ifTrue = value;
      state.step = 7;
      render();
    }

    function toggleReaction(value, checked){
      if(checked){
        if(!state.reactions.includes(value)) state.reactions.push(value);
      } else {
        state.reactions = state.reactions.filter(v => v !== value);
      }
    }

    function finishFearWork(){
      state.step = 8;
      render();
    }

    function showReleaseScreen(){
      clearReleaseTimeout();
      state.step = 9;
      render();

      state.releaseTimeout = setTimeout(() => {
        state.releaseTimeout = null;
        showMeditation();
      }, 1000);
    }

    function showMeditation(){
      clearReleaseTimeout();
      state.step = 10;
      state.meditationRunning = false;
      state.meditationSeconds = 30;
      clearInterval(state.meditationInterval);
      state.meditationInterval = null;
      render();
    }

    function storeNextRightThingFromInput(){
      const input = document.getElementById("nextRightThingInput");
      if(input){
        state.nextRightThing = input.value;
      }
    }

    function startMeditation(){
      storeNextRightThingFromInput();
      if(state.meditationRunning) return;

      state.meditationRunning = true;
      render();

      state.meditationInterval = setInterval(() => {
        if(state.meditationSeconds > 0){
          state.meditationSeconds--;
          const clock = document.getElementById("clock");
          if(clock){
            const mm = String(Math.floor(state.meditationSeconds / 60)).padStart(2, "0");
            const ss = String(state.meditationSeconds % 60).padStart(2, "0");
            clock.textContent = `${mm}:${ss}`;
          }
        } else {
          clearInterval(state.meditationInterval);
          state.meditationInterval = null;
          state.meditationRunning = false;
          storeNextRightThingFromInput();
          render();
          showSignal("Done.");
        }
      }, 1000);
    }

    function pauseMeditation(){
      storeNextRightThingFromInput();
      state.meditationRunning = false;
      clearInterval(state.meditationInterval);
      state.meditationInterval = null;
      render();
    }

    function resetMeditation(){
      storeNextRightThingFromInput();
      state.meditationRunning = false;
      clearInterval(state.meditationInterval);
      state.meditationInterval = null;
      state.meditationSeconds = 30;
      render();
    }

    function startOver(){
      clearReleaseTimeout();
      clearInterval(state.meditationInterval);
      state.meditationInterval = null;

      state.step = 1;
      state.fearText = "";
      state.selectedCategory = "";
      state.namedFear = "";
      state.heldBack = "";
      state.stolen = [];
      state.underneath = "";
      state.ifTrue = "";
      state.reactions = [];
      state.nextRightThing = "";
      state.meditationRunning = false;
      state.meditationSeconds = 30;
      render();
    }

    render();

    window.nextFromFear = nextFromFear;
    window.pickCategory = pickCategory;
    window.clearCategorySelection = clearCategorySelection;
    window.pickNamedFear = pickNamedFear;
    window.nextFromNamedFear = nextFromNamedFear;
    window.nextFromHeldBack = nextFromHeldBack;
    window.toggleStolen = toggleStolen;
    window.nextFromStolen = nextFromStolen;
    window.pickUnderneath = pickUnderneath;
    window.nextFromUnderneath = nextFromUnderneath;
    window.nextFromIfTrue = nextFromIfTrue;
    window.toggleReaction = toggleReaction;
    window.finishFearWork = finishFearWork;
    window.showReleaseScreen = showReleaseScreen;
    window.showMeditation = showMeditation;
    window.startMeditation = startMeditation;
    window.pauseMeditation = pauseMeditation;
    window.resetMeditation = resetMeditation;
    window.goBack = goBack;
    window.startOver = startOver;
  </script>
</body>
</html>
