<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Misfits — Audio Library</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="./icon-192.png">

  <!-- iPhone PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recovery Misfits">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    :root { --border: rgba(0,0,0,.12); --muted: rgba(0,0,0,.65); }

    body{
      font-family:Roboto,Arial,sans-serif;
      margin:0;
      background:#fff;
      color:#111;
      line-height:1.35;
      padding-bottom:120px;
    }

    main{max-width:860px;margin:0 auto;padding:14px;}

    .pageTitle{
      font-weight:1000;
      font-size:18px;
      margin:10px 4px 12px;
      letter-spacing:.2px;
      text-align:center;
    }

    .card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      margin:12px 0;
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
      background:#fff;
    }

    .btn{
      appearance:none;
      border:1px solid var(--border);
      background:#fff;
      color:#111;
      padding:10px 12px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
    }
    .btn:active{transform:scale(.99)}
    .btn.primary{ border-color: rgba(0,0,0,.25); }
    .btn.mini{ padding:8px 10px; font-size:13px; min-height:40px; }

    .library{ display:flex; flex-direction:column; gap:10px; }
    .rowCard{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px;
      border:1px solid rgba(0,0,0,.12);
      border-radius:12px;
      background:#fff;
    }
    .title{font-weight:1000;font-size:14px;margin:0;}
    .subtitle{font-size:12px;color:var(--muted);font-weight:900;margin-top:3px;}

    .row{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid rgba(0,0,0,.08);}
    .chapterTitle{font-weight:900;font-size:14px;display:flex;align-items:center;gap:8px;}
    .actions{display:flex;gap:8px;flex-wrap:wrap;}

    .playingRow{
      outline:2px solid #b7d3c2;
      border-radius:12px;
      padding:10px;
      margin:8px 0;
      background:#e8f3ec;
      box-shadow: 0 2px 14px rgba(0,0,0,.06);
    }

    .nowTag{
      font-size:11px;
      font-weight:1000;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid #b7d3c2;
      background:#e8f3ec;
    }

    audio{width:100%}
  </style>
</head>

<body>

<div id="rm-topbar"></div>
<script src="./topbar.js" defer></script>

<main>
  <div class="pageTitle">Audio Library</div>

  <section class="card">
    <div class="library" id="library"></div>
  </section>

  <section class="card" id="playerArea" style="display:none;">
    <div style="font-weight:1000;margin-bottom:6px;" id="playerAreaTitle">Now Playing</div>
    <div style="font-size:13px;color:rgba(0,0,0,.65);font-weight:900;margin-bottom:10px;" id="playerAreaSub">Ready</div>

    <audio id="player" controls preload="metadata"></audio>

    <div style="font-weight:1000;margin-top:14px;">Chapters</div>
    <div id="chapterList"></div>
  </section>
</main>

<div id="rm-bottom-nav"></div>
<script src="./nav.js" defer></script>

<script>
const LIBRARY = [
  { type:"gorilla", title:"Alcoholism: The 500 Pound Gorilla", sub:"Audiobook" },
  { type:"yt_playlist", title:"Joe & Charlie", sub:"Big Book Study", id:"PLxb8I9B3VlNvAKFFZugCC8a7Pq6tkpF7E" },
  { type:"yt_playlist", title:"Father Martin", sub:"Chalk Talks", id:"PLvwn9cjv4shDAovzrlf_5k0pW9hF_P8Lf" },
  { type:"yt_playlist", title:"Chuck C", sub:"A New Pair of Glasses", id:"PLxb8I9B3VlNvBfT34yoa_MU2zay5WTsiA" },
  { type:"yt_playlist", title:"Allen McGinnis", sub:"Building a House of Sobriety", id:"PLxb8I9B3VlNv7NFjbYLO809xJBBhf7CuE" }
];

const libraryEl = document.getElementById("library");
const playerArea = document.getElementById("playerArea");
const player = document.getElementById("player");
const chapterList = document.getElementById("chapterList");

function showPlayer(){ playerArea.style.display="block"; }

const TRACKS = [
  { title:"1. So Here You Are", url:"https://recovery-misfits-audio.b-cdn.net/gorilla-audiobook/1.%20So%20Here%20You%20Are.mp3" },
  { title:"2. The Rat Trap", url:"https://recovery-misfits-audio.b-cdn.net/gorilla-audiobook/2.%20The%20Rat%20Trap.mp3" },
  { title:"3. My Off Switch is Broke", url:"https://recovery-misfits-audio.b-cdn.net/gorilla-audiobook/3.%20My%20Off%20Switch%20is%20Broke.mp3" }
];

function buildChapters(){
  chapterList.innerHTML="";
  TRACKS.forEach((tr,idx)=>{
    const row=document.createElement("div");
    row.className="row";
    row.dataset.idx=idx;

    const title=document.createElement("div");
    title.className="chapterTitle";
    title.textContent=tr.title;

    const btn=document.createElement("button");
    btn.className="btn mini";
    btn.textContent="Play";
    btn.onclick=()=>{
      player.src=tr.url;
      player.play();
      document.querySelectorAll(".row").forEach(r=>r.classList.remove("playingRow"));
      row.classList.add("playingRow");

      const tag=document.createElement("span");
      tag.className="nowTag";
      tag.textContent="NOW PLAYING";
      title.appendChild(tag);
    };

    row.appendChild(title);
    row.appendChild(btn);
    chapterList.appendChild(row);
  });
}

function buildLibrary(){
  LIBRARY.forEach(item=>{
    const row=document.createElement("div");
    row.className="rowCard";

    const left=document.createElement("div");
    const t=document.createElement("div"); t.className="title"; t.textContent=item.title;
    const s=document.createElement("div"); s.className="subtitle"; s.textContent=item.sub;
    left.appendChild(t); left.appendChild(s);

    const btn=document.createElement("button");
    btn.className="btn primary";
    btn.textContent="▶ Play";
    btn.onclick=()=>{
      if(item.type==="gorilla"){ showPlayer(); buildChapters(); }
      else window.open(`https://youtube.com/playlist?list=${item.id}`,"_blank");
    };

    row.appendChild(left);
    row.appendChild(btn);
    libraryEl.appendChild(row);
  });
}

buildLibrary();
</script>

</body>
</html>
