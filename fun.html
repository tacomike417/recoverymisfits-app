<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fun — Recovery Misfits</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="./icon-192.png">

  <!-- iPhone PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recovery Misfits">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    body{
      margin:0;
      font-family:Roboto,Arial,sans-serif;
      background:#fff;
      color:#111;
      padding-bottom:120px;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:16px 14px 28px;
    }

    .title{
      font-weight:1000;
      font-size:18px;
      text-align:center;
      margin:10px 0 4px;
    }

    .sub{
      text-align:center;
      color:#666;
      font-size:13px;
      font-weight:800;
      margin-bottom:16px;
    }

    .card{
      border:1px solid rgba(0,0,0,.12);
      border-radius:14px;
      padding:14px;
      margin:12px 0;
      background:#fff;
      box-shadow:0 1px 0 rgba(0,0,0,.03);
    }

    .card h3{
      margin:0 0 6px;
      font-size:15px;
      font-weight:1000;
    }

    .meta{
      font-size:12px;
      color:#666;
      margin-bottom:10px;
      font-weight:900;
    }

    .cover{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.1);
      margin-bottom:12px;
    }

    .btn{
      display:block;
      text-align:center;
      padding:12px;
      border-radius:12px;
      font-weight:1000;
      text-decoration:none;
      border:2px solid rgba(0,0,0,.15);
      background:#fff;
      color:#111;
    }

    .btn.play{
      background:#4CAF50;
      color:#fff;
      border-color:#3f8e42;
    }

    .btn.soon{
      background:#eee;
      color:#777;
      border-style:dashed;
      pointer-events:none;
    }

    .badge{
      display:inline-block;
      font-size:11px;
      font-weight:1000;
      padding:4px 8px;
      border-radius:8px;
      background:#ffcc00;
      margin-bottom:8px;
    }

    .dashed{
      border:2px dashed rgba(0,0,0,.25);
    }
  </style>
</head>

<body>

  <!-- Shared TOP BAR -->
  <div id="rm-topbar"></div>
  <script src="./topbar.js" defer></script>

  <div class="wrap">
    <div class="title">Fun & Games</div>
    <div class="sub">Because sobriety doesn’t have to feel like homework.</div>

    <!-- 🎮 TRUDGE THE ROAD -->
    <div class="card">
      <h3>Trudge the Road</h3>
      <div class="meta">Pixel adventure in sober living.</div>

      <img class="cover" src="trudge-the-road.png" alt="Trudge the Road">

      <a class="btn play"
        href="https://tacomike417.github.io/recoverymisfits-app/game.html">
        ▶ Play Trudge The Road
      </a>
    </div>

    <!-- 🧰 TRUDGE BROTHERS -->
    <div class="card dashed">
      <div class="badge">COMING SOON</div>
      <h3>Trudge Brothers</h3>
      <div class="meta">Help Bill & Bob make the meeting!</div>

      <img class="cover" src="trudge-bros.png" alt="Trudge Brothers">

      <a class="btn soon">
        Trudge Brothers — Coming Soon!
      </a>
    </div>

  </div>

  <!-- Shared BOTTOM NAV -->
  <div id="rm-bottom-nav"></div>
  <script src="./nav.js" defer></script>

</body>
</html>
